<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BREAKCORE VISUALIZER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #0f0;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border: 1px solid #0f0;
            max-width: 350px;
        }

        input[type="file"],
        button {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #0f0;
            color: #0f0;
            padding: 8px 12px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        button:hover {
            background: rgba(0, 255, 0, 0.4);
        }

        #status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #f0f;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px;
            border: 1px solid #f0f;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="info">
        <div><strong>BREAKCORE VISUALIZER</strong></div>
        <div id="fps">FPS: --</div>
        <div id="energy">Energy: 0.00</div>
        <div id="chaos">Chaos: 0.00</div>
    </div>

    <div id="controls">
        <input type="file" id="audio-input" accept="audio/*">
        <button id="play-btn">Play</button>
    </div>

    <div id="status">Ready</div>

    <script type="module">
        // Initialize visualizer when WASM module is loaded
        async function initWasm() {
            try {
                const wasmModule = await import('./pkg/breakcore_viz.js');
                await wasmModule.default();
                console.log('WASM visualizer loaded');
                document.getElementById('status').textContent = 'Rendering...';
            } catch (error) {
                console.error('Failed to load WASM:', error);
                document.getElementById('status').textContent = 'Error loading WASM';
            }
        }

        // Audio file handling
        const audioInput = document.getElementById('audio-input');
        const playBtn = document.getElementById('play-btn');
        let audioContext = null;
        let sourceNode = null;
        let analyser = null;

        audioInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            const fileReader = new FileReader();
            fileReader.onload = (event) => {
                audioContext.decodeAudioData(event.target.result, (buffer) => {
                    if (sourceNode) sourceNode.disconnect();
                    sourceNode = audioContext.createBufferSource();
                    sourceNode.buffer = buffer;

                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 2048;

                    sourceNode.connect(analyser);
                    analyser.connect(audioContext.destination);

                    playBtn.textContent = 'Play';
                    document.getElementById('status').textContent = 'Ready to play';
                });
            };
            fileReader.readAsArrayBuffer(file);
        });

        playBtn.addEventListener('click', () => {
            if (!sourceNode) return;

            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            if (playBtn.textContent === 'Play') {
                sourceNode.start(0);
                playBtn.textContent = 'Stop';
                document.getElementById('status').textContent = 'Playing...';
            } else {
                sourceNode.stop();
                playBtn.textContent = 'Play';
                document.getElementById('status').textContent = 'Stopped';
            }
        });

        // Initialize on load
        window.addEventListener('load', initWasm);
    </script>
</body>
</html>
