<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BREAKCORE VISUALIZER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #0f0;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border: 1px solid #0f0;
            max-width: 350px;
        }

        input[type="file"],
        button {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #0f0;
            color: #0f0;
            padding: 8px 12px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        button:hover {
            background: rgba(0, 255, 0, 0.4);
        }

        #status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #f0f;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px;
            border: 1px solid #f0f;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="info">
        <div><strong>BREAKCORE VISUALIZER</strong></div>
        <div id="fps">FPS: --</div>
        <div id="energy">Energy: 0.00</div>
        <div id="chaos">Chaos: 0.00</div>
    </div>

    <div id="controls">
        <input type="file" id="audio-input" accept="audio/*">
        <button id="play-btn">Play</button>
    </div>

    <div id="status">Ready</div>

    <script type="module">
        import init, { run_visualizer } from './pkg/breakcore_viz.js';

        async function main() {
            await init();
            run_visualizer();
        }

        main().catch(console.error);
    </script>
</body>
</html>
