<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BREAKCORE VISUALIZER</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#overlay{z-index:2;pointer-events:none}
#hud{position:fixed;top:16px;left:16px;z-index:10;color:#0f0;font:11px/1.5 'Courier New',monospace;
  background:rgba(0,0,0,.7);padding:8px 12px;border:1px solid rgba(0,255,0,.3);
  transition:opacity .4s;pointer-events:none}
#hud.hidden{opacity:0}
#drop-zone{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.85);transition:opacity .5s}
#drop-zone.hidden{opacity:0;pointer-events:none}
#drop-zone div{color:#0f0;font:24px 'Courier New',monospace;border:2px dashed rgba(0,255,0,.4);
  padding:60px 80px;text-align:center}
#drop-zone div small{display:block;margin-top:8px;font-size:13px;color:rgba(0,255,0,.5)}
#error{position:fixed;bottom:20px;left:20px;right:20px;z-index:30;color:#f44;
  font:13px 'Courier New',monospace;background:rgba(0,0,0,.9);padding:12px;
  border:1px solid #f44;display:none;max-height:200px;overflow:auto;white-space:pre-wrap}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="overlay"></canvas>
<div id="hud">
  <div><b>BREAKCORE VIZ</b> <span id="hud-fps">--</span>fps <span id="hud-frametime">--</span>ms</div>
  <div id="hud-res">--</div>
  <div id="hud-energy">Energy: 0.00</div>
  <div id="hud-chaos">Chaos: 0.00</div>
  <div id="hud-band">K:0 S:0 H:0</div>
  <div id="hud-extra">P: 0</div>
</div>
<div id="drop-zone"><div>DROP AUDIO HERE<small>click for fullscreen &middot; space=pause &middot; F=fullscreen &middot; D=debug</small></div></div>
<div id="error"></div>

<script>
"use strict";

// ─── Configuration ──────────────────────────────────────────────────
const CFG = {
  // Audio
  fftSize: 2048,
  smoothAlpha: 0.15,
  bandRanges: { sub: [20, 100], low: [100, 500], mid: [500, 2000], high: [2000, 16000] },
  bandMultipliers: { kick: 3, snare: 2.5, hat: 4 },

  // Particles
  maxParticles: 1200,
  spawn: {
    kick:  { count: [40, 70], speed: [250, 700], size: [5, 11], life: [0.8, 1.5], gravity: 500 },
    snare: { count: [30, 50], speed: [300, 750], size: [3, 6], life: [0.4, 0.8], gravity: 250 },
    hat:   { count: [35, 55], speed: [400, 950], size: [2, 4], life: [0.2, 0.5], gravity: 0 },
    peak:  { count: [60, 100], speed: [350, 1000], size: [4, 9], life: [0.6, 1.3], gravity: 350 },
  },
  onsetThresholds: { kick: 0.015, snare: 0.012, hat: 0.008, peak: 0.03 },
  peakEnergyMin: 0.6,

  // Overlay
  numBars: 64,
  numStars: 400,
  maxRings: 12,
  maxTears: 30,
  numTendrils: 16,

  // Visual evolution
  phaseDuration: 6,    // seconds per evolution phase — breakcore doesn't linger
  shapeDuration: 8,    // seconds per shape before morphing
  morphDuration: 1.5,  // seconds to morph between shapes — fast cuts
  numShapes: 4,        // protein, crystal, jellyfish, blackhole

  // Forward camera
  camBaseSpeed: 2.0,
  camBoostSpeed: 5.0,
  camKickImpulse: 0.4,
  corridorRadius: 3.5, // tunnel wall minimum radius from camera path

  // Shader tuning
  scene: {
    steps: 44, maxDist: 40.0, surfThreshold: 0.015,
  },
  post: {
    bloomThreshold: 0.5, bloomIntensity: 1.2, bloomKickBoost: 0.25,
    feedbackBaseZoom: 0.97, feedbackDecay: 0.85, feedbackBlend: 0.35,
    vignetteStrength: 0.45, toneMapCompression: 0.25, saturationBoost: 1.25,
    maxBrightness: 0.93,
  },

  // Evolution phases — each defines a distinct "place"
  evoPhases: [
    { repPeriod: 7.0, fogDensity: 0.06, speedMul: 1.0, tunnelBlend: 0.0, objScale: 0.8, colorGrade: 0 },
    { repPeriod: 5.0, fogDensity: 0.08, speedMul: 1.3, tunnelBlend: 0.0, objScale: 0.7, colorGrade: 1 },
    { repPeriod: 9.0, fogDensity: 0.05, speedMul: 0.7, tunnelBlend: 0.0, objScale: 1.0, colorGrade: 2 },
    { repPeriod: 6.0, fogDensity: 0.07, speedMul: 1.2, tunnelBlend: 0.4, objScale: 0.75, colorGrade: 3 },
    { repPeriod: 4.5, fogDensity: 0.10, speedMul: 1.8, tunnelBlend: 0.6, objScale: 0.6, colorGrade: 0 },
    { repPeriod: 10.0, fogDensity: 0.04, speedMul: 0.5, tunnelBlend: 0.0, objScale: 1.0, colorGrade: 2 },
  ],

  // HUD
  debugMode: new URLSearchParams(window.location.search).has('debug'),
  demoMode: new URLSearchParams(window.location.search).has('demo'),
};

// ─── Error Handling ─────────────────────────────────────────────────
const errorEl = document.getElementById('error');
function showError(msg) {
  console.error(msg);
  errorEl.style.display = 'block';
  errorEl.textContent += msg + '\n';
}

// ─── DOM ────────────────────────────────────────────────────────────
const glCanvas = document.getElementById('gl');
const ovCanvas = document.getElementById('overlay');
const ctx = ovCanvas.getContext('2d');
const hud = document.getElementById('hud');
const dropZone = document.getElementById('drop-zone');

// ─── WebGL2 ─────────────────────────────────────────────────────────
const gl = glCanvas.getContext('webgl2', { antialias: false, alpha: false });
if (!gl) { showError('WebGL2 not supported'); throw 'no webgl2'; }
const floatExt = gl.getExtension('EXT_color_buffer_float');
gl.getExtension('OES_texture_float_linear');
const FB_INT = floatExt ? gl.RGBA16F : gl.RGBA8;
const FB_TYPE = floatExt ? gl.FLOAT : gl.UNSIGNED_BYTE;

// ─── Shaders ────────────────────────────────────────────────────────
const FULLSCREEN_VS = `#version 300 es
precision highp float;
out vec2 vUV;
void main() {
  float x = -1.0 + float((gl_VertexID & 1) << 2);
  float y = -1.0 + float((gl_VertexID & 2) << 1);
  vUV = vec2(x, y) * 0.5 + 0.5;
  gl_Position = vec4(x, y, 0.0, 1.0);
}`;

const SCENE_FS = `#version 300 es
precision highp float;
in vec2 vUV;
out vec4 fragColor;

uniform float uTime, uEnergy, uKick, uSnare, uHat, uChaos, uHue, uMorph;
uniform float uCamZ, uTunnelBlend, uFogDensity, uRepPeriod, uObjScale, uCorridorR;
uniform float uBHZ, uBHSize;
uniform int uShapeA, uShapeB;
uniform vec2 uRes, uMouse, uCamXY;

#define STEPS ${CFG.scene.steps}
#define MAX_DIST ${CFG.scene.maxDist.toFixed(1)}
#define SURF ${CFG.scene.surfThreshold.toFixed(3)}

vec3 hsl(float h, float s, float l) {
  vec3 c = clamp(abs(mod(h*6.0+vec3(0,4,2),6.0)-3.0)-1.0,0.0,1.0);
  return l+s*(c-0.5)*(1.0-abs(2.0*l-1.0));
}

// ── Hashing ──
vec3 hash31(vec3 p) {
  p = mod(p, 256.0);
  p = fract(p * vec3(443.897, 397.297, 491.187));
  p += dot(p, p.yzx + 19.19);
  return fract(vec3(p.x*p.y, p.y*p.z, p.z*p.x));
}

mat2 rot2(float a) { float c=cos(a),s=sin(a); return mat2(c,s,-s,c); }

// ── Shape SDFs ──
float torusSDF(vec3 p, float tw) {
  p.x += sin(p.y*3.0+tw)*0.2*uEnergy;
  p.y += sin(p.z*2.5+tw)*0.15*uEnergy;
  float r = length(p.xy) - 1.2;
  float y2 = p.z - 0.5*sin(atan(p.y,p.x)*5.0+tw);
  float d = sqrt(r*r+y2*y2) - 0.45;
  d += 0.05*sin(p.x*12.0+tw)*sin(p.y*12.0)*sin(p.z*12.0)*uEnergy;
  d += 0.03*sin(p.x*25.0)*sin(p.y*25.0)*sin(p.z*25.0)*uChaos;
  return d;
}

float crystalSDF(vec3 p, float tw) {
  p.xz *= rot2(tw*0.3);
  p.xy *= rot2(tw*0.2);
  float d = (abs(p.x)+abs(p.y*1.5)+abs(p.z)-1.3)*0.5;
  vec3 q = p; q.xz *= rot2(0.785);
  float s2 = (abs(q.x*1.3)+abs(q.y)+abs(q.z*1.3)-1.0)*0.5;
  vec3 r = p; r.yz *= rot2(0.785);
  float s3 = (abs(r.x)+abs(r.y*1.4)+abs(r.z)-0.9)*0.5;
  d = min(d, min(s2, s3));
  d += 0.04*sin(p.x*15.0+tw*2.0)*sin(p.y*15.0+tw)*sin(p.z*15.0)*uEnergy;
  d += 0.03*sin(p.x*25.0)*sin(p.z*25.0)*uChaos;
  return d;
}

float jellyfishSDF(vec3 p, float tw) {
  p.y += 0.3+sin(tw*0.4)*0.3;
  p.xz *= rot2(tw*0.15);
  float breathe = 1.0+sin(tw)*0.1*(1.0+uKick);
  float dome = length(p*vec3(1.0,1.3,1.0))/breathe - 1.1;
  dome = max(dome, p.y-0.2);
  dome += 0.06*sin(atan(p.z,p.x)*8.0+tw)*sin(p.y*5.0)*uKick;
  float ty = p.y+0.3;
  if(ty<0.0) {
    for(int i=0; i<5; i++) {
      float a = float(i)*1.2566+tw*0.25;
      vec2 tc = vec2(cos(a),sin(a))*0.4;
      float td = length(p.xz-tc);
      float w = sin(ty*6.0-tw*1.5+float(i))*0.12;
      dome = min(dome, td-(0.08+w)*exp(ty*0.6));
    }
  }
  dome += 0.04*sin(p.x*12.0+tw)*sin(p.z*12.0)*uEnergy;
  return dome;
}

float blackholeSDF(vec3 p, float tw) {
  float hole = length(p) - 0.4;
  float diskR = length(p.xz) - 1.5;
  float disk = sqrt(diskR*diskR+p.y*p.y) - 0.08;
  disk += 0.06*sin(atan(p.z,p.x)*8.0+tw*3.0)*uEnergy;
  disk += 0.03*sin(length(p.xz)*12.0-tw*4.0)*uKick;
  return min(hole, disk);
}

float shapeSDF(vec3 p, int idx, float tw) {
  if(idx==0) return torusSDF(p, tw);
  if(idx==1) return crystalSDF(p, tw);
  if(idx==2) return jellyfishSDF(p, tw);
  return blackholeSDF(p, tw);
}

float morphedSDF(vec3 p, float tw) {
  float a = shapeSDF(p, uShapeA, tw);
  float b = shapeSDF(p, uShapeB, tw);
  return mix(a, b, uMorph);
}

// ── Tunnel walls: objects arranged cylindrically around camera path ──
float tunnelWallSDF(vec3 p) {
  // Cylindrical coords relative to camera XY path
  vec2 rel = p.xy - uCamXY;
  float r = length(rel);
  float a = atan(rel.y, rel.x);

  // Domain repeat around the ring and along Z
  float angCount = 10.0;
  float angPeriod = 6.283 / angCount;
  float zPeriod = uRepPeriod;

  float cellA = floor(a / angPeriod + 0.5);
  float cellZ = floor(p.z / zPeriod + 0.5);
  float localA = a - cellA * angPeriod;
  float localZ = p.z - cellZ * zPeriod;

  vec3 h = hash31(vec3(cellA, cellZ, 0.0));

  // Place objects at fixed radius from camera (tunnel wall — far enough to frame)
  float wallR = uCorridorR + 2.5 + h.x * 3.0;
  float objAngle = cellA * angPeriod;
  vec3 objPos = vec3(
    uCamXY.x + cos(objAngle) * wallR,
    uCamXY.y + sin(objAngle) * wallR,
    cellZ * zPeriod
  );

  vec3 q = p - objPos;
  q.xz *= rot2(h.y * 6.283 + uTime * 0.3);
  q.xy *= rot2(h.z * 3.14);
  float sc = (0.3 + h.y * 0.5) * uObjScale;
  q /= sc;

  float tw = uTime * 1.5 + uEnergy * 2.0 + h.z * 6.283;
  return morphedSDF(q, tw) * sc;
}

// ── Debris: sparks near tunnel walls ──
float debrisSDF(vec3 p) {
  vec2 rel = p.xy - uCamXY;
  float r = length(rel);
  if(r < uCorridorR * 0.7) return 20.0;

  float a = atan(rel.y, rel.x);
  float angPeriod = 6.283 / 20.0;
  float zPeriod = 2.5;
  float cellA = floor(a / angPeriod + 0.5);
  float cellZ = floor(p.z / zPeriod + 0.5);

  vec3 h = hash31(vec3(cellA, cellZ, 100.0));
  float debR = uCorridorR + 0.5 + h.x * 3.0;
  float objAngle = cellA * angPeriod;
  vec3 objPos = vec3(
    uCamXY.x + cos(objAngle) * debR,
    uCamXY.y + sin(objAngle) * debR,
    cellZ * zPeriod + (h.z - 0.5) * zPeriod * 0.3
  );

  float sz = (0.02 + h.y * 0.08) * uObjScale;
  return length(p - objPos) - sz;
}

// ── Corridor dust: tiny sparks that fly through the center ──
float dustSDF(vec3 p) {
  float zPeriod = 1.8;
  float cellZ = floor(p.z / zPeriod + 0.5);
  float localZ = p.z - cellZ * zPeriod;

  vec3 h = hash31(vec3(cellZ, 0.0, 777.0));
  vec3 h2 = hash31(vec3(cellZ, 1.0, 777.0));

  // Spread dust across the corridor with slight bias toward edges
  float dustR = h.x * uCorridorR * 1.2;
  float dustA = h.y * 6.283;
  vec3 dustPos = vec3(
    uCamXY.x + cos(dustA) * dustR,
    uCamXY.y + sin(dustA) * dustR,
    cellZ * zPeriod + (h.z - 0.5) * 0.6
  );

  // Tiny — these are hyperspace sparks
  float sz = 0.008 + h2.x * 0.025;
  // Elongate along Z for streak effect at speed
  vec3 q = p - dustPos;
  q.z *= 0.3;
  return length(q) - sz;
}

// ── Energy ring: mid-zone ring structure that pulses with beat ──
float energyRingSDF(vec3 p) {
  vec2 rel = p.xy - uCamXY;
  float r = length(rel);
  // Ring at middle distance between camera and tunnel walls
  float ringR = uCorridorR * 0.6 + uEnergy * 0.5;
  float zPeriod = 4.0 + uKick * 1.0;
  float cellZ = floor(p.z / zPeriod + 0.5);
  float localZ = p.z - cellZ * zPeriod;

  vec3 h = hash31(vec3(cellZ, 0.0, 500.0));
  // Thin torus ring
  float torusR = ringR + h.x * 0.5;
  float tubeR = 0.03 + uKick * 0.06 + uEnergy * 0.03;
  float d = length(vec2(r - torusR, localZ)) - tubeR;
  return d;
}

// ── Grand Attractor: massive black hole always ahead ──
float attractorSDF(vec3 p) {
  vec3 bhPos = vec3(uCamXY, uBHZ);
  vec3 rel = p - bhPos;

  // Tilt the disk so it's not perfectly edge-on
  float tilt = 0.35 + sin(uTime * 0.07) * 0.1;
  rel.xy *= rot2(tilt);

  float horizon = length(rel) - uBHSize * 0.4;

  // Multi-layered accretion disk
  float diskAngle = atan(rel.z, rel.x);
  float diskR2d = length(rel.xz);

  // Main disk — wide, turbulent
  float mainDiskR = diskR2d - uBHSize;
  float mainDisk = sqrt(mainDiskR * mainDiskR + rel.y * rel.y) - uBHSize * 0.06;
  mainDisk += 0.06 * sin(diskAngle * 16.0 + uTime * 6.0) * uEnergy;
  mainDisk += 0.04 * sin(diskAngle * 8.0 - uTime * 3.0) * uKick;
  mainDisk += 0.03 * sin(diskAngle * 24.0 + uTime * 10.0) * uHat;

  // Inner hot ring — tight, bright, fast-spinning
  float innerRing = abs(diskR2d - uBHSize * 0.55) - uBHSize * 0.025;
  innerRing = sqrt(innerRing * innerRing + rel.y * rel.y * 4.0);
  innerRing += 0.02 * sin(diskAngle * 20.0 + uTime * 12.0);

  // Mid ring
  float midRing = abs(diskR2d - uBHSize * 0.8) - uBHSize * 0.02;
  midRing = sqrt(midRing * midRing + rel.y * rel.y * 4.0);

  // Outer ring — faint, wide
  float outerRing = abs(diskR2d - uBHSize * 1.5) - uBHSize * 0.04;
  outerRing = sqrt(outerRing * outerRing + rel.y * rel.y * 2.0);

  // Far outer halo
  float haloRing = abs(diskR2d - uBHSize * 2.0) - uBHSize * 0.03;
  haloRing = sqrt(haloRing * haloRing + rel.y * rel.y);

  return min(horizon, min(mainDisk, min(innerRing, min(midRing, min(outerRing, haloRing)))));
}

// ── Megastructures: colossal geometry in the far distance ──
float megastructureSDF(vec3 p) {
  float megaPeriod = 40.0;
  float cellZ = floor(p.z / megaPeriod + 0.5);
  float localZ = p.z - cellZ * megaPeriod;

  vec3 h = hash31(vec3(cellZ, 0.0, 999.0));
  vec3 h2 = hash31(vec3(cellZ, 1.0, 999.0));

  // Place far from camera path — these are background architecture
  float megaR = uCorridorR + 8.0 + h.x * 12.0;
  float megaAngle = h.y * 6.283;
  vec3 center = vec3(
    uCamXY.x + cos(megaAngle) * megaR,
    uCamXY.y + sin(megaAngle) * megaR,
    cellZ * megaPeriod
  );

  vec3 q = p - center;
  // Slow rotation — these are massive, they barely move
  q.xz *= rot2(uTime * 0.02 + h.z * 6.283);
  q.xy *= rot2(h2.x * 3.14);

  float structType = h2.y;
  float d;

  if(structType < 0.25) {
    // Monolith — tall rectangular slab
    vec3 b = vec3(1.5, 8.0, 0.8);
    vec3 aq = abs(q) - b;
    d = length(max(aq, 0.0)) + min(max(aq.x, max(aq.y, aq.z)), 0.0);
  } else if(structType < 0.5) {
    // Ring gate — large torus you could fly through
    float gateR = 6.0;
    float tubeR = 0.8;
    float r2d = length(q.xy) - gateR;
    d = sqrt(r2d * r2d + q.z * q.z) - tubeR;
  } else if(structType < 0.75) {
    // Cross / antenna structure
    vec3 b1 = vec3(0.6, 10.0, 0.6);
    vec3 b2 = vec3(6.0, 0.6, 0.6);
    vec3 aq1 = abs(q) - b1;
    vec3 aq2 = abs(q) - b2;
    float d1 = length(max(aq1, 0.0)) + min(max(aq1.x, max(aq1.y, aq1.z)), 0.0);
    float d2 = length(max(aq2, 0.0)) + min(max(aq2.x, max(aq2.y, aq2.z)), 0.0);
    d = min(d1, d2);
  } else {
    // Arch / bridge
    float archR = 5.0;
    float archTube = 0.6;
    float r2d = length(q.xy) - archR;
    d = sqrt(r2d * r2d + q.z * q.z) - archTube;
    d = max(d, -q.y); // cut bottom half — arch shape
  }

  // Subtle energy pulse on surface
  d += 0.05 * sin(q.x * 3.0 + uTime * 0.5) * sin(q.y * 3.0) * uEnergy * 0.3;

  return d;
}

// ── Combined Scene ──
float sceneSDF(vec3 p) {
  float tw = tunnelWallSDF(p);
  float db = debrisSDF(p);
  float du = dustSDF(p);
  float er = energyRingSDF(p);
  float mg = megastructureSDF(p);
  float bh = attractorSDF(p);
  return min(bh, min(mg, min(er, min(du, min(tw, db)))));
}

void main() {
  vec2 uv = (vUV*2.0-1.0) * vec2(uRes.x/uRes.y, 1.0);

  // Forward-flying camera
  vec2 mOff = (uMouse - 0.5)*2.0;
  float driftX = sin(uTime*0.23)*2.0 + cos(uTime*0.17)*1.5 + mOff.x*2.0;
  float driftY = sin(uTime*0.19)*1.5 + cos(uTime*0.31)*1.0 - mOff.y*1.5;

  vec3 shake = vec3(
    sin(uTime*45.0)*uKick*0.4 + sin(uTime*12.0)*uSnare*0.15,
    cos(uTime*38.0)*uKick*0.3 + cos(uTime*15.0)*uSnare*0.1,
    sin(uTime*25.0)*uChaos*0.15
  );

  vec3 ro = vec3(driftX, driftY, uCamZ) + shake;
  vec3 lookAt = ro + vec3(
    sin(uTime*0.1)*0.3 + mOff.x*0.5,
    cos(uTime*0.13)*0.2 - mOff.y*0.3,
    5.0
  );

  // Camera roll from chaos
  float roll = sin(uTime*0.15)*0.15 + uChaos*sin(uTime*2.0)*0.2;
  vec3 fwd = normalize(lookAt - ro);
  vec3 worldUp = vec3(sin(roll), cos(roll), 0.0);
  vec3 right = normalize(cross(fwd, worldUp));
  vec3 up = cross(right, fwd);

  // FOV breathes with energy — widens on drops
  float fov = 1.5 + uEnergy*0.5 + uKick*0.3;
  vec3 rd = normalize(fwd*fov + uv.x*right + uv.y*up);

  // Gravitational lensing — strong, Elite Dangerous style
  vec3 bhPos = vec3(uCamXY, uBHZ);
  vec3 toBH = bhPos - ro;
  float bhDist = length(toBH);
  vec3 bhDir = toBH / max(bhDist, 0.1);
  float alignment = dot(rd, bhDir);
  vec3 perpToBH = rd - bhDir * alignment;
  float lensR = length(perpToBH);
  if(lensR > 0.001 && bhDist > 0.5) {
    float proximity = 12.0 / max(bhDist, 1.5);
    float lensStrength = uBHSize * 0.25 / (lensR * bhDist + 0.3);
    lensStrength *= proximity * (1.0 + uKick * 2.0 + uEnergy * 0.8);
    // Stronger cap — let the warp get dramatic
    rd = normalize(rd + perpToBH / lensR * min(lensStrength, 0.6));
  }

  // Raymarch with volumetric glow accumulation
  float dist = 0.0, minDist = 999.0;
  bool hit = false;
  vec3 p;
  float glowAccum = 0.0;
  float bhGlow = 0.0;
  for(int i=0; i<STEPS; i++) {
    p = ro + rd*dist;
    float d = sceneSDF(p);
    minDist = min(minDist, abs(d));

    // Volumetric glow — objects emit light proportional to proximity
    glowAccum += exp(-abs(d) * 5.0) * 0.02 * (1.0 + uEnergy);

    // Track proximity to black hole for special glow — scales with BH size
    float bhProx = length(p - bhPos);
    bhGlow += exp(-bhProx * 0.2 / max(uBHSize, 0.5)) * 0.012 * (1.0 + uKick * 2.5);

    if(abs(d) < SURF) { hit = true; break; }
    dist += abs(d)*0.7;
    if(dist > MAX_DIST) break;
  }

  // Palette — hue shifts with music
  vec3 fogCol = hsl(uHue/360.0, 0.4, 0.02);
  vec3 kickCol = hsl(310.0/360.0, 1.0, 0.5 + uKick*0.2);
  vec3 hatCol = hsl(fract(uHue/360.0+0.5), 1.0, 0.5);
  vec3 snareCol = hsl(fract(uHue/360.0+0.25), 1.0, 0.55);
  vec3 bhCol = mix(
    hsl(uHue/360.0, 1.0, 0.6),
    vec3(1.0, 0.9, 0.7),
    0.5 + uKick * 0.3
  );

  vec3 col = fogCol;

  if(hit) {
    float dW = tunnelWallSDF(p);
    float dD = debrisSDF(p);
    float dDu = dustSDF(p);
    float dER = energyRingSDF(p);
    float dMG = megastructureSDF(p);
    float dBH = attractorSDF(p);
    float nearest = min(dW, min(dD, min(dDu, min(dER, min(dMG, dBH)))));

    vec3 surfCol;
    if(abs(dBH - nearest) < 0.02) {
      // Black hole
      vec3 bhRel = p - bhPos;
      float tilt = 0.35 + sin(uTime * 0.07) * 0.1;
      bhRel.xy *= rot2(tilt);
      float distFromCenter = length(bhRel);
      float diskR2d = length(bhRel.xz);
      if(distFromCenter < uBHSize * 0.35) {
        surfCol = vec3(0.0);
      } else {
        float heat = exp(-abs(diskR2d - uBHSize) * 2.0 / uBHSize);
        float innerHeat = exp(-abs(diskR2d - uBHSize * 0.55) * 4.0 / uBHSize);
        float spin = sin(atan(bhRel.z, bhRel.x) * 12.0 + uTime * 6.0);
        float spin2 = sin(atan(bhRel.z, bhRel.x) * 20.0 + uTime * 12.0);
        // Inner ring burns white-hot, outer is colored
        vec3 innerCol = vec3(1.0, 0.95, 0.85) * (2.0 + uKick * 1.5);
        surfCol = mix(kickCol, bhCol, heat);
        surfCol = mix(surfCol, innerCol, innerHeat);
        surfCol *= (1.5 + uKick * 1.0 + spin * 0.3 * uEnergy + spin2 * 0.15 * uHat);
      }
    } else if(abs(dER - nearest) < 0.02) {
      // Energy rings — hot white-cyan, pulse with kick
      float ringGlow = 1.5 + uKick * 2.0 + uEnergy * 1.0;
      surfCol = mix(vec3(0.3, 0.8, 1.0), vec3(1.0, 0.6, 0.9), uKick * 0.6 + sin(uTime * 2.0) * 0.3);
      surfCol *= ringGlow;
    } else if(abs(dDu - nearest) < 0.02) {
      // Corridor dust — bright white-blue sparks, flash on hats
      surfCol = mix(vec3(0.7, 0.85, 1.0), hatCol, 0.3) * (2.0 + uHat * 3.0 + uEnergy);
    } else if(abs(dMG - nearest) < 0.02) {
      // Megastructures — dark silhouettes with edge glow
      vec3 megaEdge = hsl(fract(uHue/360.0 + 0.15), 0.6, 0.3);
      surfCol = megaEdge * (0.15 + uEnergy * 0.2 + uKick * 0.3);
      // Subtle pulse along surface
      float edgePulse = sin(p.z * 0.5 + uTime * 0.8) * 0.5 + 0.5;
      surfCol += megaEdge * edgePulse * 0.1;
    } else if(abs(dW - nearest) < 0.02) {
      // Tunnel walls
      float posHue = sin(p.x*0.5+uTime)*0.15 + sin(p.z*0.3-uTime*0.7)*0.1;
      surfCol = hsl(fract(uHue/360.0 + posHue + uSnare*0.1), 0.9 + uKick*0.1, 0.4 + uKick*0.2);
      surfCol = mix(surfCol, kickCol, uKick * 0.5);
      surfCol = mix(surfCol, hatCol, uHat * 0.3);
      surfCol *= 0.7 + uKick * 1.0 + uEnergy * 0.5;
    } else {
      // Debris
      surfCol = mix(hatCol, snareCol, 0.5) * (1.0 + uHat * 2.0);
    }

    float glow = 2.5 / (1.0 + dist*dist*0.06);
    col = surfCol * glow;

    // Edge rim that pulses with beat
    vec3 rimCol = mix(hatCol, kickCol, 0.5+0.5*sin(uTime));
    col += rimCol * smoothstep(0.01, 0.05, minDist) * (0.3 + uKick * 0.5);
  }

  // Black hole volumetric glow — scales with BH size
  col += bhCol * min(bhGlow, 0.8) * (1.0 + uKick * 2.0);

  // Volumetric glow from all objects — holographic wireframe feel
  vec3 glowCol = mix(kickCol, hatCol, 0.5+0.5*sin(uTime*0.5));
  col += glowCol * glowAccum * (0.6 + uEnergy);

  // Near-miss halo
  float nearGlow = min(0.05/(0.01+minDist*minDist), 0.8);
  col += glowCol * nearGlow * (0.2 + uEnergy * 0.3);

  // Kick flash — whole scene brightens on beat
  col += kickCol * uKick * 0.08;

  // Distance fog
  float fogFactor = 1.0 - exp(-dist * uFogDensity);
  col = mix(col, fogCol, fogFactor);

  // Scanlines + vignette
  col *= 1.0 - 0.06*step(0.5, fract(gl_FragCoord.y*0.5))*(1.0+uChaos);
  col *= 1.0 - dot(vUV*2.0-1.0, vUV*2.0-1.0)*0.25;

  fragColor = vec4(col, 1.0);
}`;

const POST_FS = `#version 300 es
precision highp float;
in vec2 vUV;
out vec4 fragColor;
uniform sampler2D uScene, uPrev;
uniform float uTime, uEnergy, uKick, uChaos, uPhase, uCamSpeed;
uniform vec2 uRes;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

vec2 crtDistort(vec2 uv) {
  vec2 cc = uv - 0.5;
  float d = dot(cc, cc) * 0.08;
  return uv + cc * d;
}

vec3 colorGrade(vec3 col, float phase) {
  float p = mod(phase, 4.0);
  vec3 tint;
  float strength;

  if (p < 1.0) {
    float lum = dot(col, vec3(0.299, 0.587, 0.114));
    vec3 shadows = vec3(0.1, 0.4, 0.5);
    vec3 highlights = vec3(1.0, 0.3, 0.6);
    tint = mix(shadows, highlights, lum);
    strength = 0.15;
  } else if (p < 2.0) {
    tint = mix(col, col * vec3(0.6, 1.2, 0.4), 0.3);
    return mix(col, tint, 0.5);
  } else if (p < 3.0) {
    float lum = dot(col, vec3(0.299, 0.587, 0.114));
    vec3 shadows = vec3(0.05, 0.1, 0.3);
    vec3 highlights = vec3(0.7, 0.8, 1.0);
    tint = mix(shadows, highlights, lum);
    strength = 0.2;
  } else {
    tint = mix(col, col * vec3(1.3, 0.8, 0.4), 0.3);
    return mix(col, tint, 0.4);
  }
  return mix(col, tint, strength);
}

void main() {
  vec2 uv = crtDistort(vUV);

  if (uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) {
    fragColor = vec4(0.0, 0.0, 0.0, 1.0);
    return;
  }

  float ca = 0.002 + uChaos * 0.005 + uKick * 0.006;
  vec3 col;
  col.r = texture(uScene, uv + vec2(ca, 0.0)).r;
  col.g = texture(uScene, uv).g;
  col.b = texture(uScene, uv - vec2(ca, 0.0)).b;

  // Bloom
  vec3 bloom = vec3(0.0); float total = 0.0;
  for (int i = -3; i <= 3; i++) {
    float w = exp(-float(i*i)/4.5);
    bloom += texture(uScene, uv + vec2(float(i)/uRes.x*5.0, 0.0)).rgb * w;
    bloom += texture(uScene, uv + vec2(0.0, float(i)/uRes.y*5.0)).rgb * w;
    total += w * 2.0;
  }
  bloom = max(bloom/total - ${CFG.post.bloomThreshold.toFixed(1)}, 0.0) * ${CFG.post.bloomIntensity.toFixed(1)};
  col += bloom * (0.2 + uKick * ${CFG.post.bloomKickBoost.toFixed(2)});

  // Feedback trail — zoom scales with camera velocity for motion blur
  float feedbackZoom = ${CFG.post.feedbackBaseZoom.toFixed(2)} - uCamSpeed * 0.006;
  vec2 prevUV = crtDistort((vUV - 0.5) * feedbackZoom + 0.5);
  vec3 prev = texture(uPrev, prevUV).rgb * ${CFG.post.feedbackDecay.toFixed(2)};
  col = mix(col, prev, ${CFG.post.feedbackBlend.toFixed(2)});

  // VHS glitch
  if (uChaos > 0.4) {
    float strip = step(0.97, fract(sin(floor(uv.y*uRes.y*0.05+uTime*30.0)*43758.5453)));
    float disp = strip * sin(uTime*100.0) * 0.02 * uChaos;
    vec3 d;
    d.r = texture(uScene, uv + vec2(disp+ca, 0)).r;
    d.g = texture(uScene, uv + vec2(disp, 0)).g;
    d.b = texture(uScene, uv + vec2(disp-ca, 0)).b;
    col = mix(col, d.gbr, strip * uChaos * 0.7);
  }

  // Kick flash
  col += vec3(1.0, 0.3, 0.6) * smoothstep(0.8, 1.0, uKick) * 0.12;

  // Color grading
  col = colorGrade(col, uPhase);

  // Film grain
  float grain = hash(uv * uRes + fract(uTime * 100.0)) - 0.5;
  col += grain * (0.03 + uChaos * 0.04);

  // CRT scanlines
  float scanline = sin(gl_FragCoord.y * 1.5) * 0.5 + 0.5;
  col *= 0.92 + scanline * 0.08;

  // RGB subpixel
  float px = mod(gl_FragCoord.x, 3.0);
  vec3 subpx = vec3(
    smoothstep(0.0, 1.0, 1.0 - abs(px - 0.5)),
    smoothstep(0.0, 1.0, 1.0 - abs(px - 1.5)),
    smoothstep(0.0, 1.0, 1.0 - abs(px - 2.5))
  );
  col = mix(col, col * subpx, 0.1);

  // Vignette
  vec2 vig = vUV * 2.0 - 1.0;
  float vigF = 1.0 - dot(vig, vig) * ${CFG.post.vignetteStrength.toFixed(2)};
  vigF *= 1.0 - pow(max(abs(vig.x), abs(vig.y)), 8.0) * 0.3;
  col *= vigF;

  // Tone map + saturation
  col = col / (1.0 + col * ${CFG.post.toneMapCompression.toFixed(2)});
  float lum = dot(col, vec3(0.299, 0.587, 0.114));
  col = mix(vec3(lum), col, ${CFG.post.saturationBoost.toFixed(2)});
  col = clamp(col, 0.0, ${CFG.post.maxBrightness.toFixed(2)});

  fragColor = vec4(col, 1.0);
}`;

// ─── Compile & Link ─────────────────────────────────────────────────
function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    showError('Shader compile error:\n' + gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

function linkProgram(vsSrc, fsSrc) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(vsSrc, gl.VERTEX_SHADER));
  gl.attachShader(p, compileShader(fsSrc, gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    showError('Program link error:\n' + gl.getProgramInfoLog(p));
    return null;
  }
  return p;
}

const sceneProg = linkProgram(FULLSCREEN_VS, SCENE_FS);
const postProg = linkProgram(FULLSCREEN_VS, POST_FS);
if (!sceneProg || !postProg) throw 'Shader compilation failed';

function getUniforms(prog, names) {
  const u = {};
  for (const n of names) u[n] = gl.getUniformLocation(prog, n);
  return u;
}

const sceneU = getUniforms(sceneProg, [
  'uTime','uEnergy','uKick','uSnare','uHat','uChaos','uHue','uRes','uMorph',
  'uShapeA','uShapeB','uMouse','uCamZ','uTunnelBlend','uFogDensity','uRepPeriod','uObjScale',
  'uCamXY','uCorridorR','uBHZ','uBHSize'
]);
const postU = getUniforms(postProg, [
  'uScene','uPrev','uTime','uEnergy','uKick','uChaos','uRes','uPhase','uCamSpeed'
]);
const emptyVAO = gl.createVertexArray();

// ─── Framebuffers ───────────────────────────────────────────────────
let screenW = 0, screenH = 0, sceneW = 0, sceneH = 0;
const sceneFB = { fb: null, tex: null };
const ppFB = [{ fb: null, tex: null }, { fb: null, tex: null }];
let ppIdx = 0;

function createFBO(w, h) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, FB_INT, w, h, 0, gl.RGBA, FB_TYPE, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fb = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  return { fb, tex };
}

function rebuildFBs() {
  const w = glCanvas.width, h = glCanvas.height;
  if (w === screenW && h === screenH) return;
  screenW = w; screenH = h;
  sceneW = Math.floor(w / 2); sceneH = Math.floor(h / 2);
  for (const o of [sceneFB, ppFB[0], ppFB[1]]) {
    if (o.fb) gl.deleteFramebuffer(o.fb);
    if (o.tex) gl.deleteTexture(o.tex);
  }
  Object.assign(sceneFB, createFBO(sceneW, sceneH));
  Object.assign(ppFB[0], createFBO(w, h));
  Object.assign(ppFB[1], createFBO(w, h));
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
}

// ─── Audio Engine ───────────────────────────────────────────────────
let audioCtx = null, analyser = null, sourceNode = null, audioEl = null;
let isPlaying = false, isPaused = false;
let freqData, timeData;
const bands = { sub: 0, low: 0, mid: 0, high: 0 };
const prevBands = { sub: 0, low: 0, mid: 0, high: 0 };
const bandPeaks = { sub: 0, low: 0, mid: 0, high: 0 };
let spectralCentroid = 1000, chaosMetric = 0, cumulativeHue = 0;
const onsetTimes = [];
const smoothBars = new Float32Array(CFG.numBars);

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = CFG.fftSize;
    analyser.smoothingTimeConstant = 0.4;
    analyser.minDecibels = -90;
    analyser.maxDecibels = -10;
    analyser.connect(audioCtx.destination);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.frequencyBinCount);
  } catch (e) {
    showError('Audio init failed: ' + e.message);
  }
}

function binForHz(hz) { return Math.round(hz / (audioCtx.sampleRate / CFG.fftSize)); }

function bandEnergy(lo, hi) {
  const a = Math.max(0, binForHz(lo));
  const b = Math.min(binForHz(hi), freqData.length - 1);
  if (b < a) return 0;
  let s = 0;
  for (let i = a; i <= b; i++) s += freqData[i];
  return s / ((b - a + 1) * 255);
}

function totalEnergy() {
  return Math.min(1, (bands.sub + bands.low + bands.mid + bands.high) / 2);
}

function processAudio() {
  if (!analyser || !isPlaying) return;
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);

  const br = CFG.bandRanges;
  const raw = {
    sub: bandEnergy(...br.sub), low: bandEnergy(...br.low),
    mid: bandEnergy(...br.mid), high: bandEnergy(...br.high),
  };

  for (const k of ['sub', 'low', 'mid', 'high']) {
    prevBands[k] = bands[k];
    bands[k] += (raw[k] - bands[k]) * CFG.smoothAlpha;
    const delta = bands[k] - prevBands[k];
    if (delta > bandPeaks[k] * 0.15 + 0.003) {
      bandPeaks[k] = Math.max(bandPeaks[k], bands[k]);
      onsetTimes.push(performance.now());
    }
    bandPeaks[k] *= 0.98;
  }

  let num = 0, den = 0;
  for (let i = 0; i < freqData.length; i++) {
    const m = freqData[i] / 255;
    num += i * audioCtx.sampleRate / CFG.fftSize * m;
    den += m;
  }
  spectralCentroid = den > 0.01 ? num / den : 1000;
  cumulativeHue += totalEnergy() * 0.5;

  const now = performance.now();
  while (onsetTimes.length && onsetTimes[0] < now - 1000) onsetTimes.shift();
  chaosMetric = Math.min(1, onsetTimes.length / 15);

  for (let i = 0; i < CFG.numBars; i++) {
    const f0 = Math.floor(Math.pow(i / CFG.numBars, 2) * freqData.length);
    const f1 = Math.floor(Math.pow((i + 1) / CFG.numBars, 2) * freqData.length);
    let sum = 0, count = 0;
    for (let j = f0; j < f1 && j < freqData.length; j++) { sum += freqData[j]; count++; }
    const val = count > 0 ? sum / count / 255 : 0;
    smoothBars[i] += (val - smoothBars[i]) * 0.3;
  }
}

// ─── Song Section Detection ─────────────────────────────────────────
const energyHistory = {
  buffer: new Float32Array(300), // ~5 seconds at 60fps
  idx: 0,
  filled: 0,
  avg: 0,
  trend: 0, // positive = rising, negative = falling
  trendDuration: 0, // seconds the trend has been sustained
  ratio: 1.0, // current / avg
  section: 'sustain', // 'breakdown', 'buildup', 'drop', 'sustain'
  dropCooldown: 0, // prevent rapid re-triggering
  prevSection: 'sustain',
};

function updateSongSection(dt) {
  const e = totalEnergy();
  const buf = energyHistory.buffer;
  buf[energyHistory.idx] = e;
  energyHistory.idx = (energyHistory.idx + 1) % buf.length;
  if (energyHistory.filled < buf.length) energyHistory.filled++;

  // Rolling average
  let sum = 0;
  for (let i = 0; i < energyHistory.filled; i++) sum += buf[i];
  energyHistory.avg = energyHistory.filled > 0 ? sum / energyHistory.filled : e;

  // Ratio: current vs recent average
  energyHistory.ratio = energyHistory.avg > 0.01 ? e / energyHistory.avg : 1.0;

  // Trend: compare recent 30 frames to older 30 frames
  const recent = 30, older = 30;
  if (energyHistory.filled > recent + older) {
    let recentSum = 0, olderSum = 0;
    for (let i = 0; i < recent; i++) {
      const ri = (energyHistory.idx - 1 - i + buf.length) % buf.length;
      recentSum += buf[ri];
    }
    for (let i = recent; i < recent + older; i++) {
      const ri = (energyHistory.idx - 1 - i + buf.length) % buf.length;
      olderSum += buf[ri];
    }
    const newTrend = (recentSum / recent) - (olderSum / older);
    if (Math.sign(newTrend) === Math.sign(energyHistory.trend)) {
      energyHistory.trendDuration += dt;
    } else {
      energyHistory.trendDuration = 0;
    }
    energyHistory.trend = newTrend;
  }

  energyHistory.dropCooldown = Math.max(0, energyHistory.dropCooldown - dt);

  // Section classification
  energyHistory.prevSection = energyHistory.section;
  if (energyHistory.ratio > 1.6 && energyHistory.dropCooldown <= 0 && energyHistory.trend > 0.02) {
    energyHistory.section = 'drop';
    energyHistory.dropCooldown = 3.0; // don't re-trigger for 3 seconds
  } else if (energyHistory.ratio < 0.45 && e < 0.25) {
    energyHistory.section = 'breakdown';
  } else if (energyHistory.trend > 0.01 && energyHistory.trendDuration > 1.5) {
    energyHistory.section = 'buildup';
  } else {
    energyHistory.section = 'sustain';
  }
}

// ─── Particle Pool ──────────────────────────────────────────────────
const pool = new Array(CFG.maxParticles);
for (let i = 0; i < CFG.maxParticles; i++) {
  pool[i] = { alive: false, x: 0, y: 0, vx: 0, vy: 0, hue: 0, size: 0, life: 0, maxLife: 0, gravity: 0 };
}

function spawnOne(x, y, vx, vy, hue, size, life, grav) {
  for (let i = 0; i < CFG.maxParticles; i++) {
    const p = pool[i];
    if (!p.alive) {
      p.alive = true; p.x = x; p.y = y; p.vx = vx; p.vy = vy;
      p.hue = hue; p.size = size; p.life = life; p.maxLife = life; p.gravity = grav;
      return;
    }
  }
}

function rand(min, max) { return min + Math.random() * (max - min); }

function spawnBurst(type, hue) {
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  const cfg = CFG.spawn[type];
  const count = Math.floor(rand(...cfg.count));
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = rand(...cfg.speed);
    spawnOne(
      cx + Math.cos(a) * 10, cy + Math.sin(a) * 10,
      Math.cos(a) * spd, Math.sin(a) * spd,
      hue + rand(-20, 20), rand(...cfg.size), rand(...cfg.life), cfg.gravity
    );
  }
}

let prevKick = 0, prevSnare = 0, prevHat = 0;

function updateSpawns() {
  if (!isPlaying) return;
  const kd = bands.sub - prevKick;
  const sd = bands.low - prevSnare;
  const hd = bands.high - prevHat;
  const e = totalEnergy();
  const th = CFG.onsetThresholds;
  const hueVal = (spectralCentroid - 200) / 3800 * 360 + 180;

  if (kd > th.kick) {
    spawnBurst('kick', 310);
    spawnRing(310);
    spawnTear();
    if (Math.random() < 0.5) spawnTear();
  }
  if (sd > th.snare) {
    spawnBurst('snare', 0);
    spawnRing(0);
    if (Math.random() < 0.4) spawnTear();
  }
  if (hd > th.hat) { spawnBurst('hat', hueVal); if (Math.random() < 0.3) spawnTear(); }
  if (e > CFG.peakEnergyMin && kd > th.peak) {
    spawnBurst('peak', Math.random() * 360);
    spawnRing(Math.random() * 360);
    spawnTear(); spawnTear();
    if (Math.random() < 0.5) spawnTear();
  }

  prevKick = bands.sub; prevSnare = bands.low; prevHat = bands.high;
}

// ─── Shock Rings ────────────────────────────────────────────────────
const shockRings = [];

function spawnRing(hue) {
  shockRings.push({
    r: 0,
    maxR: Math.min(window.innerWidth, window.innerHeight) * 0.6,
    life: 1.0, hue,
    speed: 400 + Math.random() * 300,
  });
  if (shockRings.length > CFG.maxRings) shockRings.shift();
}

// ─── Starfield (forward-streaming hyperspace) ───────────────────────
const stars = [];
for (let i = 0; i < CFG.numStars; i++) {
  stars.push({
    angle: Math.random() * Math.PI * 2,
    dist: 0.05 + Math.random() * 1.2,
    speed: 0.03 + Math.random() * 0.12,
    size: 1.0 + Math.random() * 2.5,
    hue: Math.random() * 360,
  });
}

// ─── Reality Tears ──────────────────────────────────────────────────
const tears = [];

function spawnTear() {
  const side = Math.random() < 0.5 ? -1 : 1;
  tears.push({
    x: window.innerWidth * (0.5 + side * (0.25 + Math.random() * 0.25)),
    y: window.innerHeight * (0.1 + Math.random() * 0.8),
    w: 3 + Math.random() * 12,
    h: 40 + Math.random() * 200,
    life: 0.4 + Math.random() * 0.8,
    maxLife: 0.4 + Math.random() * 0.8,
    hue: Math.random() * 360,
    drift: (Math.random() - 0.5) * 60,
    jagged: Math.random() < 0.5,
  });
  if (tears.length > CFG.maxTears) tears.shift();
}

// ─── Evolution + Camera State ───────────────────────────────────────
let cameraZ = 0;
let cameraSpeed = 0;

// Black hole: fixed world position, you approach and pass through it
let bhWorldZ = 40.0; // starts 40 units ahead
let bhPassFlash = 0; // flash intensity when passing through

// Evolution phase system
let evoPhaseIdx = 0;
let evoPhaseTimer = 0;
const evoSmooth = {
  repPeriod: 6.0, fogDensity: 0.06, speedMul: 1.0,
  tunnelBlend: 0.0, objScale: 1.0, colorGrade: 0,
};

// Shape morphing
let currentShape = 0;
let nextShape = 1;
let shapeTimer = 0;
let morphProgress = 0;
let isMorphing = false;

// Mouse tracking
let mouseX = 0.5, mouseY = 0.5;
let smoothMouseX = 0.5, smoothMouseY = 0.5;
document.addEventListener('mousemove', e => {
  mouseX = e.clientX / window.innerWidth;
  mouseY = e.clientY / window.innerHeight;
});

// ─── Canvas 2D Helpers ──────────────────────────────────────────────
function drawPolygon(cx, cy, r, sides, rotation, color, alpha, lineW) {
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = lineW;
  ctx.beginPath();
  for (let i = 0; i <= sides; i++) {
    const a = rotation + (i / sides) * Math.PI * 2;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.globalAlpha = 1;
}

// ─── Canvas 2D Overlay ──────────────────────────────────────────────
let overlayTime = 0;

function drawOverlay(dt, W, H, energy, kick, hue) {
  ctx.clearRect(0, 0, W, H);
  overlayTime += dt;
  const cx = W / 2, cy = H / 2;

  // Vanishing point shifts with camera drift / mouse
  const vpX = cx + (smoothMouseX - 0.5) * W * 0.3;
  const vpY = cy + (smoothMouseY - 0.5) * H * 0.3;

  // BH screen position — roughly at vanishing point, offset by look perturbation
  const bhScreenX = vpX + Math.sin(overlayTime * 0.1) * W * 0.02;
  const bhScreenY = vpY + Math.cos(overlayTime * 0.13) * H * 0.02;
  const bhProximity = Math.min(1.0, 10.0 / Math.max(bhWorldZ - cameraZ, 1.0));
  const lensRadius = W * 0.15 * bhProximity * (1.0 + kick * 0.5);

  // Forward-streaming starfield with gravitational lensing
  const starSpeed = 0.5 + energy * 3.0 + cameraSpeed * 0.05;
  for (const s of stars) {
    s.dist += s.speed * starSpeed * dt;
    if (s.dist > 1.5) {
      s.dist = 0.02;
      s.angle = Math.random() * Math.PI * 2;
      s.hue = hue + Math.random() * 60;
    }
    let x = vpX + Math.cos(s.angle) * s.dist * W * 0.65;
    let y = vpY + Math.sin(s.angle) * s.dist * H * 0.65;

    // Gravitational lensing — bend stars around BH screen position
    const toBHx = bhScreenX - x;
    const toBHy = bhScreenY - y;
    const toBHdist = Math.sqrt(toBHx * toBHx + toBHy * toBHy) || 1;
    if (toBHdist < lensRadius * 3.0 && bhProximity > 0.1) {
      const lensStr = lensRadius * 40.0 / (toBHdist * toBHdist + lensRadius * 0.5);
      // Deflect tangentially (perpendicular to radial direction)
      const tangX = -toBHy / toBHdist;
      const tangY = toBHx / toBHdist;
      x += tangX * lensStr * bhProximity;
      y += tangY * lensStr * bhProximity;
      // Stars very close to BH get smeared into arcs — boost alpha + streak
      if (toBHdist < lensRadius) {
        s._lensed = Math.min(1.0, lensRadius / (toBHdist + 1.0));
      } else {
        s._lensed = 0;
      }
    } else {
      s._lensed = 0;
    }

    const alpha = Math.min(1, s.dist * 2) * (0.4 + energy * 0.6);
    const sz = s.size * (0.3 + s.dist * 2.5);

    const dx = x - vpX;
    const dy = y - vpY;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const nx = dx / len;
    const ny = dy / len;
    // Lensed stars get longer streaks
    const streakLen = s.dist * starSpeed * 2.5 * (1.0 + s._lensed * 3.0);

    ctx.globalAlpha = alpha * (1.0 + s._lensed * 0.5);
    const starLit = 70 + Math.floor(s._lensed * 20);
    ctx.strokeStyle = `hsl(${s.hue},${80 + Math.floor(s._lensed * 20)}%,${starLit}%)`;
    ctx.lineWidth = sz * (0.4 + s._lensed * 0.6);
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x - nx * streakLen, y - ny * streakLen);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Hyperspace tunnel lines on sustained high energy
  if (energy > 0.4) {
    const tunnelIntensity = Math.min(1.0, (energy - 0.4) / 0.4);
    const numLines = 24;
    ctx.lineWidth = 1.0 + tunnelIntensity;
    for (let i = 0; i < numLines; i++) {
      const a = (i / numLines) * Math.PI * 2 + overlayTime * 0.15;
      const innerR = 0.05 + tunnelIntensity * 0.02;
      const outerR = 0.3 + tunnelIntensity * 0.5;
      const x1 = vpX + Math.cos(a) * innerR * W;
      const y1 = vpY + Math.sin(a) * innerR * H;
      const x2 = vpX + Math.cos(a) * outerR * W;
      const y2 = vpY + Math.sin(a) * outerR * H;
      const lineHue = (hue + i * (360 / numLines)) % 360;
      ctx.globalAlpha = tunnelIntensity * (0.08 + kick * 0.12);
      ctx.strokeStyle = `hsl(${lineHue},60%,50%)`;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  if (isPlaying && freqData) {
    // Side Frequency Bars
    const barH = H * 0.6;
    const startY = H * 0.2;
    for (let i = 0; i < CFG.numBars; i++) {
      const v = smoothBars[i];
      const yPos = startY + i * (barH / CFG.numBars);
      const barLen = v * W * 0.25;
      const barHue = 310 - i * (310 / CFG.numBars) + (hue * 0.3);
      const sat = i > CFG.numBars * 0.8 ? 60 : 100;
      const lit = 40 + v * 30;
      ctx.fillStyle = `hsla(${barHue},${sat}%,${lit}%,${0.5 + v * 0.5})`;
      ctx.fillRect(0, yPos, barLen, Math.max(1, barH / CFG.numBars - 2));
      ctx.fillRect(W - barLen, yPos, barLen, Math.max(1, barH / CFG.numBars - 2));
    }

    // Tunnel of Spectrum Rings — THE MAIN EVENT, fills the center
    for (let depth = 0; depth < 4; depth++) {
      const depthScale = 1.0 - depth * 0.18;
      const depthAlpha = 1.0 - depth * 0.2;
      const ringR = Math.min(W, H) * 0.42 * depthScale;
      const ringCX = cx + (vpX - cx) * depth * 0.12;
      const ringCY = cy + (vpY - cy) * depth * 0.12;

      ctx.lineWidth = Math.max(2, 4 - depth);
      for (let i = 0; i < 128; i++) {
        const idx = Math.floor(Math.pow(i / 128, 1.5) * freqData.length);
        const v = freqData[Math.min(idx, freqData.length - 1)] / 255;
        const angle = (i / 128) * Math.PI * 2 - Math.PI / 2;
        const inner = ringR - 10;
        const outer = ringR + v * ringR * 0.8 * depthScale;
        const rHue = (hue + i * (360 / 128) + depth * 50) % 360;
        ctx.strokeStyle = `hsla(${rHue},100%,${55 + v * 25}%,${(0.5 + v * 0.5) * depthAlpha})`;
        ctx.beginPath();
        ctx.moveTo(ringCX + Math.cos(angle) * inner, ringCY + Math.sin(angle) * inner);
        ctx.lineTo(ringCX + Math.cos(angle) * outer, ringCY + Math.sin(angle) * outer);
        ctx.stroke();
      }
    }

    // Spinning Wireframe Shapes with parallax
    const shapes = [
      { x: W*0.13, y: H*0.18, sides: 5, rMul: 1.2, speed: 0.7,  band: bands.sub, depth: 0.8 },
      { x: W*0.87, y: H*0.18, sides: 3, rMul: 1.0, speed: -1.1, band: bands.low, depth: 0.5 },
      { x: W*0.13, y: H*0.82, sides: 6, rMul: 1.1, speed: 0.9,  band: bands.mid, depth: 0.7 },
      { x: W*0.87, y: H*0.82, sides: 4, rMul: 0.9, speed: -0.8, band: bands.high, depth: 0.4 },
      { x: W*0.06, y: H*0.5,  sides: 7, rMul: 0.8, speed: 0.5,  band: (bands.sub + bands.low) / 2, depth: 0.9 },
      { x: W*0.94, y: H*0.5,  sides: 8, rMul: 0.7, speed: -0.6, band: (bands.mid + bands.high) / 2, depth: 0.6 },
    ];
    for (const sh of shapes) {
      // Parallax: shapes at different depths shift with mouse
      const parallaxX = (smoothMouseX - 0.5) * sh.depth * 60;
      const parallaxY = (smoothMouseY - 0.5) * sh.depth * 40;
      const sx = sh.x + parallaxX;
      const sy = sh.y + parallaxY;
      const r = (60 + sh.band * 120) * sh.rMul;
      const rot = overlayTime * sh.speed;
      const shHue = (hue + sh.sides * 50) % 360;
      drawPolygon(sx, sy, r, sh.sides, rot, `hsl(${shHue},100%,60%)`, 0.35 + sh.band * 0.5, 2.5);
      drawPolygon(sx, sy, r*0.65, sh.sides, -rot*1.3, `hsl(${(shHue+40)%360},80%,50%)`, 0.25 + sh.band * 0.4, 2);
      drawPolygon(sx, sy, r*0.35, sh.sides, rot*2, `hsl(${(shHue+80)%360},90%,55%)`, 0.2 + sh.band * 0.3, 1.5);
    }

    // Bass Pulse Arcs
    const bassR = Math.min(W, H) * 0.45;
    const bassKick = bands.sub;
    for (let i = 0; i < 3; i++) {
      const arcR = bassR * (0.6 + i * 0.2) + bassKick * 40;
      const arcStart = Math.PI * 0.55 + i * 0.08;
      const arcEnd = Math.PI * 0.95 - i * 0.08;
      const arcHue = (hue + 310 + i * 30) % 360;
      ctx.globalAlpha = 0.15 + bassKick * 0.5;
      ctx.strokeStyle = `hsl(${arcHue},100%,55%)`;
      ctx.lineWidth = 2 + bassKick * 4;
      ctx.beginPath(); ctx.arc(cx, cy + H * 0.1, arcR, arcStart, arcEnd); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx, cy + H * 0.1, arcR, Math.PI + (Math.PI - arcEnd), Math.PI + (Math.PI - arcStart)); ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Energy Tendrils
    const midBand = bands.mid;
    ctx.lineWidth = 1;
    for (let i = 0; i < CFG.numTendrils; i++) {
      const a = (i / CFG.numTendrils) * Math.PI * 2 + overlayTime * 0.3;
      const len = 80 + midBand * 200 + Math.sin(overlayTime * 3 + i) * 30;
      const startR = Math.min(W, H) * 0.25;
      ctx.globalAlpha = 0.1 + midBand * 0.3;
      ctx.strokeStyle = `hsl(${(hue + i * 22) % 360},70%,50%)`;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * startR, cy + Math.sin(a) * startR);
      ctx.lineTo(cx + Math.cos(a) * (startR + len), cy + Math.sin(a) * (startR + len));
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Shock Rings from vanishing point
    for (let i = shockRings.length - 1; i >= 0; i--) {
      const ring = shockRings[i];
      ring.r += ring.speed * dt;
      ring.life -= dt;
      if (ring.life <= 0) { shockRings.splice(i, 1); continue; }
      ctx.globalAlpha = ring.life * 0.7;
      ctx.strokeStyle = `hsl(${ring.hue},100%,65%)`;
      ctx.lineWidth = 3 + ring.life * 5;
      ctx.beginPath(); ctx.arc(vpX, vpY, ring.r, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Reality Tears
  for (let i = tears.length - 1; i >= 0; i--) {
    const t = tears[i];
    t.life -= dt;
    t.y += t.drift * dt;
    if (t.life <= 0) { tears.splice(i, 1); continue; }
    const alpha = t.life / t.maxLife;
    if (Math.random() < 0.3) continue;

    ctx.globalAlpha = alpha * 0.8;
    ctx.fillStyle = `hsl(${t.hue},100%,70%)`;
    if (t.jagged) {
      for (let s = 0; s < 5; s++) {
        const segY = t.y - t.h/2 + s * (t.h/5);
        ctx.fillRect(t.x + (Math.random()-0.5)*15, segY, t.w * (0.5+Math.random()), t.h/5 - 1);
      }
    } else {
      ctx.fillRect(t.x, t.y - t.h/2, t.w, t.h);
    }
    ctx.globalAlpha = alpha * 0.5;
    ctx.fillStyle = '#fff';
    ctx.fillRect(t.x + t.w*0.3, t.y - t.h*0.4, t.w*0.4, t.h*0.8);
    ctx.globalAlpha = alpha * 0.3;
    ctx.fillStyle = `hsl(${(t.hue+120)%360},100%,60%)`;
    ctx.fillRect(t.x - 4, t.y - t.h*0.3, 3, t.h*0.6);
    ctx.fillStyle = `hsl(${(t.hue+240)%360},100%,60%)`;
    ctx.fillRect(t.x + t.w + 1, t.y - t.h*0.3, 3, t.h*0.6);
  }
  ctx.globalAlpha = 1;

  // Evolution phase visual overlays
  if (isPlaying) {
    const e = totalEnergy();
    const phaseVisual = evoPhaseIdx % 4;

    if (phaseVisual === 1 || phaseVisual === 3) {
      const numLines = 5 + Math.floor(e * 10);
      ctx.lineWidth = 1;
      for (let i = 0; i < numLines; i++) {
        const ly = (overlayTime * 40 + i * (H / numLines)) % H;
        ctx.globalAlpha = 0.06 + e * 0.08;
        ctx.strokeStyle = `hsl(${(hue + i * 20) % 360},60%,50%)`;
        ctx.beginPath(); ctx.moveTo(0, ly); ctx.lineTo(W, ly); ctx.stroke();
      }
    }
    if (phaseVisual === 2 || phaseVisual === 3) {
      ctx.lineWidth = 0.5;
      ctx.globalAlpha = 0.04 + e * 0.06;
      ctx.strokeStyle = `hsl(${hue},40%,40%)`;
      const spacing = 40 - e * 15;
      for (let i = -W; i < W + H; i += spacing) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + H, H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(i + H, 0); ctx.lineTo(i, H); ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;
  }

  // Particles
  let aliveCount = 0;
  for (let i = 0; i < CFG.maxParticles; i++) {
    const p = pool[i];
    if (!p.alive) continue;
    aliveCount++;
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += p.gravity * dt; p.vx *= 0.97; p.life -= dt;
    if (p.life <= 0) { p.alive = false; continue; }
    const a = p.life / p.maxLife;
    const s = p.size * a;
    ctx.globalAlpha = a;
    ctx.fillStyle = `hsl(${p.hue},100%,65%)`;
    ctx.fillRect(p.x - s * 0.5, p.y - s * 0.5, s, s);
  }
  ctx.globalAlpha = 1;
  return aliveCount;
}

// ─── Resize ─────────────────────────────────────────────────────────
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  glCanvas.width = w; glCanvas.height = h;
  const dpr = Math.min(window.devicePixelRatio, 2);
  ovCanvas.width = Math.floor(w * dpr);
  ovCanvas.height = Math.floor(h * dpr);
  glCanvas.style.width = ovCanvas.style.width = w + 'px';
  glCanvas.style.height = ovCanvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  gl.viewport(0, 0, w, h);
  rebuildFBs();
}
resize();
window.addEventListener('resize', resize);

// ─── HUD ────────────────────────────────────────────────────────────
let showDebug = CFG.debugMode;
if (!showDebug) hud.classList.add('hidden');

// Demo mode: synthetic audio, no drop zone
if (CFG.demoMode) {
  dropZone.style.display = 'none';
  isPlaying = true;
}

// ─── Audio Loading ──────────────────────────────────────────────────
function loadAudio(file) {
  initAudio();
  if (!audioCtx) return;
  if (sourceNode) { sourceNode.disconnect(); sourceNode = null; }
  if (audioEl) { audioEl.pause(); audioEl.remove(); }
  audioEl = new Audio();
  audioEl.crossOrigin = 'anonymous';
  audioEl.src = URL.createObjectURL(file);
  audioEl.loop = true;
  sourceNode = audioCtx.createMediaElementSource(audioEl);
  sourceNode.connect(analyser);
  if (audioCtx.state === 'suspended') audioCtx.resume();
  audioEl.play().then(() => {
    isPlaying = true; isPaused = false;
    dropZone.classList.add('hidden');
  }).catch(e => showError('Play failed: ' + e.message));
}

document.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); });
document.addEventListener('drop', e => {
  e.preventDefault(); e.stopPropagation();
  const f = e.dataTransfer.files[0];
  if (f) loadAudio(f);
});
dropZone.addEventListener('click', () => {
  const i = document.createElement('input');
  i.type = 'file'; i.accept = 'audio/*';
  i.onchange = () => { if (i.files[0]) loadAudio(i.files[0]); };
  i.click();
});

// ─── Keyboard ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (!audioEl) return;
    if (isPaused) { audioEl.play(); isPaused = false; isPlaying = true; }
    else { audioEl.pause(); isPaused = true; isPlaying = false; }
  }
  if (e.code === 'KeyF') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
  if (e.code === 'KeyD') {
    showDebug = !showDebug;
    hud.classList.toggle('hidden', !showDebug);
  }
});

document.addEventListener('click', e => {
  if (e.target === glCanvas || e.target === ovCanvas) {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  }
});

// ─── Render Loop ────────────────────────────────────────────────────
function drawFullscreenTriangle() {
  gl.bindVertexArray(emptyVAO);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}

let lastTime = 0, fpsFrames = 0, fpsTime = 0, fpsDisplay = 0;
const t0 = performance.now() / 1000;

function frame(nowMs) {
  requestAnimationFrame(frame);
  const t = nowMs / 1000;
  const dt = Math.min(t - (lastTime || t), 0.05);
  lastTime = t;
  fpsFrames++; fpsTime += dt;
  if (fpsTime >= 0.5) {
    fpsDisplay = Math.round(fpsFrames / fpsTime);
    fpsFrames = 0; fpsTime = 0;
  }

  processAudio();
  updateSongSection(dt);
  updateSpawns();

  // Smooth mouse tracking
  smoothMouseX += (mouseX - smoothMouseX) * 3.0 * dt;
  smoothMouseY += (mouseY - smoothMouseY) * 3.0 * dt;

  // Demo mode: synthetic breakcore-level chaos
  if (CFG.demoMode) {
    const tt = t * 3.0;
    bands.sub = 0.4 + 0.4 * Math.max(0, Math.sin(tt * 5.3)) * (0.5 + 0.5 * Math.sin(tt * 0.3));
    bands.low = 0.3 + 0.3 * Math.abs(Math.sin(tt * 3.7 + 1.0));
    bands.mid = 0.35 + 0.25 * Math.sin(tt * 7.1 + 2.0);
    bands.high = 0.3 + 0.3 * Math.abs(Math.sin(tt * 11.3 + 3.0));
    chaosMetric = 0.5 + 0.3 * Math.sin(tt * 0.9);
    cumulativeHue += 0.8;
    spectralCentroid = 2000 + 1500 * Math.sin(tt * 1.3);
    // Synthetic freqData for spectrum ring
    if (!freqData) freqData = new Uint8Array(1024);
    for (let i = 0; i < freqData.length; i++) {
      const f = i / freqData.length;
      freqData[i] = Math.floor(255 * Math.max(0,
        (1.0 - f * 1.5) * (0.5 + 0.5 * Math.sin(tt * 4.0 + i * 0.1)) *
        (0.6 + 0.4 * Math.sin(tt * 7.0 + f * 20.0))
      ));
    }
    // Synthetic smoothBars
    for (let i = 0; i < CFG.numBars; i++) {
      const f = i / CFG.numBars;
      smoothBars[i] = Math.max(0, (1.0 - f) * (0.4 + 0.4 * Math.sin(tt * 3.0 + i * 0.3)));
    }
  }

  const energy = totalEnergy();
  const bm = CFG.bandMultipliers;
  const kick = Math.min(1, bands.sub * bm.kick);
  const snare = Math.min(1, bands.low * bm.snare);
  const hat = Math.min(1, bands.high * bm.hat);
  const chaos = chaosMetric;
  const hue = ((cumulativeHue * 20 + spectralCentroid * 0.1) % 360 + 360) % 360;
  const time = t - t0;

  // ── Evolution phase system — song-section aware ──
  evoPhaseTimer += dt;
  const kickDelta = bands.sub - prevKick;
  const section = energyHistory.section;

  // Song section overrides: drops force phase change, breakdowns hold
  if (section === 'drop' && energyHistory.prevSection !== 'drop') {
    // DROP: force a phase change immediately
    evoPhaseIdx = (evoPhaseIdx + 1) % CFG.evoPhases.length;
    evoPhaseTimer = 0;
  } else if (section === 'breakdown') {
    // Hold current phase during breakdowns — no timer advance
  } else if (section === 'buildup') {
    // Slow phase timer during buildups — build tension
    evoPhaseTimer += dt * 0.3;
  } else {
    // Normal: timer + beat triggered
    if (evoPhaseTimer > CFG.phaseDuration && (kickDelta > 0.01 || evoPhaseTimer > CFG.phaseDuration * 1.5)) {
      evoPhaseTimer = 0;
      evoPhaseIdx = (evoPhaseIdx + 1) % CFG.evoPhases.length;
    }
  }

  // Smooth lerp toward current phase targets
  const target = CFG.evoPhases[evoPhaseIdx];
  const evoLerp = 2.0 * dt;
  evoSmooth.repPeriod += (target.repPeriod - evoSmooth.repPeriod) * evoLerp;
  evoSmooth.fogDensity += (target.fogDensity - evoSmooth.fogDensity) * evoLerp;
  evoSmooth.speedMul += (target.speedMul - evoSmooth.speedMul) * evoLerp;
  evoSmooth.tunnelBlend += (target.tunnelBlend - evoSmooth.tunnelBlend) * evoLerp;
  evoSmooth.objScale += (target.objScale - evoSmooth.objScale) * evoLerp;
  evoSmooth.colorGrade += (target.colorGrade - evoSmooth.colorGrade) * evoLerp;

  // Song section visual modulation
  let sectionSpeedMul = 1.0;
  let sectionFogMul = 1.0;
  if (section === 'breakdown') {
    sectionSpeedMul = 0.3; // crawl speed
    sectionFogMul = 0.5;   // clear fog — see deep into space
  } else if (section === 'buildup') {
    sectionSpeedMul = 0.6 + energyHistory.trendDuration * 0.15; // gradually accelerate
    sectionFogMul = 1.0 + energyHistory.trendDuration * 0.1;    // fog slowly closes in
  } else if (section === 'drop') {
    sectionSpeedMul = 2.5; // blast forward
    sectionFogMul = 0.7;   // clear for impact
  }

  // ── Forward camera ──
  const forwardSpeed = (CFG.camBaseSpeed + energy * CFG.camBoostSpeed) * evoSmooth.speedMul * sectionSpeedMul;
  cameraZ += forwardSpeed * dt;
  if (kickDelta > 0.015) {
    cameraZ += CFG.camKickImpulse * (section === 'drop' ? 3.0 : 1.0);
  }
  cameraSpeed = forwardSpeed;
  // Camera XY drift (must match shader formula)
  const mOff = [(smoothMouseX - 0.5) * 2, (smoothMouseY - 0.5) * 2];
  const camDriftX = Math.sin(time * 0.23) * 2.0 + Math.cos(time * 0.17) * 1.5 + mOff[0] * 2.0;
  const camDriftY = Math.sin(time * 0.19) * 1.5 + Math.cos(time * 0.31) * 1.0 - mOff[1] * 1.5;

  // Black hole: you approach it, pass through, new one spawns further ahead
  const bhDist = bhWorldZ - cameraZ;
  if (bhDist < 1.0) {
    bhPassFlash = 1.0;
    bhWorldZ = cameraZ + 50.0 + Math.random() * 40.0;
    // Trigger evolution phase change on passage
    evoPhaseIdx = (evoPhaseIdx + 1) % CFG.evoPhases.length;
    evoPhaseTimer = 0;
  }
  bhPassFlash *= 0.92; // decay the flash

  // BH grows as you approach — no hard cap, should feel massive up close
  const bhApproachFactor = Math.max(0.15, 15.0 / Math.max(bhDist, 0.5));
  const bhZ = bhWorldZ;
  const bhSize = (2.0 + energy * 1.2 + kick * 0.8) * Math.min(bhApproachFactor, 4.0);

  // ── Shape morphing ──
  shapeTimer += dt;
  if (!isMorphing && shapeTimer > CFG.shapeDuration) {
    isMorphing = true;
    shapeTimer = 0;
    nextShape = (currentShape + 1) % CFG.numShapes;
  }
  if (isMorphing) {
    morphProgress = Math.min(1, shapeTimer / CFG.morphDuration);
    morphProgress = morphProgress * morphProgress * (3 - 2 * morphProgress);
    if (shapeTimer > CFG.morphDuration) {
      currentShape = nextShape;
      nextShape = (currentShape + 1) % CFG.numShapes;
      morphProgress = 0;
      isMorphing = false;
      shapeTimer = 0;
    }
  }

  // ── Pass 1: Scene (half res) ──
  gl.bindFramebuffer(gl.FRAMEBUFFER, sceneFB.fb);
  gl.viewport(0, 0, sceneW, sceneH);
  gl.useProgram(sceneProg);
  gl.uniform1f(sceneU.uTime, time);
  gl.uniform1f(sceneU.uEnergy, energy);
  gl.uniform1f(sceneU.uKick, kick);
  gl.uniform1f(sceneU.uSnare, snare);
  gl.uniform1f(sceneU.uHat, hat);
  gl.uniform1f(sceneU.uChaos, chaos);
  gl.uniform1f(sceneU.uHue, hue);
  gl.uniform2f(sceneU.uMouse, smoothMouseX, smoothMouseY);
  gl.uniform1f(sceneU.uCamZ, cameraZ);
  gl.uniform1f(sceneU.uTunnelBlend, evoSmooth.tunnelBlend);
  gl.uniform1f(sceneU.uFogDensity, evoSmooth.fogDensity * sectionFogMul);
  gl.uniform1f(sceneU.uRepPeriod, evoSmooth.repPeriod);
  gl.uniform1f(sceneU.uObjScale, evoSmooth.objScale);
  gl.uniform2f(sceneU.uCamXY, camDriftX, camDriftY);
  gl.uniform1f(sceneU.uCorridorR, CFG.corridorRadius);
  gl.uniform1f(sceneU.uBHZ, bhZ);
  gl.uniform1f(sceneU.uBHSize, bhSize);
  gl.uniform1f(sceneU.uMorph, morphProgress);
  gl.uniform1i(sceneU.uShapeA, currentShape);
  gl.uniform1i(sceneU.uShapeB, nextShape);
  gl.uniform2f(sceneU.uRes, sceneW, sceneH);
  drawFullscreenTriangle();

  // ── Pass 2: Post-processing (full res) ──
  const src = ppFB[ppIdx], dst = ppFB[1 - ppIdx];
  gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fb);
  gl.viewport(0, 0, screenW, screenH);
  gl.useProgram(postProg);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, sceneFB.tex); gl.uniform1i(postU.uScene, 0);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, src.tex); gl.uniform1i(postU.uPrev, 1);
  gl.uniform1f(postU.uTime, time);
  gl.uniform1f(postU.uEnergy, energy);
  gl.uniform1f(postU.uKick, kick);
  gl.uniform1f(postU.uChaos, chaos);
  gl.uniform1f(postU.uPhase, evoSmooth.colorGrade);
  gl.uniform1f(postU.uCamSpeed, cameraSpeed);
  gl.uniform2f(postU.uRes, screenW, screenH);
  drawFullscreenTriangle();

  // Blit to screen
  gl.bindFramebuffer(gl.READ_FRAMEBUFFER, dst.fb);
  gl.bindFramebuffer(gl.DRAW_FRAMEBUFFER, null);
  gl.viewport(0, 0, screenW, screenH);
  gl.blitFramebuffer(0, 0, screenW, screenH, 0, 0, screenW, screenH, gl.COLOR_BUFFER_BIT, gl.NEAREST);
  ppIdx = 1 - ppIdx;

  // Canvas 2D overlay
  const W = window.innerWidth, H = window.innerHeight;
  const aliveP = drawOverlay(dt, W, H, energy, kick, hue);

  // HUD
  if (showDebug) {
    document.getElementById('hud-fps').textContent = fpsDisplay;
    document.getElementById('hud-frametime').textContent = (dt * 1000).toFixed(1);
    document.getElementById('hud-res').textContent = `GL:${screenW}x${screenH} Scene:${sceneW}x${sceneH} DPR:${Math.min(window.devicePixelRatio, 2).toFixed(1)}`;
    document.getElementById('hud-energy').textContent = 'Energy: ' + energy.toFixed(2);
    document.getElementById('hud-chaos').textContent = 'Chaos: ' + chaos.toFixed(2);
    document.getElementById('hud-band').textContent = `K:${kick.toFixed(2)} S:${snare.toFixed(2)} H:${hat.toFixed(2)}`;
    const shapeNames = ['protein','crystal','jellyfish','blackhole'];
    const phaseNames = CFG.evoPhases.map((_,i) => `P${i}`);
    document.getElementById('hud-extra').textContent =
      `P:${aliveP}/${CFG.maxParticles} Z:${cameraZ.toFixed(0)} Spd:${cameraSpeed.toFixed(1)} Phase:${phaseNames[evoPhaseIdx]} Shape:${shapeNames[currentShape]}${isMorphing?'→'+shapeNames[nextShape]:''} [${section.toUpperCase()}]`;
  }
}

requestAnimationFrame(frame);
console.log('Breakcore Visualizer v5 — Immersive Void — WebGL2 + GLSL + Canvas 2D overlay');
</script>
</body>
</html>
