<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BREAKCORE VISUALIZER</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;cursor:none}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#overlay{z-index:2;pointer-events:none}
#hud{position:fixed;top:16px;left:16px;z-index:10;color:#0f0;font:11px/1.5 'Courier New',monospace;
  background:rgba(0,0,0,.7);padding:8px 12px;border:1px solid rgba(0,255,0,.3);
  transition:opacity .4s;pointer-events:none}
#hud.hidden{opacity:0}
#drop-zone{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.85);transition:opacity .5s}
#drop-zone.hidden{opacity:0;pointer-events:none}
#drop-zone div{color:#0f0;font:24px 'Courier New',monospace;border:2px dashed rgba(0,255,0,.4);
  padding:60px 80px;text-align:center}
#drop-zone div small{display:block;margin-top:8px;font-size:13px;color:rgba(0,255,0,.5)}
#error{position:fixed;bottom:20px;left:20px;right:20px;z-index:30;color:#f44;
  font:13px 'Courier New',monospace;background:rgba(0,0,0,.9);padding:12px;
  border:1px solid #f44;display:none;max-height:200px;overflow:auto;white-space:pre-wrap}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="overlay"></canvas>
<div id="hud">
  <div><b>BREAKCORE VIZ</b> <span id="hud-fps">--</span>fps <span id="hud-frametime">--</span>ms</div>
  <div id="hud-res">--</div>
  <div id="hud-energy">Energy: 0.00</div>
  <div id="hud-chaos">Chaos: 0.00</div>
  <div id="hud-band">K:0 S:0 H:0</div>
  <div id="hud-particles">P: 0</div>
</div>
<div id="drop-zone"><div>DROP AUDIO HERE<small>click for fullscreen &middot; space=pause &middot; F=fullscreen</small></div></div>
<div id="error"></div>

<script>
"use strict";

const errorEl = document.getElementById('error');
function showError(msg) { console.error(msg); errorEl.style.display = 'block'; errorEl.textContent += msg + '\n'; }

// ─── Constants ───────────────────────────────────────────────────────
const FFTSIZE = 2048;
const SMOOTH_ALPHA = 0.15;
const MAX_PARTICLES = 800;
const NUM_BARS = 64; // frequency bars per side

// ─── DOM ─────────────────────────────────────────────────────────────
const glCanvas = document.getElementById('gl');
const ovCanvas = document.getElementById('overlay');
const ctx = ovCanvas.getContext('2d');
const hud = document.getElementById('hud');
const dropZone = document.getElementById('drop-zone');

// ─── WebGL2 ──────────────────────────────────────────────────────────
const gl = glCanvas.getContext('webgl2', {antialias: false, alpha: false});
if (!gl) { showError('WebGL2 not supported'); throw 'no webgl2'; }
const floatExt = gl.getExtension('EXT_color_buffer_float');
gl.getExtension('OES_texture_float_linear');
const FB_INT = floatExt ? gl.RGBA16F : gl.RGBA8;
const FB_TYPE = floatExt ? gl.FLOAT : gl.UNSIGNED_BYTE;

// ─── Shaders ─────────────────────────────────────────────────────────
const FULLSCREEN_VS = `#version 300 es
precision highp float;
out vec2 vUV;
void main() {
  float x = -1.0 + float((gl_VertexID & 1) << 2);
  float y = -1.0 + float((gl_VertexID & 2) << 1);
  vUV = vec2(x, y) * 0.5 + 0.5;
  gl_Position = vec4(x, y, 0.0, 1.0);
}`;

const SCENE_FS = `#version 300 es
precision highp float;
in vec2 vUV;
out vec4 fragColor;

uniform float uTime, uEnergy, uKick, uSnare, uHat, uChaos, uHue;
uniform vec2 uRes;

#define STEPS 44
#define MAX_DIST 25.0
#define SURF 0.015

vec3 hsl(float h, float s, float l) {
  vec3 c = clamp(abs(mod(h*6.0+vec3(0,4,2),6.0)-3.0)-1.0,0.0,1.0);
  return l+s*(c-0.5)*(1.0-abs(2.0*l-1.0));
}

// Main torus-knot (the protein)
float torusSDF(vec3 p) {
  float twist = uTime * 2.0 + uEnergy * 3.0 + uChaos * 2.0;
  float convulse = sin(twist * 6.0) * uChaos * 0.3;
  vec3 pp = p;
  pp.x += convulse + sin(pp.y * 3.0 + twist) * uEnergy * 0.25;
  pp.y += sin(pp.z * 2.5 + twist) * uEnergy * 0.2;
  pp.z += cos(pp.x * 2.0 + twist * 1.2) * uEnergy * 0.2;
  float r = length(pp.xy) - 1.2;
  float y2 = pp.z - 0.5 * sin(atan(pp.y, pp.x) * 5.0 + twist);
  float d = sqrt(r * r + y2 * y2) - 0.45;
  d += 0.06 * sin(pp.x*12.0+twist) * sin(pp.y*12.0) * sin(pp.z*12.0) * uEnergy;
  d += 0.03 * sin(pp.x*25.0) * sin(pp.y*25.0) * sin(pp.z*25.0) * uChaos;
  return d;
}

// Orbiting satellite spheres — each band drives one
float satelliteSDF(vec3 p) {
  float t = uTime;
  // Kick satellite — big, slow orbit
  float a1 = t * 1.5;
  vec3 c1 = vec3(cos(a1)*2.5, sin(a1*0.8)*0.8, sin(a1)*2.5);
  float s1 = length(p - c1) - (0.12 + uKick * 0.25);
  // Snare satellite — medium, faster orbit
  float a2 = t * 2.3 + 2.094;
  vec3 c2 = vec3(cos(a2)*2.2, sin(a2*1.2)*1.0, sin(a2)*2.2);
  float s2 = length(p - c2) - (0.08 + uSnare * 0.18);
  // Hat satellite — small, fast orbit
  float a3 = t * 3.7 + 4.189;
  vec3 c3 = vec3(cos(a3)*2.8, sin(a3*1.5)*0.6, sin(a3)*2.8);
  float s3 = length(p - c3) - (0.05 + uHat * 0.12);
  return min(s1, min(s2, s3));
}

// Background grid — infinite grid plane fading into distance
float gridLines(vec2 uv, float t) {
  vec2 g = abs(fract(uv * 8.0 + t * 0.3) - 0.5);
  float lines = min(g.x, g.y);
  return smoothstep(0.0, 0.04, lines);
}

float sceneSDF(vec3 p) {
  return min(torusSDF(p), satelliteSDF(p));
}

void main() {
  vec2 uv = (vUV * 2.0 - 1.0) * vec2(uRes.x / uRes.y, 1.0);

  // Camera shake
  vec3 shake = vec3(
    sin(uTime*45.0)*uKick*0.3, cos(uTime*38.0)*uKick*0.2,
    sin(uTime*25.0)*uChaos*0.1
  );

  float angle = uTime * 0.4;
  float camDist = 4.0 + uEnergy * 1.5;
  vec3 ro = vec3(sin(angle)*camDist, cos(angle*0.7)*1.5, cos(angle)*camDist) + shake;
  vec3 fwd = normalize(-ro);
  vec3 right = normalize(cross(fwd, vec3(0,1,0)));
  vec3 up = cross(right, fwd);
  vec3 rd = normalize(fwd + uv.x * right + uv.y * up);

  // ── Background: receding grid tunnel ──
  vec3 bgCol = vec3(0.0);
  {
    // Project a grid onto a virtual plane behind the scene
    float gridT = (-8.0 - ro.z) / rd.z;
    if (gridT > 0.0) {
      vec3 gp = ro + rd * gridT;
      float g = 1.0 - gridLines(gp.xy, uTime);
      float fade = exp(-gridT * 0.03);
      vec3 gridColor = hsl(uHue/360.0, 0.8, 0.3) * (0.15 + uEnergy * 0.4);
      bgCol += gridColor * g * fade;
    }
    // Second grid plane (floor)
    float floorT = (-3.0 - ro.y) / rd.y;
    if (floorT > 0.0 && floorT < 30.0) {
      vec3 fp = ro + rd * floorT;
      float g = 1.0 - gridLines(fp.xz, uTime * 0.5);
      float fade = exp(-floorT * 0.06);
      vec3 floorCol = hsl(310.0/360.0, 0.7, 0.25) * (0.1 + uKick * 0.3);
      bgCol += floorCol * g * fade;
    }
  }

  // ── Raymarch ──
  float dist = 0.0, minDist = 999.0;
  bool hit = false;
  vec3 p;
  for (int i = 0; i < STEPS; i++) {
    p = ro + rd * dist;
    float d = sceneSDF(p);
    minDist = min(minDist, abs(d));
    if (abs(d) < SURF) { hit = true; break; }
    dist += abs(d) * 0.7;
    if (dist > MAX_DIST) break;
  }

  // Color palette
  vec3 kickCol = hsl(310.0/360.0, 1.0, 0.5);
  vec3 hueCol = hsl(uHue/360.0, 1.0, 0.55);
  vec3 hatCol = hsl(fract(uHue/360.0+0.5), 1.0, 0.55);
  vec3 snareCol = hsl(fract(uHue/360.0+0.25), 0.8, 0.7);

  vec3 col = bgCol;

  if (hit) {
    // Determine which object was hit
    float dTorus = torusSDF(p);
    float dSat = satelliteSDF(p);

    vec3 surfCol;
    if (abs(dTorus) < abs(dSat)) {
      surfCol = mix(kickCol, hueCol, 0.5 + uHat * 0.5);
      surfCol = mix(surfCol, hatCol, uChaos * 0.3);
    } else {
      surfCol = mix(snareCol, kickCol, uKick * 0.5);
      surfCol = mix(surfCol, hatCol, uHat * 0.5);
    }

    // Controlled lighting — never let it blow out
    float glow = 1.5 / (1.0 + dist * dist * 0.15);
    col += surfCol * glow * (0.6 + uKick * 0.4);
    col += kickCol * uKick * 0.15;
    col += hatCol * uHat * 0.1;
  }

  // Glow halo — subtle neon rim
  float nearGlow = 0.04 / (0.01 + minDist * minDist);
  nearGlow = min(nearGlow, 0.6);
  vec3 glowColor = mix(kickCol, hatCol, 0.5 + 0.5 * sin(uTime * 0.5));
  col += glowColor * nearGlow * (0.15 + uEnergy * 0.25);

  // Scanlines
  col *= 1.0 - 0.06 * step(0.5, fract(gl_FragCoord.y * 0.5)) * (1.0 + uChaos);

  // Vignette
  col *= 1.0 - dot(vUV*2.0-1.0, vUV*2.0-1.0) * 0.25;

  fragColor = vec4(col, 1.0);
}`;

const POST_FS = `#version 300 es
precision highp float;
in vec2 vUV;
out vec4 fragColor;
uniform sampler2D uScene, uPrev;
uniform float uTime, uEnergy, uKick, uChaos;
uniform vec2 uRes;

void main() {
  vec2 uv = vUV;
  float ca = 0.002 + uChaos * 0.005 + uKick * 0.006;
  vec3 col;
  col.r = texture(uScene, uv + vec2(ca, 0.0)).r;
  col.g = texture(uScene, uv).g;
  col.b = texture(uScene, uv - vec2(ca, 0.0)).b;

  // Bloom 7-tap — threshold higher to avoid white-out
  vec3 bloom = vec3(0.0); float total = 0.0;
  for (int i = -3; i <= 3; i++) {
    float w = exp(-float(i*i)/4.5);
    bloom += texture(uScene, uv + vec2(float(i)/uRes.x*5.0, 0.0)).rgb * w;
    bloom += texture(uScene, uv + vec2(0.0, float(i)/uRes.y*5.0)).rgb * w;
    total += w * 2.0;
  }
  bloom = max(bloom/total - 0.5, 0.0) * 1.2;
  col += bloom * (0.2 + uKick * 0.25);

  // Feedback trail — decay harder so brightness doesn't accumulate
  vec3 prev = texture(uPrev, (uv - 0.5) * 0.97 + 0.5).rgb * 0.85;
  col = mix(col, prev, 0.35);

  // VHS glitch
  if (uChaos > 0.4) {
    float strip = step(0.97, fract(sin(floor(uv.y*uRes.y*0.05+uTime*30.0)*43758.5453)));
    float disp = strip * sin(uTime*100.0) * 0.02 * uChaos;
    vec3 d; d.r=texture(uScene,uv+vec2(disp+ca,0)).r; d.g=texture(uScene,uv+vec2(disp,0)).g; d.b=texture(uScene,uv+vec2(disp-ca,0)).b;
    col = mix(col, d.gbr, strip * uChaos * 0.7);
  }

  // Flash on kick — tinted, not white
  vec3 flashCol = vec3(1.0, 0.3, 0.6);
  col += flashCol * smoothstep(0.8,1.0,uKick) * 0.12;
  // Stronger vignette to keep edges dark
  col *= 1.0 - length(vUV*2.0-1.0) * 0.45;
  // Tone map — aggressive compression to prevent blow-out
  col = col / (1.0 + col * 0.5);
  // Clamp final output
  col = min(col, vec3(0.95));
  fragColor = vec4(col, 1.0);
}`;

// ─── Compile & Link ──────────────────────────────────────────────────
function comp(src,t){const s=gl.createShader(t);gl.shaderSource(s,src);gl.compileShader(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){showError(gl.getShaderInfoLog(s));return null}return s}
function link(v,f){const p=gl.createProgram();gl.attachShader(p,comp(v,gl.VERTEX_SHADER));gl.attachShader(p,comp(f,gl.FRAGMENT_SHADER));gl.linkProgram(p);if(!gl.getProgramParameter(p,gl.LINK_STATUS)){showError(gl.getProgramInfoLog(p));return null}return p}
const sceneProg=link(FULLSCREEN_VS,SCENE_FS), postProg=link(FULLSCREEN_VS,POST_FS);
if(!sceneProg||!postProg) throw 'Shader fail';
function ulocs(p,ns){const o={};for(const n of ns)o[n]=gl.getUniformLocation(p,n);return o}
const sceneU=ulocs(sceneProg,['uTime','uEnergy','uKick','uSnare','uHat','uChaos','uHue','uRes']);
const postU=ulocs(postProg,['uScene','uPrev','uTime','uEnergy','uKick','uChaos','uRes']);
const emptyVAO=gl.createVertexArray();

// ─── Framebuffers ────────────────────────────────────────────────────
let screenW=0,screenH=0,sceneW=0,sceneH=0;
const sceneFB={fb:null,tex:null}, ppFB=[{fb:null,tex:null},{fb:null,tex:null}];
let ppIdx=0;
function mkFB(w,h){
  const tex=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,FB_INT,w,h,0,gl.RGBA,FB_TYPE,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  const fb=gl.createFramebuffer();gl.bindFramebuffer(gl.FRAMEBUFFER,fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
  return{fb,tex};
}
function rebuildFBs(){
  const w=glCanvas.width,h=glCanvas.height;
  if(w===screenW&&h===screenH)return;
  screenW=w;screenH=h;sceneW=Math.floor(w/2);sceneH=Math.floor(h/2);
  for(const o of[sceneFB,ppFB[0],ppFB[1]]){if(o.fb)gl.deleteFramebuffer(o.fb);if(o.tex)gl.deleteTexture(o.tex)}
  Object.assign(sceneFB,mkFB(sceneW,sceneH));
  Object.assign(ppFB[0],mkFB(w,h));Object.assign(ppFB[1],mkFB(w,h));
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
}

// ─── Audio Engine ────────────────────────────────────────────────────
let audioCtx=null,analyser=null,sourceNode=null,audioEl=null;
let isPlaying=false,isPaused=false;
let freqData,timeData;
const bands={sub:0,low:0,mid:0,high:0};
const prevBands={sub:0,low:0,mid:0,high:0};
const bandPeaks={sub:0,low:0,mid:0,high:0};
let spectralCentroid=1000,chaosMetric=0,cumulativeHue=0;
const onsetTimes=[];
// Smoothed frequency bars for visualization
const smoothBars = new Float32Array(NUM_BARS);

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=FFTSIZE;analyser.smoothingTimeConstant=0.4;
  analyser.minDecibels=-90;analyser.maxDecibels=-10;
  analyser.connect(audioCtx.destination);
  freqData=new Uint8Array(analyser.frequencyBinCount);
  timeData=new Uint8Array(analyser.frequencyBinCount);
}
function binForHz(hz){return Math.round(hz/(audioCtx.sampleRate/FFTSIZE))}
function bandEnergy(lo,hi){
  const a=Math.max(0,binForHz(lo)),b=Math.min(binForHz(hi),freqData.length-1);
  if(b<a)return 0;let s=0;for(let i=a;i<=b;i++)s+=freqData[i];return s/((b-a+1)*255);
}
function processAudio(){
  if(!analyser||!isPlaying)return;
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);
  const raw={sub:bandEnergy(20,100),low:bandEnergy(100,500),mid:bandEnergy(500,2000),high:bandEnergy(2000,16000)};
  for(const k of['sub','low','mid','high']){
    prevBands[k]=bands[k];bands[k]+=(raw[k]-bands[k])*SMOOTH_ALPHA;
    const delta=bands[k]-prevBands[k];
    if(delta>bandPeaks[k]*0.3+0.005){bandPeaks[k]=Math.max(bandPeaks[k],bands[k]);onsetTimes.push(performance.now())}
    bandPeaks[k]*=0.995;
  }
  let num=0,den=0;
  for(let i=0;i<freqData.length;i++){const m=freqData[i]/255;num+=i*audioCtx.sampleRate/FFTSIZE*m;den+=m}
  spectralCentroid=den>0.01?num/den:1000;
  cumulativeHue+=totalEnergy()*0.5;
  const now=performance.now();
  while(onsetTimes.length&&onsetTimes[0]<now-1000)onsetTimes.shift();
  chaosMetric=Math.min(1,onsetTimes.length/30);

  // Build smoothed frequency bars (log-spaced)
  for (let i = 0; i < NUM_BARS; i++) {
    // Log frequency mapping: more bars for low freqs
    const f0 = Math.floor(Math.pow(i / NUM_BARS, 2) * freqData.length);
    const f1 = Math.floor(Math.pow((i + 1) / NUM_BARS, 2) * freqData.length);
    let sum = 0, count = 0;
    for (let j = f0; j < f1 && j < freqData.length; j++) { sum += freqData[j]; count++; }
    const val = count > 0 ? sum / count / 255 : 0;
    smoothBars[i] += (val - smoothBars[i]) * 0.3;
  }
}
function totalEnergy(){return Math.min(1,(bands.sub+bands.low+bands.mid+bands.high)/2)}

// ─── Particle Pool ───────────────────────────────────────────────────
const pool=new Array(MAX_PARTICLES);
for(let i=0;i<MAX_PARTICLES;i++)pool[i]={alive:false,x:0,y:0,vx:0,vy:0,hue:0,size:0,life:0,maxLife:0,gravity:0};
function spawnOne(x,y,vx,vy,hue,size,life,grav){
  for(let i=0;i<MAX_PARTICLES;i++){const p=pool[i];if(!p.alive){p.alive=true;p.x=x;p.y=y;p.vx=vx;p.vy=vy;p.hue=hue;p.size=size;p.life=life;p.maxLife=life;p.gravity=grav;return}}
}
function spawnBurst(type,count,hue){
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;let spd,sz,life,grav;
    switch(type){
      case'kick':spd=200+Math.random()*400;sz=4+Math.random()*5;life=1.0+Math.random()*0.8;grav=400;break;
      case'snare':spd=250+Math.random()*400;sz=2+Math.random()*3;life=0.5+Math.random()*0.4;grav=200;break;
      case'hat':spd=350+Math.random()*500;sz=1.5+Math.random()*2;life=0.3+Math.random()*0.3;grav=0;break;
      case'peak':spd=300+Math.random()*600;sz=3+Math.random()*4;life=0.8+Math.random()*0.8;grav=300;break;
    }
    spawnOne(cx+Math.cos(a)*10,cy+Math.sin(a)*10,Math.cos(a)*spd,Math.sin(a)*spd,hue+Math.random()*40-20,sz,life,grav);
  }
}
let prevKick=0,prevSnare=0,prevHat=0;
function updateSpawns(){
  if(!isPlaying)return;
  const kd=bands.sub-prevKick,sd=bands.low-prevSnare,hd=bands.high-prevHat,e=totalEnergy();
  if(kd>0.015)spawnBurst('kick',30+Math.floor(Math.random()*20),310);
  if(sd>0.012)spawnBurst('snare',20+Math.floor(Math.random()*15),0);
  if(hd>0.008)spawnBurst('hat',25+Math.floor(Math.random()*15),(spectralCentroid-200)/3800*360+180);
  if(e>0.6&&kd>0.03)spawnBurst('peak',40+Math.floor(Math.random()*30),Math.random()*360);
  prevKick=bands.sub;prevSnare=bands.low;prevHat=bands.high;
}

// ─── Canvas 2D: Frequency Bars + Spectrum Ring + Waveform + Particles ─
function drawOverlay(dt, W, H, energy, kick, hue) {
  ctx.clearRect(0, 0, W, H);

  if (isPlaying && freqData) {
    // ── Side Frequency Bars (left + right, mirrored) ──
    const barH = H * 0.6;
    const barW = 4;
    const gap = 2;
    const startY = H * 0.2;

    for (let i = 0; i < NUM_BARS; i++) {
      const v = smoothBars[i];
      const bh = v * barH;
      const y = startY + (barH - bh) / 2 + (NUM_BARS - i) * (barH / NUM_BARS) - barH / 2;
      const yPos = startY + i * (barH / NUM_BARS);
      const barLen = v * W * 0.12;

      // Color: low=magenta, mid=cyan, high=white
      const barHue = 310 - i * (310 / NUM_BARS) + (hue * 0.3);
      const sat = i > NUM_BARS * 0.8 ? 60 : 100;
      const lit = 40 + v * 30;

      ctx.fillStyle = `hsla(${barHue},${sat}%,${lit}%,${0.5 + v * 0.5})`;
      // Left side
      ctx.fillRect(0, yPos, barLen, Math.max(1, barH / NUM_BARS - gap));
      // Right side (mirrored)
      ctx.fillRect(W - barLen, yPos, barLen, Math.max(1, barH / NUM_BARS - gap));
    }

    // ── Circular Spectrum Ring ──
    const cx = W / 2, cy = H / 2;
    const ringR = Math.min(W, H) * 0.28;
    const ringBars = 128;

    ctx.lineWidth = 2;
    for (let i = 0; i < ringBars; i++) {
      const idx = Math.floor(Math.pow(i / ringBars, 1.5) * (freqData ? freqData.length : 1));
      const v = freqData ? freqData[Math.min(idx, freqData.length - 1)] / 255 : 0;
      const angle = (i / ringBars) * Math.PI * 2 - Math.PI / 2;
      const inner = ringR - 5;
      const outer = ringR + v * ringR * 0.5;

      const rHue = (hue + i * (360 / ringBars)) % 360;
      ctx.strokeStyle = `hsla(${rHue},100%,${50 + v * 30}%,${0.3 + v * 0.6})`;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(angle) * inner, cy + Math.sin(angle) * inner);
      ctx.lineTo(cx + Math.cos(angle) * outer, cy + Math.sin(angle) * outer);
      ctx.stroke();
    }

    // ── Waveform (oscilloscope across the middle) ──
    if (timeData) {
      ctx.strokeStyle = `hsla(${hue + 180},100%,70%,0.4)`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      const waveW = W * 0.6;
      const waveX = W * 0.2;
      const step = Math.floor(timeData.length / waveW) || 1;
      for (let i = 0; i < waveW; i++) {
        const idx = Math.min(i * step, timeData.length - 1);
        const v = (timeData[idx] / 128.0 - 1.0);
        const x = waveX + i;
        const y = cy + v * H * 0.15 * (1 + energy);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }

  // ── Particles ──
  let aliveCount = 0;
  for (let i = 0; i < MAX_PARTICLES; i++) {
    const p = pool[i];
    if (!p.alive) continue;
    aliveCount++;
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += p.gravity * dt; p.vx *= 0.97; p.life -= dt;
    if (p.life <= 0) { p.alive = false; continue; }
    const a = p.life / p.maxLife;
    const s = p.size * a;
    ctx.globalAlpha = a;
    ctx.fillStyle = `hsl(${p.hue},100%,65%)`;
    ctx.fillRect(p.x - s * 0.5, p.y - s * 0.5, s, s);
  }
  ctx.globalAlpha = 1;
  return aliveCount;
}

// ─── Resize ──────────────────────────────────────────────────────────
function resize(){
  const w=window.innerWidth,h=window.innerHeight;
  glCanvas.width=w;glCanvas.height=h;
  const dpr=Math.min(window.devicePixelRatio,2);
  ovCanvas.width=Math.floor(w*dpr);ovCanvas.height=Math.floor(h*dpr);
  glCanvas.style.width=ovCanvas.style.width=w+'px';
  glCanvas.style.height=ovCanvas.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  gl.viewport(0,0,w,h);rebuildFBs();
}
resize();window.addEventListener('resize',resize);

// ─── HUD ─────────────────────────────────────────────────────────────
let hudTimer=999;
function showHUD(){hud.classList.remove('hidden');hudTimer=999}
showHUD();

// ─── Audio Loading ───────────────────────────────────────────────────
function loadAudio(file){
  initAudio();
  if(sourceNode){sourceNode.disconnect();sourceNode=null}
  if(audioEl){audioEl.pause();audioEl.remove()}
  audioEl=new Audio();audioEl.crossOrigin='anonymous';
  audioEl.src=URL.createObjectURL(file);audioEl.loop=true;
  sourceNode=audioCtx.createMediaElementSource(audioEl);
  sourceNode.connect(analyser);
  if(audioCtx.state==='suspended')audioCtx.resume();
  audioEl.play().then(()=>{isPlaying=true;isPaused=false;dropZone.classList.add('hidden');showHUD()}).catch(e=>showError('Play failed: '+e.message));
}
document.addEventListener('dragover',e=>{e.preventDefault();e.stopPropagation()});
document.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();const f=e.dataTransfer.files[0];if(f)loadAudio(f)});
dropZone.addEventListener('click',()=>{const i=document.createElement('input');i.type='file';i.accept='audio/*';i.onchange=()=>{if(i.files[0])loadAudio(i.files[0])};i.click()});

// ─── Keyboard ────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();if(!audioEl)return;if(isPaused){audioEl.play();isPaused=false;isPlaying=true}else{audioEl.pause();isPaused=true;isPlaying=false}}
  if(e.code==='KeyF'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen()}
});
document.addEventListener('click',e=>{if(e.target===glCanvas||e.target===ovCanvas)if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{})});

// ─── Render ──────────────────────────────────────────────────────────
function tri(){gl.bindVertexArray(emptyVAO);gl.drawArrays(gl.TRIANGLES,0,3)}
let lastTime=0,fpsFrames=0,fpsTime=0,fpsDisplay=0;
const t0=performance.now()/1000;

function frame(nowMs){
  requestAnimationFrame(frame);
  const t=nowMs/1000,dt=Math.min(t-(lastTime||t),0.05);lastTime=t;
  fpsFrames++;fpsTime+=dt;
  if(fpsTime>=0.5){fpsDisplay=Math.round(fpsFrames/fpsTime);fpsFrames=0;fpsTime=0}

  processAudio();updateSpawns();

  const energy=totalEnergy();
  const kick=Math.min(1,bands.sub*3),snare=Math.min(1,bands.low*2.5),hat=Math.min(1,bands.high*4);
  const chaos=chaosMetric,hue=((cumulativeHue*20+spectralCentroid*0.1)%360+360)%360;
  const time=t-t0;

  // Pass 1: Scene (half res)
  gl.bindFramebuffer(gl.FRAMEBUFFER,sceneFB.fb);gl.viewport(0,0,sceneW,sceneH);
  gl.useProgram(sceneProg);
  gl.uniform1f(sceneU.uTime,time);gl.uniform1f(sceneU.uEnergy,energy);
  gl.uniform1f(sceneU.uKick,kick);gl.uniform1f(sceneU.uSnare,snare);
  gl.uniform1f(sceneU.uHat,hat);gl.uniform1f(sceneU.uChaos,chaos);
  gl.uniform1f(sceneU.uHue,hue);gl.uniform2f(sceneU.uRes,sceneW,sceneH);
  tri();

  // Pass 2: Post (full res)
  const src=ppFB[ppIdx],dst=ppFB[1-ppIdx];
  gl.bindFramebuffer(gl.FRAMEBUFFER,dst.fb);gl.viewport(0,0,screenW,screenH);
  gl.useProgram(postProg);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,sceneFB.tex);gl.uniform1i(postU.uScene,0);
  gl.activeTexture(gl.TEXTURE1);gl.bindTexture(gl.TEXTURE_2D,src.tex);gl.uniform1i(postU.uPrev,1);
  gl.uniform1f(postU.uTime,time);gl.uniform1f(postU.uEnergy,energy);
  gl.uniform1f(postU.uKick,kick);gl.uniform1f(postU.uChaos,chaos);
  gl.uniform2f(postU.uRes,screenW,screenH);tri();

  // Blit to screen
  gl.bindFramebuffer(gl.READ_FRAMEBUFFER,dst.fb);gl.bindFramebuffer(gl.DRAW_FRAMEBUFFER,null);
  gl.viewport(0,0,screenW,screenH);
  gl.blitFramebuffer(0,0,screenW,screenH,0,0,screenW,screenH,gl.COLOR_BUFFER_BIT,gl.NEAREST);
  ppIdx=1-ppIdx;

  // Canvas overlay: bars, ring, waveform, particles
  const W=window.innerWidth,H=window.innerHeight;
  const aliveP = drawOverlay(dt, W, H, energy, kick, hue);

  // HUD
  hudTimer-=dt;if(hudTimer<=0)hud.classList.add('hidden');
  if(!hud.classList.contains('hidden')){
    document.getElementById('hud-fps').textContent=fpsDisplay;
    document.getElementById('hud-frametime').textContent=(dt*1000).toFixed(1);
    document.getElementById('hud-res').textContent=`GL:${screenW}x${screenH} Scene:${sceneW}x${sceneH}`;
    document.getElementById('hud-energy').textContent='Energy: '+energy.toFixed(2);
    document.getElementById('hud-chaos').textContent='Chaos: '+chaos.toFixed(2);
    document.getElementById('hud-band').textContent=`K:${kick.toFixed(2)} S:${snare.toFixed(2)} H:${hat.toFixed(2)}`;
    document.getElementById('hud-particles').textContent='P:'+aliveP+'/'+MAX_PARTICLES;
  }
}
requestAnimationFrame(frame);
console.log('Breakcore Visualizer v3 — WebGL2 + GLSL + Canvas overlay');
</script>
</body>
