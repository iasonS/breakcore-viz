// ─── Canvas 2D Helpers ──────────────────────────────────────────────
function drawPolygon(cx, cy, r, sides, rotation, color, alpha, lineW) {
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = lineW;
  ctx.beginPath();
  for (let i = 0; i <= sides; i++) {
    const a = rotation + (i / sides) * Math.PI * 2;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.globalAlpha = 1;
}

// ─── Canvas 2D Overlay ──────────────────────────────────────────────
let overlayTime = 0;

function drawOverlay(dt, W, H, energy, kick, hue, section) {
  ctx.clearRect(0, 0, W, H);
  overlayTime += dt;
  const cx = W / 2, cy = H / 2;

  // Vanishing point — fixed at center
  const vpX = cx;
  const vpY = cy;

  // BH screen position — roughly at vanishing point, offset by look perturbation
  const bhScreenX = vpX + Math.sin(overlayTime * 0.1) * W * 0.02;
  const bhScreenY = vpY + Math.cos(overlayTime * 0.13) * H * 0.02;
  const bhProximity = Math.min(1.0, 10.0 / Math.max(bhWorldZ - cameraZ, 1.0));
  const lensRadius = W * 0.15 * bhProximity * (1.0 + kick * 0.5);

  // Forward-streaming starfield with gravitational lensing
  // Beat phase adds subtle rhythmic pulse; anticipation accelerates stars before drops
  const beatPulse = offlineMode ? 0.15 * Math.sin(lookAhead.beatPhase * Math.PI * 2) : 0;
  const starSpeed = 0.6 + kick * 3.0 + energy * 1.5 + cameraSpeed * 0.08 + beatPulse + lookAhead.anticipation * 0.5;
  for (const s of stars) {
    s.dist += s.speed * starSpeed * dt;
    if (s.dist > 1.5) {
      s.dist = 0.02;
      s.angle = Math.random() * Math.PI * 2;
      s.hue = hue + Math.random() * 60;
    }
    let x = vpX + Math.cos(s.angle) * s.dist * W * 0.65;
    let y = vpY + Math.sin(s.angle) * s.dist * H * 0.65;

    // Gravitational lensing — bend stars around BH screen position
    const toBHx = bhScreenX - x;
    const toBHy = bhScreenY - y;
    const toBHdist = Math.sqrt(toBHx * toBHx + toBHy * toBHy) || 1;
    if (toBHdist < lensRadius * 3.0 && bhProximity > 0.1) {
      const lensStr = lensRadius * 40.0 / (toBHdist * toBHdist + lensRadius * 0.5);
      // Deflect tangentially (perpendicular to radial direction)
      const tangX = -toBHy / toBHdist;
      const tangY = toBHx / toBHdist;
      x += tangX * lensStr * bhProximity;
      y += tangY * lensStr * bhProximity;
      // Stars very close to BH get smeared into arcs — boost alpha + streak
      if (toBHdist < lensRadius) {
        s._lensed = Math.min(1.0, lensRadius / (toBHdist + 1.0));
      } else {
        s._lensed = 0;
      }
    } else {
      s._lensed = 0;
    }

    const alpha = Math.min(1, s.dist * 2) * (0.5 + kick * 0.3 + energy * 0.2);
    const sz = s.size * (0.3 + s.dist * 2.5);

    const dx = x - vpX;
    const dy = y - vpY;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const nx = dx / len;
    const ny = dy / len;
    // Lensed stars get longer streaks
    const streakLen = s.dist * starSpeed * 2.5 * (1.0 + s._lensed * 3.0);

    ctx.globalAlpha = alpha * (1.0 + s._lensed * 0.5);
    const starLit = 70 + Math.floor(s._lensed * 25);
    ctx.strokeStyle = `rgba(${starLit + 130},${starLit + 140},${starLit + 150},${alpha})`;
    ctx.lineWidth = sz * (0.4 + s._lensed * 0.6);
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x - nx * streakLen, y - ny * streakLen);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  if (isPlaying && freqData) {
    // Side Frequency Bars — white with varying alpha
    const barH = H * 0.5;
    const startY = H * 0.25;
    for (let i = 0; i < CFG.numBars; i++) {
      const v = smoothBars[i];
      const yPos = startY + i * (barH / CFG.numBars);
      const barLen = v * W * 0.10;
      const lit = Math.floor(200 + v * 55);
      ctx.fillStyle = `rgba(${lit},${lit+5},${lit+10},${0.5 + v * 0.4})`;
      ctx.fillRect(0, yPos, barLen, Math.max(1, barH / CFG.numBars - 2));
      ctx.fillRect(W - barLen, yPos, barLen, Math.max(1, barH / CFG.numBars - 2));
    }

    // ── Outer Spectrum Ring — angular spikes (40 filled triangles) ──
    const inhale = lookAhead.anticipation;
    const sectionBreath = section === 'drop' ? 1.3 : section === 'breakdown' ? 0.7 : (1.0 - inhale * 0.25);
    const ringR = Math.min(W, H) * (0.32 + kick * 0.12) * sectionBreath;
    const ringCX = cx + (vpX - cx) * 0.05;
    const ringCY = cy + (vpY - cy) * 0.05;
    const spikeCount = 40;

    for (let i = 0; i < spikeCount; i++) {
      const idx = Math.floor(Math.pow(i / spikeCount, 1.5) * freqData.length);
      const v = freqData[Math.min(idx, freqData.length - 1)] / 255;
      if (v < 0.15) continue; // lower cutoff — more spikes visible
      const angle = (i / spikeCount) * Math.PI * 2 - Math.PI / 2;
      const halfW = Math.PI / spikeCount * 0.3;
      const spikeLen = ringR * 0.5 * v * (1.0 + kick * 1.0); // kick doubles spike length
      const outerR = ringR + spikeLen;
      const lit = Math.floor(200 + v * 55);
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = `rgb(${lit},${lit+5},${lit+10})`;
      ctx.beginPath();
      ctx.moveTo(ringCX + Math.cos(angle - halfW) * ringR, ringCY + Math.sin(angle - halfW) * ringR);
      ctx.lineTo(ringCX + Math.cos(angle) * outerR, ringCY + Math.sin(angle) * outerR);
      ctx.lineTo(ringCX + Math.cos(angle + halfW) * ringR, ringCY + Math.sin(angle + halfW) * ringR);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Star polygon wireframes — sharp points, monochrome silver
    const shapes = [
      { x: W*0.13, y: H*0.18, points: 5, rMul: 1.2, speed: 0.7,  band: bands.sub, depth: 0.8 },
      { x: W*0.87, y: H*0.18, points: 3, rMul: 1.0, speed: -1.1, band: bands.low, depth: 0.5 },
      { x: W*0.13, y: H*0.82, points: 6, rMul: 1.1, speed: 0.9,  band: bands.mid, depth: 0.7 },
      { x: W*0.87, y: H*0.82, points: 4, rMul: 0.9, speed: -0.8, band: bands.high, depth: 0.4 },
      { x: W*0.06, y: H*0.5,  points: 5, rMul: 0.8, speed: 0.5,  band: (bands.sub + bands.low) / 2, depth: 0.9 },
      { x: W*0.94, y: H*0.5,  points: 7, rMul: 0.7, speed: -0.6, band: (bands.mid + bands.high) / 2, depth: 0.6 },
    ];
    for (const sh of shapes) {
      const sx = sh.x;
      const sy = sh.y;
      const r = (60 + sh.band * 120) * sh.rMul;
      const rot = overlayTime * sh.speed;
      // Draw star polygon: connect every other vertex
      const n = sh.points;
      const outerR = r;
      const innerR = r * 0.4;
      const alpha = 0.4 + sh.band * 0.5;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = `rgba(220,230,240,${alpha})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i <= n * 2; i++) {
        const a = rot + (i / (n * 2)) * Math.PI * 2;
        const rr = i % 2 === 0 ? outerR : innerR;
        const px = sx + Math.cos(a) * rr;
        const py = sy + Math.sin(a) * rr;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Bass Pulse Arcs — white, kick-driven
    const bassR = Math.min(W, H) * 0.4;
    const bassKick = bands.sub;
    for (let i = 0; i < 3; i++) {
      const arcR = bassR * (0.6 + i * 0.2) + bassKick * 30;
      const arcStart = Math.PI * 0.55 + i * 0.08;
      const arcEnd = Math.PI * 0.95 - i * 0.08;
      ctx.globalAlpha = 0.15 + bassKick * 0.35;
      ctx.strokeStyle = `rgba(220,225,230,${0.4 + bassKick * 0.5})`;
      ctx.lineWidth = 1.5 + bassKick * 2.5;
      ctx.beginPath(); ctx.arc(cx, cy + H * 0.1, arcR, arcStart, arcEnd); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx, cy + H * 0.1, arcR, Math.PI + (Math.PI - arcEnd), Math.PI + (Math.PI - arcStart)); ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Shock Rings from vanishing point — white
    for (let i = shockRings.length - 1; i >= 0; i--) {
      const ring = shockRings[i];
      ring.r += ring.speed * dt;
      ring.life -= dt;
      if (ring.life <= 0) { shockRings.splice(i, 1); continue; }
      ctx.globalAlpha = ring.life * 0.7;
      ctx.strokeStyle = `rgba(230,235,245,${ring.life * 0.8})`;
      ctx.lineWidth = 2.5 + ring.life * 4;
      ctx.beginPath(); ctx.arc(vpX, vpY, ring.r, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Radiating line burst on sustained peaks (replaces mandala)
  if (mandalaAlpha > 0.02) {
    mandalaAlpha *= 0.93;
    const burstR = Math.min(W, H) * 0.3;
    const numLines = 10;
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = `rgba(220,225,235,1)`;
    for (let i = 0; i < numLines; i++) {
      const a = (i / numLines) * Math.PI * 2 + overlayTime * 0.15;
      // Line length driven by frequency band (spread across spectrum)
      const bandIdx = Math.floor((i / numLines) * (freqData ? freqData.length : 64));
      const bandV = freqData ? freqData[Math.min(bandIdx, freqData.length - 1)] / 255 : 0.5;
      const lineLen = burstR * (0.3 + bandV * 0.7);
      ctx.globalAlpha = mandalaAlpha * 0.7;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * burstR * 0.05, cy + Math.sin(a) * burstR * 0.05);
      ctx.lineTo(cx + Math.cos(a) * lineLen, cy + Math.sin(a) * lineLen);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Reality Tears — monochrome white/silver
  for (let i = tears.length - 1; i >= 0; i--) {
    const t = tears[i];
    t.life -= dt;
    t.y += t.drift * dt;
    if (t.life <= 0) { tears.splice(i, 1); continue; }
    const alpha = t.life / t.maxLife;
    if (Math.random() < 0.3) continue;

    ctx.globalAlpha = alpha * 0.8;
    ctx.fillStyle = `rgba(220,225,235,${alpha * 0.9})`;
    if (t.jagged) {
      for (let s = 0; s < 5; s++) {
        const segY = t.y - t.h/2 + s * (t.h/5);
        ctx.fillRect(t.x + (Math.random()-0.5)*15, segY, t.w * (0.5+Math.random()), t.h/5 - 1);
      }
    } else {
      ctx.fillRect(t.x, t.y - t.h/2, t.w, t.h);
    }
    ctx.globalAlpha = alpha * 0.5;
    ctx.fillStyle = '#fff';
    ctx.fillRect(t.x + t.w*0.3, t.y - t.h*0.4, t.w*0.4, t.h*0.8);
    ctx.globalAlpha = alpha * 0.3;
    ctx.fillStyle = 'rgba(180,185,195,0.6)';
    ctx.fillRect(t.x - 4, t.y - t.h*0.3, 3, t.h*0.6);
    ctx.fillStyle = 'rgba(160,165,175,0.6)';
    ctx.fillRect(t.x + t.w + 1, t.y - t.h*0.3, 3, t.h*0.6);
  }
  ctx.globalAlpha = 1;

  // Particles — angular debris triangles, hard alpha, white
  let aliveCount = 0;
  for (let i = 0; i < CFG.maxParticles; i++) {
    const p = pool[i];
    if (!p.alive) continue;
    aliveCount++;
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += p.gravity * dt; p.vx *= 0.97; p.life -= dt;
    if (p.life <= 0) { p.alive = false; continue; }
    const a = p.life / p.maxLife;
    if (a < 0.1) { p.alive = false; continue; } // hard cutoff, no gradual fade
    const s = p.size * a;
    // Triangle oriented along velocity
    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy) || 1;
    const nx = p.vx / speed;
    const ny = p.vy / speed;
    const perpX = -ny;
    const perpY = nx;
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = `rgba(${200 + Math.floor(a * 55)},${205 + Math.floor(a * 50)},${215 + Math.floor(a * 40)},0.9)`;
    ctx.beginPath();
    ctx.moveTo(p.x + nx * s * 1.2, p.y + ny * s * 1.2);
    ctx.lineTo(p.x + perpX * s * 0.4, p.y + perpY * s * 0.4);
    ctx.lineTo(p.x - perpX * s * 0.4, p.y - perpY * s * 0.4);
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  return aliveCount;
}

// ─── Resize ─────────────────────────────────────────────────────────
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  glCanvas.width = w; glCanvas.height = h;
  const dpr = Math.min(window.devicePixelRatio, 2);
  ovCanvas.width = Math.floor(w * dpr);
  ovCanvas.height = Math.floor(h * dpr);
  glCanvas.style.width = ovCanvas.style.width = w + 'px';
  glCanvas.style.height = ovCanvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  gl.viewport(0, 0, w, h);
  rebuildFBs();
}
resize();
window.addEventListener('resize', resize);

// ─── HUD ────────────────────────────────────────────────────────────
let showDebug = CFG.debugMode;
if (!showDebug) hud.classList.add('hidden');

// Demo mode: synthetic audio, no drop zone
if (CFG.demoMode) {
  dropZone.style.display = 'none';
  isPlaying = true;
}

// ─── Audio Loading ──────────────────────────────────────────────────
function startPlayback(file) {
  initAudio();
  if (!audioCtx) return;
  if (sourceNode) { sourceNode.disconnect(); sourceNode = null; }
  if (audioEl) { audioEl.pause(); audioEl.remove(); }
  audioEl = new Audio();
  audioEl.crossOrigin = 'anonymous';
  audioEl.src = URL.createObjectURL(file);
  audioEl.loop = true;
  sourceNode = audioCtx.createMediaElementSource(audioEl);
  sourceNode.connect(analyser);
  if (audioCtx.state === 'suspended') audioCtx.resume();
  // Reset progressive reveal on seek backward / track loop
  audioEl.addEventListener('seeked', () => {
    if (audioEl.currentTime < 1.0) {
      playElapsed = 0; revealTier = 0;
    }
  });
  audioEl.play().then(() => {
    isPlaying = true; isPaused = false;
    playElapsed = 0; revealTier = 0; // reset on new track
    dropZone.classList.add('hidden');
  }).catch(e => showError('Play failed: ' + e.message));
}

function loadAudioRealtime(file) {
  offlineMode = false;
  offlineTimeline = null;
  offlineSections = null;
  startPlayback(file);
}

async function loadAudioAnalyzed(file) {
  dropZone.classList.add('hidden');
  const result = await analyzeAudioOffline(file);
  if (!result) {
    dropZone.classList.remove('hidden');
    return;
  }
  offlineTimeline = result.timeline;
  offlineSections = result.sections;
  offlineMode = true;
  startPlayback(file);
}

// Pending file for mode selection
let pendingFile = null;

function showModeChoice(file) {
  pendingFile = file;
  dropZone.querySelector('div').innerHTML =
    `<div style="margin-bottom:20px;font-size:20px;letter-spacing:2px">MODE SELECT</div>` +
    `<button id="btn-realtime" class="mode-btn"><span class="label">&#9654; Real-time</span><span class="desc">Instant playback, reactive only</span></button>` +
    `<button id="btn-analyzed" class="mode-btn recommended"><span class="label">&#9889; Analyzed</span><span class="desc">Pre-scans track &middot; anticipation &middot; look-ahead</span></button>` +
    `<small style="display:block;margin-top:16px;font-size:11px;color:rgba(0,255,0,.35)">Analyzed mode knows what's coming — camera, fog, and ring react before drops hit</small>`;
  document.getElementById('btn-realtime').onclick = (e) => {
    e.stopPropagation(); // prevent bubbling to dropZone click handler
    restoreDropZone();
    loadAudioRealtime(pendingFile);
  };
  document.getElementById('btn-analyzed').onclick = (e) => {
    e.stopPropagation(); // prevent bubbling to dropZone click handler
    restoreDropZone();
    loadAudioAnalyzed(pendingFile);
  };
}

function restoreDropZone() {
  dropZone.querySelector('div').innerHTML =
    `DROP AUDIO HERE<small>click for fullscreen &middot; space=pause &middot; F=fullscreen &middot; D=debug</small>`;
  // Re-attach click handler for file picker
  dropZone.onclick = dropZoneClick;
}

function dropZoneClick() {
  const i = document.createElement('input');
  i.type = 'file'; i.accept = 'audio/*';
  i.onchange = () => { if (i.files[0]) showModeChoice(i.files[0]); };
  i.click();
}

document.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); });
document.addEventListener('drop', e => {
  e.preventDefault(); e.stopPropagation();
  const f = e.dataTransfer.files[0];
  if (f) showModeChoice(f);
});
dropZone.onclick = dropZoneClick;

// ─── Keyboard ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (!audioEl) return;
    if (isPaused) { audioEl.play(); isPaused = false; isPlaying = true; }
    else { audioEl.pause(); isPaused = true; isPlaying = false; }
  }
  if (e.code === 'KeyF') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
  if (e.code === 'KeyD') {
    showDebug = !showDebug;
    hud.classList.toggle('hidden', !showDebug);
  }
});

document.addEventListener('click', e => {
  if (e.target === glCanvas || e.target === ovCanvas) {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  }
});

// ─── Render Loop ────────────────────────────────────────────────────
function drawFullscreenTriangle() {
  gl.bindVertexArray(emptyVAO);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}

let lastTime = 0, fpsFrames = 0, fpsTime = 0, fpsDisplay = 0;
const t0 = performance.now() / 1000;

function frame(nowMs) {
  requestAnimationFrame(frame);
  const t = nowMs / 1000;
  const dt = Math.min(t - (lastTime || t), 0.05);
  lastTime = t;
  fpsFrames++; fpsTime += dt;
  if (fpsTime >= 0.5) {
    fpsDisplay = Math.round(fpsFrames / fpsTime);
    fpsFrames = 0; fpsTime = 0;
  }

  processAudio();
  updateSongSection(dt);

  // ── Look-ahead uniforms (Phase 2C) — read offline data into smoothed state ──
  if (offlineMode && offlineSections && offlineTimeline) {
    const f = getOfflineFrame();
    if (f >= 0) {
      lookAhead.nextDropIn = offlineSections.timeToNextDrop[f];
      lookAhead.sectionProgress = offlineSections.sectionProgress[f];
      // Beat phase: position within beat grid (0-1 per beat)
      if (offlineSections.bpm > 0) {
        const beatDur = 60.0 / offlineSections.bpm;
        const time = f / offlineTimeline.fps;
        lookAhead.beatPhase = (time % beatDur) / beatDur;
      }
      // Anticipation ramp: builds from 0→1 over the 3s before a drop
      const ttd = lookAhead.nextDropIn;
      const targetAnticipation = ttd < 3.0 ? Math.pow(1.0 - ttd / 3.0, 1.5) : 0;
      lookAhead.anticipation += (targetAnticipation - lookAhead.anticipation) * 4.0 * dt;
      // Novelty + repetition from offline analysis
      lookAhead.novelty = offlineTimeline.novelty ? offlineTimeline.novelty[f] : 0.5;
      lookAhead.repetition = offlineTimeline.repetition ? offlineTimeline.repetition[f] : 0;
    }
  } else {
    // Real-time: no look-ahead, decay anticipation
    lookAhead.nextDropIn = 999;
    lookAhead.sectionProgress = 0;
    lookAhead.beatPhase = 0;
    lookAhead.anticipation *= 0.95;
    // Real-time fallback: estimate novelty from spectral flux variance
    lookAhead.novelty += (Math.min(1, spectralFlux * 2) - lookAhead.novelty) * 0.1;
    lookAhead.repetition += ((1.0 - Math.min(1, spectralFlux * 3)) - lookAhead.repetition) * 0.05;
  }

  // Progressive reveal tier update
  if (isPlaying) playElapsed += dt;
  for (let i = REVEAL_TIERS.length - 1; i >= 0; i--) {
    if (playElapsed >= REVEAL_TIERS[i].at) { revealTier = i; break; }
  }
  // Camera drift now derived from audio features — no preset patterns

  // Visual novelty injection — ramp when audio is repetitive
  if (lookAhead.novelty < 0.3) {
    injectionLowNoveltyTime += dt;
  } else {
    injectionLowNoveltyTime = Math.max(0, injectionLowNoveltyTime - dt * 2);
  }
  if (lookAhead.repetition > 0.7) {
    injectionHighRepTime += dt;
  } else {
    injectionHighRepTime = Math.max(0, injectionHighRepTime - dt * 2);
  }
  let injTarget = 0;
  if (injectionLowNoveltyTime > 3) injTarget += Math.min(1, (injectionLowNoveltyTime - 3) * 0.2);
  if (injectionHighRepTime > 2) injTarget += Math.min(1, (injectionHighRepTime - 2) * 0.3);
  injTarget = Math.min(1, injTarget);
  if (lookAhead.novelty > 0.6) injTarget = 0; // novel audio — back off
  injectionLevel += (injTarget - injectionLevel) * (injTarget > injectionLevel ? 2.0 : 0.5) * dt;
  injectionLevel = Math.max(0, Math.min(1, injectionLevel));
  // No hue offset in monochrome mode — injection drives contrast instead

  // Autonomous drift — slow modulations proportional to repetition
  const rep = lookAhead.repetition;
  autoDrift.fogBreath = rep * 0.3 * Math.sin(time * 0.25); // 15-30s period breathing
  autoDrift.corridorR = rep * 0.75 * Math.sin(time * 0.2);  // oscillate +-0.75
  autoDrift.objScaleMod = rep * 0.15 * Math.sin(time * 0.18); // subtle scale breathing
  autoDrift.hueDriftBoost = 0; // no hue drift in monochrome mode

  updateSpawns();

  // Smooth mouse tracking
  smoothMouseX += (mouseX - smoothMouseX) * 3.0 * dt;
  smoothMouseY += (mouseY - smoothMouseY) * 3.0 * dt;

  // Demo mode: synthetic breakcore-level chaos
  if (CFG.demoMode) {
    const tt = t * 3.0;
    bands.sub = 0.4 + 0.4 * Math.max(0, Math.sin(tt * 5.3)) * (0.5 + 0.5 * Math.sin(tt * 0.3));
    bands.low = 0.3 + 0.3 * Math.abs(Math.sin(tt * 3.7 + 1.0));
    bands.mid = 0.35 + 0.25 * Math.sin(tt * 7.1 + 2.0);
    bands.high = 0.3 + 0.3 * Math.abs(Math.sin(tt * 11.3 + 3.0));
    chaosMetric = 0.5 + 0.3 * Math.sin(tt * 0.9);
    cumulativeHue += 0.8;
    spectralCentroid = 2000 + 1500 * Math.sin(tt * 1.3);
    // Synthetic freqData for spectrum ring
    if (!freqData) freqData = new Uint8Array(1024);
    for (let i = 0; i < freqData.length; i++) {
      const f = i / freqData.length;
      freqData[i] = Math.floor(255 * Math.max(0,
        (1.0 - f * 1.5) * (0.5 + 0.5 * Math.sin(tt * 4.0 + i * 0.1)) *
        (0.6 + 0.4 * Math.sin(tt * 7.0 + f * 20.0))
      ));
    }
    // Synthetic smoothBars
    for (let i = 0; i < CFG.numBars; i++) {
      const f = i / CFG.numBars;
      smoothBars[i] = Math.max(0, (1.0 - f) * (0.4 + 0.4 * Math.sin(tt * 3.0 + i * 0.3)));
    }
    // Synthetic spectral analysis — demo mode simulates drums
    spectralFlatness = 0.5 + 0.3 * Math.sin(tt * 5.3);
    spectralFlux = 0.3 + 0.3 * Math.abs(Math.sin(tt * 5.3));
    transientScore = 0.5 + 0.4 * Math.max(0, Math.sin(tt * 5.3));
    percGateState = 0.6 + 0.3 * Math.max(0, Math.sin(tt * 5.3));
  }

  const energy = totalEnergy();
  const bm = CFG.bandMultipliers;
  // 3A/3B/3C: Onset-triggered percussion gate
  // Only reclassify at onsets (high flux). Between onsets, decay slowly.
  // Sub-band flatness: high = noise-like (drum), low = tonal (bass synth)
  if (spectralFlux > 0.08) {
    // Onset detected — classify: drum or melodic?
    const drumScore = Math.min(1, spectralFlatness * 2.5) * (0.4 + transientScore * 0.6);
    percGateState = Math.max(percGateState, drumScore);
  }
  percGateState *= 0.95; // slow decay — let drum visuals ring
  const percGate = percGateState;
  // Floor of 0.55: mild suppression for melodic bass, drums push to full.
  const kick = Math.min(1, bands.sub * bm.kick * (0.55 + percGate * 0.45));
  const snare = Math.min(1, bands.low * bm.snare * (0.55 + percGate * 0.45));
  const hat = Math.min(1, bands.high * bm.hat); // hats are inherently noise-like, minimal gating
  const chaos = chaosMetric;
  const hue = ((cumulativeHue * 20 + spectralCentroid * 0.1) % 360 + 360) % 360;
  const time = t - t0;

  // ── Impact system — hard kicks trigger distortion (gated by percussion confidence) ──
  const kickDelta = bands.sub - prevKick;
  if (kickDelta * percGate > 0.02 && kick > 0.6) {
    impactIntensity = Math.min(1.0, kick * 1.2);
  }
  impactIntensity *= 0.85; // fast decay

  // ── Audio-driven evolution — continuous parameter mapping from audio ──
  const section = energyHistory.section;

  // Direct audio → evolution targets (no phase index cycling)
  const evoTarget = {
    repPeriod:  4.0 + (1.0 - energy) * 6.0,         // dense at high energy
    fogDensity: 0.015 + chaos * 0.025,                  // halved — let 3D scene show through
    speedMul:   0.5 + energy * 1.5,                    // energy = fast
    tunnelBlend: energy > 0.6 ? (energy - 0.6) * 2.5 : 0.0,
    objScale:   0.5 + energy * 0.5 + kick * 0.2,     // energy = bigger
    corridorR:  2.5 + (1.0 - energy) * 2.0,          // low energy = wide open
  };
  // Contrast grade derived from energy (Phase 3C)
  const contrastLevel = 0.3 + energy * 0.5 + kick * 0.2;

  // Section overrides on top
  if (section === 'breakdown') {
    evoTarget.speedMul *= 0.3;
    evoTarget.fogDensity *= 0.5;
    evoTarget.objScale *= 0.7;
  } else if (section === 'buildup') {
    evoTarget.fogDensity *= 1.0 + energyHistory.trendDuration * 0.1;
  } else if (section === 'drop') {
    evoTarget.speedMul *= 2.0;
    evoTarget.fogDensity *= 0.7;
    evoTarget.objScale *= 1.2;
  }

  // Smooth lerp toward audio-driven targets
  const evoLerp = 2.0 * dt;
  evoSmooth.repPeriod += (evoTarget.repPeriod - evoSmooth.repPeriod) * evoLerp;
  evoSmooth.fogDensity += (evoTarget.fogDensity - evoSmooth.fogDensity) * evoLerp;
  evoSmooth.speedMul += (evoTarget.speedMul - evoSmooth.speedMul) * evoLerp;
  evoSmooth.tunnelBlend += (evoTarget.tunnelBlend - evoSmooth.tunnelBlend) * evoLerp;
  evoSmooth.objScale += (evoTarget.objScale - evoSmooth.objScale) * evoLerp;
  evoSmooth.colorGrade += (contrastLevel - evoSmooth.colorGrade) * evoLerp;

  // Section speed/fog — now mostly handled by audio-driven evoTarget, these are residual
  let sectionSpeedMul = 1.0;
  let sectionFogMul = 1.0;

  // Look-ahead anticipation effects (Phase 2C) — only when offline data available
  const ant = lookAhead.anticipation;
  if (ant > 0.01) {
    // Camera accelerates before drops — subtle ramp
    sectionSpeedMul += ant * 0.8;
    // Fog clears in anticipation — opens up the view
    sectionFogMul *= 1.0 - ant * 0.4;
  }

  // ── Forward camera ──
  const forwardSpeed = (CFG.camBaseSpeed + energy * CFG.camBoostSpeed) * evoSmooth.speedMul * sectionSpeedMul;
  cameraZ += forwardSpeed * dt;
  if (kickDelta * percGate > 0.015) {
    cameraZ += CFG.camKickImpulse * (section === 'drop' ? 3.0 : 1.0);
  }
  cameraSpeed = forwardSpeed;
  // Camera XY drift — derived continuously from audio features
  const mOff = [(smoothMouseX - 0.5) * 2, (smoothMouseY - 0.5) * 2];
  // Drift frequencies emerge from spectral centroid and energy
  const dxA = 0.15 + spectralCentroid / 15000;
  const dxB = 0.12 + energy * 0.15;
  const dyA = 0.12 + energy * 0.2;
  const dyB = 0.10 + chaos * 0.15;
  // Amplitude scales with energy
  const driftAmp = 0.5 + energy * 1.0;
  const camDriftX = Math.sin(time * dxA) * driftAmp + Math.cos(time * dxB) * (driftAmp * 0.7);
  const camDriftY = Math.sin(time * dyA) * (driftAmp * 0.8) + Math.cos(time * dyB) * (driftAmp * 0.5);
  // Percussive tumble added to camera roll (handled in GLSL via chaos, but add transient)
  // (Roll is in GLSL — we feed chaos + transient via uniform)

  // Black hole: you approach it, pass through, new one spawns further ahead
  const bhDist = bhWorldZ - cameraZ;
  if (bhDist < 1.0) {
    bhPassFlash = 1.0;
    bhWorldZ = cameraZ + 50.0 + Math.random() * 40.0;
    queueBHRebuild();
  }
  bhPassFlash *= (bhPassFlash > 0.5) ? 0.96 : 0.92; // two-phase decay: bright lingers, then fades

  // BH grows as you approach — no hard cap, should feel massive up close
  // Anticipation: BH looms larger before drops (perceived drift closer)
  const bhApproachFactor = Math.max(0.15, 15.0 / Math.max(bhDist, 0.5));
  const bhZ = bhWorldZ;
  const bhSize = (2.0 + energy * 1.2 + kick * 0.8 + ant * 1.5) * Math.min(bhApproachFactor, 4.0);

  // ── Generative shape params — continuous audio → geometry ──
  // Each parameter is a direct function of audio features, smooth-lerped
  const shapeLerp = 3.0 * dt; // responsive but smooth
  const spTarget = {
    symmetry: 3.0 + (spectralCentroid / 3000) * 5.0,           // pitch → symmetry order (3-8)
    spike:    Math.min(1, kick * 1.5),                           // kick → spike extension
    fracture: Math.min(1, chaos * 1.3),                          // chaos → fracture intensity
    twist:    hat * 1.5 + energy * 0.3,                          // hat + energy → twist rate
    hollow:   Math.min(1, lookAhead.novelty * 1.2),              // novelty → hollowness
    angular:  Math.min(1, transientScore * 0.8 + spectralFlatness * 0.6), // transients → angular
  };
  // Section overrides
  if (section === 'breakdown') {
    spTarget.spike *= 0.2;
    spTarget.fracture *= 0.3;
    spTarget.hollow = Math.max(spTarget.hollow, 0.6); // shells in breakdowns
    spTarget.angular *= 0.5;
  } else if (section === 'drop') {
    spTarget.spike = Math.min(1, spTarget.spike + 0.4);
    spTarget.fracture = Math.min(1, spTarget.fracture + 0.3);
    spTarget.angular = Math.min(1, spTarget.angular + 0.3);
  }
  shapeParams.symmetry += (spTarget.symmetry - shapeParams.symmetry) * shapeLerp;
  shapeParams.spike += (spTarget.spike - shapeParams.spike) * shapeLerp;
  shapeParams.fracture += (spTarget.fracture - shapeParams.fracture) * shapeLerp;
  shapeParams.twist += (spTarget.twist - shapeParams.twist) * shapeLerp;
  shapeParams.hollow += (spTarget.hollow - shapeParams.hollow) * shapeLerp;
  shapeParams.angular += (spTarget.angular - shapeParams.angular) * shapeLerp;

  // ── 3D Spawn Pool update ──
  camDriftXGlobal = camDriftX;
  camDriftYGlobal = camDriftY;
  updateSpawnPool(dt);
  updateSpawn3DTriggers(kick, snare, hat, energy, chaos, section);

  // ── Pass 1: Scene (half res) ──
  gl.bindFramebuffer(gl.FRAMEBUFFER, sceneFB.fb);
  gl.viewport(0, 0, sceneW, sceneH);
  gl.useProgram(sceneProg);
  gl.uniform1f(sceneU.uTime, time);
  gl.uniform1f(sceneU.uEnergy, energy);
  gl.uniform1f(sceneU.uKick, kick);
  gl.uniform1f(sceneU.uSnare, snare);
  gl.uniform1f(sceneU.uHat, hat);
  gl.uniform1f(sceneU.uChaos, Math.min(1, chaos + injectionLevel * 0.3));
  gl.uniform1f(sceneU.uHue, hue);
  gl.uniform2f(sceneU.uMouse, smoothMouseX, smoothMouseY);
  gl.uniform1f(sceneU.uCamZ, cameraZ);
  gl.uniform1f(sceneU.uTunnelBlend, evoSmooth.tunnelBlend);
  gl.uniform1f(sceneU.uFogDensity, Math.max(0.01, evoSmooth.fogDensity * sectionFogMul + autoDrift.fogBreath));
  gl.uniform1f(sceneU.uRepPeriod, evoSmooth.repPeriod);
  gl.uniform1f(sceneU.uObjScale, Math.max(0.3, evoSmooth.objScale + autoDrift.objScaleMod));
  gl.uniform2f(sceneU.uCamXY, camDriftX, camDriftY);
  gl.uniform1f(sceneU.uCorridorR, Math.max(2.0, evoTarget.corridorR + autoDrift.corridorR));
  gl.uniform1f(sceneU.uBHZ, bhZ);
  gl.uniform1f(sceneU.uBHSize, bhSize);
  gl.uniform3f(sceneU.uShapeA, shapeParams.symmetry, shapeParams.spike, shapeParams.fracture);
  gl.uniform3f(sceneU.uShapeB, shapeParams.twist, shapeParams.hollow, shapeParams.angular);
  gl.uniform2f(sceneU.uRes, sceneW, sceneH);
  // Upload spawn pool uniforms
  for (let i = 0; i < POOL3D_SIZE; i++) {
    const s = spawnPool[i];
    if (s.active) {
      gl.uniform4f(spawnALocs[i], s.x, s.y, s.z, s.type);
      gl.uniform4f(spawnBLocs[i], s.scale, s.life, s.rotSeed, 0);
    } else {
      gl.uniform4f(spawnALocs[i], 0, 0, 0, 0);
      gl.uniform4f(spawnBLocs[i], 0, 0, 0, 0);
    }
  }
  drawFullscreenTriangle();

  // ── Pass 2: Post-processing (full res) ──
  const src = ppFB[ppIdx], dst = ppFB[1 - ppIdx];
  gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fb);
  gl.viewport(0, 0, screenW, screenH);
  gl.useProgram(postProg);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, sceneFB.tex); gl.uniform1i(postU.uScene, 0);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, src.tex); gl.uniform1i(postU.uPrev, 1);
  gl.uniform1f(postU.uTime, time);
  gl.uniform1f(postU.uEnergy, energy);
  gl.uniform1f(postU.uKick, kick);
  gl.uniform1f(postU.uChaos, chaos);
  gl.uniform1f(postU.uPhase, evoSmooth.colorGrade);
  gl.uniform1f(postU.uCamSpeed, cameraSpeed);
  gl.uniform1f(postU.uImpact, impactIntensity);
  gl.uniform1f(postU.uFlash, bhPassFlash);
  gl.uniform2f(postU.uRes, screenW, screenH);
  drawFullscreenTriangle();

  // Blit to screen
  gl.bindFramebuffer(gl.READ_FRAMEBUFFER, dst.fb);
  gl.bindFramebuffer(gl.DRAW_FRAMEBUFFER, null);
  gl.viewport(0, 0, screenW, screenH);
  gl.blitFramebuffer(0, 0, screenW, screenH, 0, 0, screenW, screenH, gl.COLOR_BUFFER_BIT, gl.NEAREST);
  ppIdx = 1 - ppIdx;

  // Canvas 2D overlay
  const W = window.innerWidth, H = window.innerHeight;
  const aliveP = drawOverlay(dt, W, H, energy, kick, hue, section);

  // HUD
  if (showDebug) {
    document.getElementById('hud-fps').textContent = fpsDisplay;
    document.getElementById('hud-frametime').textContent = (dt * 1000).toFixed(1);
    document.getElementById('hud-res').textContent = `GL:${screenW}x${screenH} Scene:${sceneW}x${sceneH} DPR:${Math.min(window.devicePixelRatio, 2).toFixed(1)}`;
    document.getElementById('hud-energy').textContent = 'Energy: ' + energy.toFixed(2);
    document.getElementById('hud-chaos').textContent = 'Chaos: ' + chaos.toFixed(2);
    document.getElementById('hud-band').textContent = `K:${kick.toFixed(2)} S:${snare.toFixed(2)} H:${hat.toFixed(2)} FL:${spectralFlux.toFixed(2)} FT:${spectralFlatness.toFixed(2)} TR:${transientScore.toFixed(2)} PG:${percGate.toFixed(2)}`;
    const activeSpawns = spawnPool.filter(s => s.active).length;
    let extraInfo = `P:${aliveP}/${CFG.maxParticles} SP:${activeSpawns}/8 Z:${cameraZ.toFixed(0)} Spd:${cameraSpeed.toFixed(1)} C:${contrastLevel.toFixed(2)} SDF:S${shapeParams.symmetry.toFixed(1)} K${shapeParams.spike.toFixed(2)} F${shapeParams.fracture.toFixed(2)} T${shapeParams.twist.toFixed(2)} H${shapeParams.hollow.toFixed(2)} A${shapeParams.angular.toFixed(2)} [${section.toUpperCase()}]`;
    extraInfo += ` T${revealTier} INJ:${injectionLevel.toFixed(2)} NOV:${lookAhead.novelty.toFixed(2)} REP:${lookAhead.repetition.toFixed(2)}`;
    if (offlineMode && offlineSections) {
      const f = getOfflineFrame();
      if (f >= 0) {
        const ttd = offlineSections.timeToNextDrop[f];
        const tsd = offlineSections.timeSinceLastDrop[f];
        const sp = offlineSections.sectionProgress[f];
        extraInfo += ` | DROP:${ttd < 100 ? ttd.toFixed(1)+'s' : '--'} BPM:${offlineSections.bpm} SP:${sp.toFixed(2)} ANT:${lookAhead.anticipation.toFixed(2)} BP:${lookAhead.beatPhase.toFixed(2)}`;
      }
    }
    extraInfo += offlineMode ? ' [ANALYZED]' : ' [REALTIME]';
    document.getElementById('hud-extra').textContent = extraInfo;
  }
}

requestAnimationFrame(frame);
console.log('Breakcore Visualizer v9.0 — Spawn Pool + BH Flash + Camera Fix — WebGL2 + GLSL + Canvas 2D overlay');
</script>
