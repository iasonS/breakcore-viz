<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BREAKCORE VISUALIZER</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#overlay{z-index:2;pointer-events:none}
#hud{position:fixed;top:16px;left:16px;z-index:10;color:#0f0;font:11px/1.5 'Courier New',monospace;
  background:rgba(0,0,0,.7);padding:8px 12px;border:1px solid rgba(0,255,0,.3);
  transition:opacity .4s;pointer-events:none}
#hud.hidden{opacity:0}
#drop-zone{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.85);transition:opacity .5s}
#drop-zone.hidden{opacity:0;pointer-events:none}
#drop-zone div{color:#0f0;font:24px 'Courier New',monospace;border:2px dashed rgba(0,255,0,.4);
  padding:60px 80px;text-align:center}
#drop-zone div small{display:block;margin-top:8px;font-size:13px;color:rgba(0,255,0,.5)}
.mode-btn{font:18px 'Courier New',monospace;color:#0f0;background:rgba(0,255,0,.08);
  border:1px solid rgba(0,255,0,.4);padding:14px 32px;cursor:pointer;margin:8px;
  transition:all .2s;position:relative;overflow:hidden}
.mode-btn:hover{background:rgba(0,255,0,.2);border-color:rgba(0,255,0,.8);
  box-shadow:0 0 20px rgba(0,255,0,.15);transform:scale(1.03)}
.mode-btn:active{transform:scale(0.97)}
.mode-btn.recommended{border-color:rgba(0,255,0,.7);background:rgba(0,255,0,.12)}
.mode-btn .label{display:block;font-size:18px}
.mode-btn .desc{display:block;font-size:11px;color:rgba(0,255,0,.5);margin-top:4px}
#error{position:fixed;bottom:20px;left:20px;right:20px;z-index:30;color:#f44;
  font:13px 'Courier New',monospace;background:rgba(0,0,0,.9);padding:12px;
  border:1px solid #f44;display:none;max-height:200px;overflow:auto;white-space:pre-wrap}
#analyze-overlay{position:fixed;inset:0;z-index:25;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.92);transition:opacity .4s}
#analyze-overlay.hidden{opacity:0;pointer-events:none}
#analyze-overlay .inner{color:#0f0;font:18px 'Courier New',monospace;text-align:center;width:320px}
#analyze-overlay .bar-bg{width:100%;height:6px;background:rgba(0,255,0,.15);margin-top:16px;border:1px solid rgba(0,255,0,.3)}
#analyze-overlay .bar-fill{height:100%;background:#0f0;width:0%;transition:width .15s}
#analyze-overlay .status{margin-top:10px;font-size:12px;color:rgba(0,255,0,.6)}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="overlay"></canvas>
<div id="hud">
  <div><b>BREAKCORE VIZ</b> <span id="hud-fps">--</span>fps <span id="hud-frametime">--</span>ms</div>
  <div id="hud-res">--</div>
  <div id="hud-energy">Energy: 0.00</div>
  <div id="hud-chaos">Chaos: 0.00</div>
  <div id="hud-band">K:0 S:0 H:0</div>
  <div id="hud-extra">P: 0</div>
</div>
<div id="drop-zone"><div>DROP AUDIO HERE<small>click for fullscreen &middot; space=pause &middot; F=fullscreen &middot; D=debug</small></div></div>
<div id="analyze-overlay" class="hidden">
  <div class="inner">
    <div id="analyze-label">ANALYZING AUDIO...</div>
    <div class="bar-bg"><div class="bar-fill" id="analyze-bar"></div></div>
    <div class="status" id="analyze-status">Decoding...</div>
  </div>
</div>
<div id="error"></div>

<script>
"use strict";

// ─── Configuration ──────────────────────────────────────────────────
const CFG = {
  // Audio
  fftSize: 2048,
  smoothAlpha: 0.15,
  bandRanges: { sub: [20, 100], low: [100, 500], mid: [500, 2000], high: [2000, 16000] },
  bandMultipliers: { kick: 3, snare: 2.5, hat: 4 },

  // Particles
  maxParticles: 1200,
  spawn: {
    kick:  { count: [40, 70], speed: [250, 700], size: [5, 11], life: [0.8, 1.5], gravity: 500 },
    snare: { count: [30, 50], speed: [300, 750], size: [3, 6], life: [0.4, 0.8], gravity: 250 },
    hat:   { count: [35, 55], speed: [400, 950], size: [2, 4], life: [0.2, 0.5], gravity: 0 },
    peak:  { count: [60, 100], speed: [350, 1000], size: [4, 9], life: [0.6, 1.3], gravity: 350 },
  },
  onsetThresholds: { kick: 0.015, snare: 0.012, hat: 0.008, peak: 0.03 },
  peakEnergyMin: 0.6,

  // Overlay
  numBars: 64,
  numStars: 400,
  maxRings: 12,
  maxTears: 30,

  // Forward camera
  camBaseSpeed: 4.0,
  camBoostSpeed: 8.0,
  camKickImpulse: 0.8,
  corridorRadius: 3.5, // tunnel wall minimum radius from camera path

  // Shader tuning
  scene: {
    steps: 44, maxDist: 40.0, surfThreshold: 0.015,
  },
  post: {
    bloomThreshold: 0.5, bloomIntensity: 1.2, bloomKickBoost: 0.25,
    feedbackBaseZoom: 0.98, feedbackDecay: 0.82, feedbackBlend: 0.2,
    vignetteStrength: 0.3, toneMapCompression: 0.08, saturationBoost: 0.35,
    maxBrightness: 1.0,
  },


  // HUD
  debugMode: new URLSearchParams(window.location.search).has('debug'),
  demoMode: new URLSearchParams(window.location.search).has('demo'),
};

// ─── Error Handling ─────────────────────────────────────────────────
const errorEl = document.getElementById('error');
function showError(msg) {
  console.error(msg);
  errorEl.style.display = 'block';
  errorEl.textContent += msg + '\n';
}

// ─── DOM ────────────────────────────────────────────────────────────
const glCanvas = document.getElementById('gl');
const ovCanvas = document.getElementById('overlay');
const ctx = ovCanvas.getContext('2d');
const hud = document.getElementById('hud');
const dropZone = document.getElementById('drop-zone');

// ─── WebGL2 ─────────────────────────────────────────────────────────
const gl = glCanvas.getContext('webgl2', { antialias: false, alpha: false });
if (!gl) { showError('WebGL2 not supported'); throw 'no webgl2'; }
const floatExt = gl.getExtension('EXT_color_buffer_float');
gl.getExtension('OES_texture_float_linear');
const FB_INT = floatExt ? gl.RGBA16F : gl.RGBA8;
const FB_TYPE = floatExt ? gl.FLOAT : gl.UNSIGNED_BYTE;

// ─── Shaders ────────────────────────────────────────────────────────
const FULLSCREEN_VS = `#version 300 es
precision highp float;
out vec2 vUV;
void main() {
  float x = -1.0 + float((gl_VertexID & 1) << 2);
  float y = -1.0 + float((gl_VertexID & 2) << 1);
  vUV = vec2(x, y) * 0.5 + 0.5;
  gl_Position = vec4(x, y, 0.0, 1.0);
}`;

const SCENE_FS = `#version 300 es
precision highp float;
in vec2 vUV;
out vec4 fragColor;

uniform float uTime, uEnergy, uKick, uSnare, uHat, uChaos, uHue;
uniform float uCamZ, uTunnelBlend, uFogDensity, uRepPeriod, uObjScale, uCorridorR;
uniform float uBHZ, uBHSize;
uniform vec3 uShapeA; // symmetry, spike, fracture
uniform vec3 uShapeB; // twist, hollow, angular
uniform vec4 uSpawnA[8]; // xyz = world position, w = type (0=inactive)
uniform vec4 uSpawnB[8]; // x = scale, y = life (0-1), z = rotation seed, w = unused
uniform vec2 uRes, uMouse, uCamXY;

#define STEPS 40
#define MAX_DIST ${CFG.scene.maxDist.toFixed(1)}
#define SURF ${CFG.scene.surfThreshold.toFixed(3)}

vec3 hsl(float h, float s, float l) {
  vec3 c = clamp(abs(mod(h*6.0+vec3(0,4,2),6.0)-3.0)-1.0,0.0,1.0);
  return l+s*(c-0.5)*(1.0-abs(2.0*l-1.0));
}

// ── Hashing ──
vec3 hash31(vec3 p) {
  p = mod(p, 256.0);
  p = fract(p * vec3(443.897, 397.297, 491.187));
  p += dot(p, p.yzx + 19.19);
  return fract(vec3(p.x*p.y, p.y*p.z, p.z*p.x));
}

mat2 rot2(float a) { float c=cos(a),s=sin(a); return mat2(c,s,-s,c); }

// ── Generative Parametric SDF ──
// Shape emerges continuously from audio — no discrete shapes, no morphing.
// uShapeA = (symmetry 3-8, spike 0-1, fracture 0-1)
// uShapeB = (twist rate, hollow 0-1, angularity 0-1)
float generativeSDF(vec3 p, float tw) {
  // Per-object twist offset makes each instance unique
  float twistRate = uShapeB.x * 2.0;
  p.xz *= rot2(p.y * twistRate + tw * 0.2);

  // Store pre-fold position for asymmetric fracture
  vec3 pf = p;

  // N-fold symmetry via domain folding
  float n = max(3.0, floor(uShapeA.x + 0.5));
  float sector = 6.283 / n;
  float angle = atan(p.z, p.x);
  angle = mod(angle + sector * 0.5, sector) - sector * 0.5;
  float rxz = length(p.xz);
  p = vec3(cos(angle) * rxz, p.y, sin(angle) * rxz);

  // Base: sphere ↔ octahedron blend via angularity
  float sphere = length(p) - 1.0;
  vec3 ap = abs(p);
  float octa = (ap.x + ap.y + ap.z - 1.2) * 0.577;
  float d = mix(sphere, octa, uShapeB.z);

  // Spikes: sharp protrusions extending outward in folded space (repeat N times)
  float spike = uShapeA.y;
  if(spike > 0.01) {
    float spikeLen = 0.8 + spike * 2.5;
    float spikeW = 0.18 - spike * 0.08;
    // Cone-like spike along +X of folded domain
    float spk = max(length(p.yz) - spikeW, p.x - spikeLen);
    spk = max(spk, -(p.x - 0.4)); // start from surface, not center
    d = min(d, spk);
  }

  // Fracture planes — asymmetric cuts in pre-fold space
  float frac = uShapeA.z;
  if(frac > 0.05) {
    // Rotating cut normals — each object gets different cut orientation via tw
    vec3 n1 = normalize(vec3(sin(tw*0.11+1.0), cos(tw*0.07), sin(tw*0.13+2.0)));
    vec3 n2 = normalize(vec3(cos(tw*0.09+3.0), sin(tw*0.12), cos(tw*0.08)));
    float cut1 = dot(pf, n1) - 0.25 * frac;
    float cut2 = dot(pf, n2) - 0.2 * frac;
    d = max(d, max(cut1, -cut2) * frac);
  }

  // Hollowness — subtract inner volume to create shell
  float hollow = uShapeB.y;
  if(hollow > 0.01) {
    float inner = length(pf) - (0.25 + hollow * 0.55);
    d = max(d, -inner);
  }

  // Audio-reactive surface displacement
  d += 0.03 * sin(p.x*18.0+tw) * sin(p.z*18.0) * uEnergy;
  d += 0.02 * sin(pf.x*25.0) * sin(pf.z*25.0) * uChaos;

  return d;
}

// ── Tunnel walls: objects arranged cylindrically around camera path ──
float tunnelWallSDF(vec3 p) {
  // Cylindrical coords relative to camera XY path
  vec2 rel = p.xy - uCamXY;
  float r = length(rel);
  float a = atan(rel.y, rel.x);

  // Domain repeat around the ring and along Z
  float angCount = 10.0;
  float angPeriod = 6.283 / angCount;
  float zPeriod = uRepPeriod;

  float cellA = floor(a / angPeriod + 0.5);
  float cellZ = floor(p.z / zPeriod + 0.5);
  float localA = a - cellA * angPeriod;
  float localZ = p.z - cellZ * zPeriod;

  vec3 h = hash31(vec3(cellA, cellZ, 0.0));

  // Place objects at fixed radius from camera (tunnel wall — far enough to frame)
  float wallR = uCorridorR + 2.5 + h.x * 3.0;
  float objAngle = cellA * angPeriod;
  vec3 objPos = vec3(
    uCamXY.x + cos(objAngle) * wallR,
    uCamXY.y + sin(objAngle) * wallR,
    cellZ * zPeriod
  );

  vec3 q = p - objPos;
  q.xz *= rot2(h.y * 6.283 + uTime * 0.3);
  q.xy *= rot2(h.z * 3.14);
  float sc = (0.3 + h.y * 0.5) * uObjScale;
  q /= sc;

  float tw = uTime * 1.5 + uEnergy * 2.0 + h.z * 6.283;
  return generativeSDF(q, tw) * sc;
}

// ── Spawn Pool: 7 spawn types dispatched by type ID ──
// Types: 1=generative cluster, 2=crystal burst, 3=ring gate, 4=void sphere,
//        5=monolith, 6=debris shrapnel, 7=energy bloom
float spawnTypeSDF(vec3 q, float typ, float tw) {
  int t = int(typ + 0.5);
  if(t == 1) {
    // Generative cluster — uses parametric SDF
    return generativeSDF(q, tw);
  } else if(t == 2) {
    // Crystal burst — octahedron + fracture planes
    vec3 aq = abs(q);
    float d = (aq.x + aq.y + aq.z - 1.0) * 0.577;
    // Fracture cuts
    d = max(d, dot(q, normalize(vec3(1.0, 0.3, -0.7))) - 0.4);
    d = max(d, -dot(q, normalize(vec3(-0.5, 1.0, 0.2))) - 0.3);
    return d;
  } else if(t == 3) {
    // Ring gate — large torus
    float gateR = 4.0;
    float tubeR = 0.5;
    float r2d = length(q.xy) - gateR;
    return sqrt(r2d * r2d + q.z * q.z) - tubeR;
  } else if(t == 4) {
    // Void sphere — inverted sphere shell (negative space)
    float outer = length(q) - 2.0;
    float inner = length(q) - 1.6;
    return max(outer, -inner);
  } else if(t == 5) {
    // Monolith — tall angular slab
    vec3 b = vec3(1.2, 6.0, 0.6);
    vec3 aq = abs(q) - b;
    return length(max(aq, 0.0)) + min(max(aq.x, max(aq.y, aq.z)), 0.0);
  } else if(t == 6) {
    // Debris shrapnel — tiny octahedron
    vec3 aq = abs(q);
    return (aq.x + aq.y + aq.z - 0.5) * 0.577;
  } else if(t == 7) {
    // Energy bloom — thin torus ring
    float r2d = length(q.xz);
    float tubeR = 0.06 + uKick * 0.08;
    return length(vec2(r2d - 1.5, q.y)) - tubeR;
  }
  return 999.0;
}

float spawnSDF(vec3 p, int idx) {
  float typ = uSpawnA[idx].w;
  if(typ < 0.5) return 999.0; // inactive slot
  vec3 pos = uSpawnA[idx].xyz;
  float sc = uSpawnB[idx].x;
  float life = uSpawnB[idx].y;
  float rotSeed = uSpawnB[idx].z;

  // Life-based scale envelope: grow in 0-15%, shrink out 85-100%
  float envelope = 1.0;
  if(life < 0.15) envelope = smoothstep(0.0, 0.15, life);
  else if(life > 0.85) envelope = smoothstep(1.0, 0.85, life);
  float totalScale = sc * envelope;
  if(totalScale < 0.01) return 999.0;

  vec3 q = p - pos;
  q.xz *= rot2(rotSeed + uTime * 0.3);
  q.xy *= rot2(rotSeed * 0.7);
  q /= totalScale;

  float tw = uTime * 1.5 + uEnergy * 2.0 + rotSeed;
  return spawnTypeSDF(q, typ, tw) * totalScale;
}

// ── Grand Attractor: massive black hole always ahead ──
float attractorSDF(vec3 p) {
  vec3 bhPos = vec3(uCamXY, uBHZ);
  vec3 rel = p - bhPos;

  // Tilt the disk so it's not perfectly edge-on
  float tilt = 0.35 + sin(uTime * 0.07) * 0.1;
  rel.xy *= rot2(tilt);

  float horizon = length(rel) - uBHSize * 0.4;

  // Multi-layered accretion disk
  float diskAngle = atan(rel.z, rel.x);
  float diskR2d = length(rel.xz);

  // Main disk — wide, turbulent
  float mainDiskR = diskR2d - uBHSize;
  float mainDisk = sqrt(mainDiskR * mainDiskR + rel.y * rel.y) - uBHSize * 0.06;
  mainDisk += 0.06 * sin(diskAngle * 16.0 + uTime * 6.0) * uEnergy;
  mainDisk += 0.04 * sin(diskAngle * 8.0 - uTime * 3.0) * uKick;
  mainDisk += 0.03 * sin(diskAngle * 24.0 + uTime * 10.0) * uHat;

  // Inner hot ring — tight, bright, fast-spinning
  float innerRing = abs(diskR2d - uBHSize * 0.55) - uBHSize * 0.025;
  innerRing = sqrt(innerRing * innerRing + rel.y * rel.y * 4.0);
  innerRing += 0.02 * sin(diskAngle * 20.0 + uTime * 12.0);

  // Mid ring
  float midRing = abs(diskR2d - uBHSize * 0.8) - uBHSize * 0.02;
  midRing = sqrt(midRing * midRing + rel.y * rel.y * 4.0);

  // Outer ring — faint, wide
  float outerRing = abs(diskR2d - uBHSize * 1.5) - uBHSize * 0.04;
  outerRing = sqrt(outerRing * outerRing + rel.y * rel.y * 2.0);

  // Far outer halo
  float haloRing = abs(diskR2d - uBHSize * 2.0) - uBHSize * 0.03;
  haloRing = sqrt(haloRing * haloRing + rel.y * rel.y);

  return min(horizon, min(mainDisk, min(innerRing, min(midRing, min(outerRing, haloRing)))));
}

// ── Combined Scene ──
float sceneSDF(vec3 p) {
  float tw = tunnelWallSDF(p);
  float bh = attractorSDF(p);
  float d = min(tw, bh);
  // Spawn pool — 8 slots
  for(int i = 0; i < 8; i++) {
    d = min(d, spawnSDF(p, i));
  }
  return d;
}

void main() {
  vec2 uv = (vUV*2.0-1.0) * vec2(uRes.x/uRes.y, 1.0);

  // Forward-flying camera — position from JS (audio-driven drift + mouse)
  vec2 mOff = (uMouse - 0.5)*2.0;

  float shakeGate = smoothstep(0.3, 0.7, uEnergy); // only shake when energy is strong
  vec3 shake = vec3(
    sin(uTime*8.0)*uKick*0.03 + sin(uTime*3.5)*uSnare*0.015,
    cos(uTime*7.0)*uKick*0.02 + cos(uTime*4.0)*uSnare*0.01,
    sin(uTime*5.0)*uChaos*0.01
  ) * shakeGate;

  vec3 ro = vec3(uCamXY, uCamZ) + shake;
  vec3 lookAt = ro + vec3(
    sin(uTime*0.1)*0.12,
    cos(uTime*0.13)*0.08,
    5.0
  );

  // Camera roll from chaos + hat percussion tumble
  float roll = sin(uTime*0.15)*0.15 + uChaos*sin(uTime*2.0)*0.2 + uHat*sin(uTime*1.5)*0.1;
  vec3 fwd = normalize(lookAt - ro);
  vec3 worldUp = vec3(sin(roll), cos(roll), 0.0);
  vec3 right = normalize(cross(fwd, worldUp));
  vec3 up = cross(right, fwd);

  // FOV breathes with energy — widens on drops
  float fov = 1.5 + uKick*0.5;
  vec3 rd = normalize(fwd*fov + uv.x*right + uv.y*up);

  // Gravitational lensing — strong, Elite Dangerous style
  vec3 bhPos = vec3(uCamXY, uBHZ);
  vec3 toBH = bhPos - ro;
  float bhDist = length(toBH);
  vec3 bhDir = toBH / max(bhDist, 0.1);
  float alignment = dot(rd, bhDir);
  vec3 perpToBH = rd - bhDir * alignment;
  float lensR = length(perpToBH);
  if(lensR > 0.001 && bhDist > 0.5) {
    float proximity = 12.0 / max(bhDist, 1.5);
    float lensStrength = uBHSize * 0.25 / (lensR * bhDist + 0.3);
    lensStrength *= proximity * (1.0 + uKick * 2.5);
    // Stronger cap — let the warp get dramatic
    rd = normalize(rd + perpToBH / lensR * min(lensStrength, 0.6));
  }

  // Raymarch with volumetric glow accumulation
  float dist = 0.0, minDist = 999.0;
  bool hit = false;
  vec3 p;
  float glowAccum = 0.0;
  float bhGlow = 0.0;
  for(int i=0; i<STEPS; i++) {
    p = ro + rd*dist;
    float d = sceneSDF(p);
    minDist = min(minDist, abs(d));

    // Volumetric glow — objects emit light proportional to proximity
    glowAccum += exp(-abs(d) * 4.0) * 0.015 * (0.4 + uKick * 2.0);

    // Track proximity to black hole for special glow — scales with BH size
    float bhProx = length(p - bhPos);
    bhGlow += exp(-bhProx * 0.2 / max(uBHSize, 0.5)) * 0.012 * (1.0 + uKick * 2.5);

    if(abs(d) < SURF) { hit = true; break; }
    dist += abs(d)*0.7;
    if(dist > MAX_DIST) break;
  }

  // Palette — monochrome breakcore edit aesthetic
  vec3 fogCol = vec3(0.01);
  vec3 kickCol = vec3(1.0, 0.97, 0.93);
  vec3 hatCol = vec3(0.7, 0.75, 0.8);
  vec3 snareCol = vec3(0.5, 0.52, 0.55);
  vec3 bhCol = mix(vec3(1.0), vec3(0.8, 0.85, 1.0), uKick);

  vec3 col = fogCol;

  if(hit) {
    float dW = tunnelWallSDF(p);
    float dBH = attractorSDF(p);
    float nearest = min(dW, dBH);

    // Find closest spawn slot
    int closestSpawn = -1;
    float closestSpawnD = 999.0;
    for(int i = 0; i < 8; i++) {
      float sd = spawnSDF(p, i);
      if(sd < nearest) { nearest = sd; closestSpawn = i; closestSpawnD = sd; }
    }

    vec3 surfCol;
    if(closestSpawn >= 0 && closestSpawnD < 0.02 + abs(min(dW, dBH) - nearest)) {
      // Spawn object — color by type
      float typ = uSpawnA[closestSpawn].w;
      int t = int(typ + 0.5);
      if(t == 1 || t == 2) {
        // Generative cluster, crystal burst — kick-reactive white (like tunnel walls)
        float posBright = sin(p.x*0.5+uTime)*0.05 + sin(p.z*0.3-uTime*0.7)*0.03;
        surfCol = vec3(0.1 + uKick * 0.8 + posBright);
        surfCol *= 0.25 + uKick * 1.5;
      } else if(t == 3 || t == 4 || t == 5) {
        // Ring gate, void sphere, monolith — dark silhouette + edge glow
        surfCol = vec3(0.02 + uKick * 0.15);
        float edgePulse = sin(p.z * 0.5 + uTime * 0.8) * 0.5 + 0.5;
        surfCol += vec3(0.08) * edgePulse;
      } else if(t == 6) {
        // Debris shrapnel — bright on hats
        surfCol = vec3(0.15 + uHat * 0.6) * (0.3 + uKick*0.8 + uHat*1.5);
      } else {
        // Energy bloom — metallic silver
        surfCol = vec3(0.8 + uKick * 0.2) * (0.3 + uKick * 2.5);
      }
    } else if(abs(dBH - min(dW, dBH)) < 0.02) {
      // Black hole — silver/white accretion bands
      vec3 bhRel = p - bhPos;
      float tilt = 0.35 + sin(uTime * 0.07) * 0.1;
      bhRel.xy *= rot2(tilt);
      float distFromCenter = length(bhRel);
      float diskR2d = length(bhRel.xz);
      if(distFromCenter < uBHSize * 0.35) {
        surfCol = vec3(0.0);
      } else {
        float heat = exp(-abs(diskR2d - uBHSize) * 2.0 / uBHSize);
        float innerHeat = exp(-abs(diskR2d - uBHSize * 0.55) * 4.0 / uBHSize);
        float spin = sin(atan(bhRel.z, bhRel.x) * 12.0 + uTime * 6.0);
        float spin2 = sin(atan(bhRel.z, bhRel.x) * 20.0 + uTime * 12.0);
        surfCol = vec3(0.6 + heat * 0.4);
        surfCol = mix(surfCol, vec3(1.0, 0.97, 0.93), innerHeat);
        surfCol *= (0.3 + uKick * 2.0 + spin * 0.3 * uKick + spin2 * 0.15 * uHat);
      }
    } else {
      // Tunnel walls — dark normally, blazing white on kicks
      float posBright = sin(p.x*0.5+uTime)*0.05 + sin(p.z*0.3-uTime*0.7)*0.03;
      surfCol = vec3(0.1 + uKick * 0.8 + posBright);
      surfCol *= 0.25 + uKick * 1.5;
    }

    float glow = (0.5 + uKick*2.0) / (1.0 + dist*dist*0.06);
    col = surfCol * glow;

    // Edge rim — white pulse
    col += vec3(0.8) * smoothstep(0.01, 0.05, minDist) * (0.3 + uKick * 0.5);
  }

  // Black hole volumetric glow — silver/white
  col += vec3(0.85, 0.88, 0.92) * min(bhGlow, 0.8) * (0.2 + uKick * 2.0);

  // Volumetric glow — monochrome
  vec3 glowCol = vec3(0.8 + uKick * 0.2);
  col += glowCol * glowAccum * (0.3 + uKick * 0.7);

  // Near-miss halo
  float nearGlow = min(0.05/(0.01+minDist*minDist), 0.8);
  col += glowCol * nearGlow * (0.05 + uKick * 0.3);

  // Distance fog
  float fogFactor = 1.0 - exp(-dist * uFogDensity);
  col = mix(col, fogCol, fogFactor);

  fragColor = vec4(col, 1.0);
}`;

const POST_FS = `#version 300 es
precision highp float;
in vec2 vUV;
out vec4 fragColor;
uniform sampler2D uScene, uPrev;
uniform float uTime, uEnergy, uKick, uChaos, uPhase, uCamSpeed, uImpact, uFlash;
uniform vec2 uRes;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

vec2 crtDistort(vec2 uv) {
  vec2 cc = uv - 0.5;
  float d = dot(cc, cc) * 0.08;
  return uv + cc * d;
}

vec3 contrastGrade(vec3 col, float contrastLevel) {
  // S-curve contrast — strength driven by audio energy, not fixed phases
  float s = clamp(contrastLevel, 0.0, 1.0);
  // Interpolate S-curve between gentle and extreme
  vec3 gentle = smoothstep(0.15, 0.85, col);
  vec3 extreme = smoothstep(0.02, 0.98, col);
  return mix(gentle, extreme, s);
}

void main() {
  vec2 uv = crtDistort(vUV);

  if (uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) {
    fragColor = vec4(0.0, 0.0, 0.0, 1.0);
    return;
  }

  // Gravity wave distortion on impact
  if (uImpact > 0.01) {
    vec2 center = uv - 0.5;
    float r = length(center);
    float wave = sin(r * 30.0 - uTime * 15.0) * uImpact * 0.008;
    uv += normalize(center + 0.001) * wave;
  }

  // Radial zoom blur on impact
  float ca = min(0.008, 0.001 + uChaos * 0.003 + uKick * 0.004 + uImpact * 0.004);
  vec3 col;
  if (uImpact > 0.1) {
    col = vec3(0.0);
    vec2 dir = uv - 0.5;
    for (int i = 0; i < 6; i++) {
      float t = float(i) / 6.0 * uImpact * 0.03;
      col += texture(uScene, uv - dir * t).rgb;
    }
    col /= 6.0;
    // Still apply CA on top
    col.r = mix(col.r, texture(uScene, uv + vec2(ca, 0.0)).r, 0.5);
    col.b = mix(col.b, texture(uScene, uv - vec2(ca, 0.0)).b, 0.5);
  } else {
    col.r = texture(uScene, uv + vec2(ca, 0.0)).r;
    col.g = texture(uScene, uv).g;
    col.b = texture(uScene, uv - vec2(ca, 0.0)).b;
  }

  // Bloom
  vec3 bloom = vec3(0.0); float total = 0.0;
  for (int i = -3; i <= 3; i++) {
    float w = exp(-float(i*i)/4.5);
    bloom += texture(uScene, uv + vec2(float(i)/uRes.x*5.0, 0.0)).rgb * w;
    bloom += texture(uScene, uv + vec2(0.0, float(i)/uRes.y*5.0)).rgb * w;
    total += w * 2.0;
  }
  bloom = max(bloom/total - ${CFG.post.bloomThreshold.toFixed(1)}, 0.0) * ${CFG.post.bloomIntensity.toFixed(1)};
  col += bloom * (0.05 + uKick * 0.35);

  // Feedback trail — kick makes it linger, no-kick fades fast
  float feedbackZoom = ${CFG.post.feedbackBaseZoom.toFixed(2)} - uCamSpeed * 0.004 - uImpact * 0.02;
  vec2 prevUV = crtDistort((vUV - 0.5) * feedbackZoom + 0.5);
  float kickDecay = ${CFG.post.feedbackDecay.toFixed(2)} - 0.15 * (1.0 - uKick);
  vec3 prev = texture(uPrev, prevUV).rgb * kickDecay;
  float kickBlend = 0.08 + uKick * 0.2;
  col = mix(col, prev, kickBlend);

  // VHS glitch
  if (uChaos > 0.4) {
    float strip = step(0.97, fract(sin(floor(uv.y*uRes.y*0.05+uTime*30.0)*43758.5453)));
    float disp = strip * sin(uTime*100.0) * 0.02 * uChaos;
    vec3 d;
    d.r = texture(uScene, uv + vec2(disp+ca, 0)).r;
    d.g = texture(uScene, uv + vec2(disp, 0)).g;
    d.b = texture(uScene, uv + vec2(disp-ca, 0)).b;
    col = mix(col, d.gbr, strip * uChaos * 0.7);
  }

  // Kick flash — pure white
  col += vec3(1.0) * smoothstep(0.8, 1.0, uKick) * 0.15;

  // BH pass-through flash — white-out
  if (uFlash > 0.01) {
    float flashStr = pow(uFlash, 0.5);
    col = mix(col, vec3(1.2), flashStr);
    if (uFlash > 0.5) col = vec3(1.2);
  }

  // Flash-frame color inversion on hardest hits
  if (uImpact > 0.7) {
    float invStr = (uImpact - 0.7) / 0.3 * 0.6;
    col = mix(col, vec3(1.0) - col, invStr);
  }

  // Contrast grade — driven by energy uniform (uPhase now carries contrast level)
  col = contrastGrade(col, uPhase);

  // Film grain
  float grain = hash(uv * uRes + fract(uTime * 100.0)) - 0.5;
  col += grain * (0.03 + uChaos * 0.04);

  // CRT scanlines
  float scanline = sin(gl_FragCoord.y * 1.5) * 0.5 + 0.5;
  col *= 0.92 + scanline * 0.08;

  // RGB subpixel
  float px = mod(gl_FragCoord.x, 3.0);
  vec3 subpx = vec3(
    smoothstep(0.0, 1.0, 1.0 - abs(px - 0.5)),
    smoothstep(0.0, 1.0, 1.0 - abs(px - 1.5)),
    smoothstep(0.0, 1.0, 1.0 - abs(px - 2.5))
  );
  col = mix(col, col * subpx, 0.1);

  // Vignette
  vec2 vig = vUV * 2.0 - 1.0;
  float vigF = 1.0 - dot(vig, vig) * ${CFG.post.vignetteStrength.toFixed(2)};
  vigF *= 1.0 - pow(max(abs(vig.x), abs(vig.y)), 8.0) * 0.3;
  col *= vigF;

  // Tone map + desaturation + S-curve for deep blacks vs bright whites
  col = col / (1.0 + col * ${CFG.post.toneMapCompression.toFixed(2)});
  float lum = dot(col, vec3(0.299, 0.587, 0.114));
  col = mix(vec3(lum), col, ${CFG.post.saturationBoost.toFixed(2)});
  col = smoothstep(0.02, 0.98, col);
  col = clamp(col, 0.0, ${CFG.post.maxBrightness.toFixed(2)});

  fragColor = vec4(col, 1.0);
}`;

// ─── Compile & Link ─────────────────────────────────────────────────
function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    showError('Shader compile error:\n' + gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

function linkProgram(vsSrc, fsSrc) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(vsSrc, gl.VERTEX_SHADER));
  gl.attachShader(p, compileShader(fsSrc, gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    showError('Program link error:\n' + gl.getProgramInfoLog(p));
    return null;
  }
  return p;
}

const sceneProg = linkProgram(FULLSCREEN_VS, SCENE_FS);
const postProg = linkProgram(FULLSCREEN_VS, POST_FS);
if (!sceneProg || !postProg) throw 'Shader compilation failed';

function getUniforms(prog, names) {
  const u = {};
  for (const n of names) u[n] = gl.getUniformLocation(prog, n);
  return u;
}

const sceneU = getUniforms(sceneProg, [
  'uTime','uEnergy','uKick','uSnare','uHat','uChaos','uHue','uRes',
  'uShapeA','uShapeB','uMouse','uCamZ','uTunnelBlend','uFogDensity','uRepPeriod','uObjScale',
  'uCamXY','uCorridorR','uBHZ','uBHSize'
]);
// Spawn pool uniform locations (array uniforms)
const spawnALocs = [];
const spawnBLocs = [];
for (let i = 0; i < 8; i++) {
  spawnALocs.push(gl.getUniformLocation(sceneProg, `uSpawnA[${i}]`));
  spawnBLocs.push(gl.getUniformLocation(sceneProg, `uSpawnB[${i}]`));
}
const postU = getUniforms(postProg, [
  'uScene','uPrev','uTime','uEnergy','uKick','uChaos','uRes','uPhase','uCamSpeed','uImpact','uFlash'
]);
const emptyVAO = gl.createVertexArray();

// ─── Framebuffers ───────────────────────────────────────────────────
let screenW = 0, screenH = 0, sceneW = 0, sceneH = 0;
const sceneFB = { fb: null, tex: null };
const ppFB = [{ fb: null, tex: null }, { fb: null, tex: null }];
let ppIdx = 0;

function createFBO(w, h) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, FB_INT, w, h, 0, gl.RGBA, FB_TYPE, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fb = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  return { fb, tex };
}

function rebuildFBs() {
  const w = glCanvas.width, h = glCanvas.height;
  if (w === screenW && h === screenH) return;
  screenW = w; screenH = h;
  sceneW = Math.floor(w / 2); sceneH = Math.floor(h / 2);
  for (const o of [sceneFB, ppFB[0], ppFB[1]]) {
    if (o.fb) gl.deleteFramebuffer(o.fb);
    if (o.tex) gl.deleteTexture(o.tex);
  }
  Object.assign(sceneFB, createFBO(sceneW, sceneH));
  Object.assign(ppFB[0], createFBO(w, h));
  Object.assign(ppFB[1], createFBO(w, h));
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
}

// ─── Audio Engine ───────────────────────────────────────────────────
let audioCtx = null, analyser = null, sourceNode = null, audioEl = null;
let isPlaying = false, isPaused = false;
let freqData, timeData;
const bands = { sub: 0, low: 0, mid: 0, high: 0 };
const prevBands = { sub: 0, low: 0, mid: 0, high: 0 };
const bandPeaks = { sub: 0, low: 0, mid: 0, high: 0 };
let spectralCentroid = 1000, chaosMetric = 0, cumulativeHue = 0;
const onsetTimes = [];
const smoothBars = new Float32Array(CFG.numBars);

// 3A/3B/3C: Spectral analysis state for proper drum vs melodic classification
let spectralFlux = 0, spectralFlatness = 0, transientScore = 0;
let prevSpectrumRT = null; // lazy init to match analyser bin count
const transientBuf = new Float32Array(10); // rolling energy buffer for attack detection
let transientBufIdx = 0;
let percGateState = 1.0; // persistent percussion gate — onset-triggered, slow decay (start high, benefit of the doubt)

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = CFG.fftSize;
    analyser.smoothingTimeConstant = 0.4;
    analyser.minDecibels = -90;
    analyser.maxDecibels = -10;
    analyser.connect(audioCtx.destination);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.frequencyBinCount);
  } catch (e) {
    showError('Audio init failed: ' + e.message);
  }
}

function binForHz(hz) { return Math.round(hz / (audioCtx.sampleRate / CFG.fftSize)); }

function bandEnergy(lo, hi) {
  const a = Math.max(0, binForHz(lo));
  const b = Math.min(binForHz(hi), freqData.length - 1);
  if (b < a) return 0;
  let s = 0;
  for (let i = a; i <= b; i++) s += freqData[i];
  return s / ((b - a + 1) * 255);
}

function totalEnergy() {
  // Kick/sub-weighted: drums drive the big reactions, not mid/high wash
  return Math.min(1, (bands.sub * 2.0 + bands.low * 1.2 + bands.mid * 0.5 + bands.high * 0.3) / 2);
}

function processAudio() {
  if (!isPlaying) return;

  // Offline mode: read pre-computed timeline
  if (offlineMode && offlineTimeline) {
    const f = getOfflineFrame();
    if (f < 0) return;
    const tl = offlineTimeline;

    for (const k of ['sub', 'low', 'mid', 'high']) {
      prevBands[k] = bands[k];
      bands[k] = tl[k][f];
      const delta = bands[k] - prevBands[k];
      if (delta > bandPeaks[k] * 0.15 + 0.003) {
        bandPeaks[k] = Math.max(bandPeaks[k], bands[k]);
        onsetTimes.push(performance.now());
      }
      bandPeaks[k] *= 0.98;
    }

    // Read pre-computed spectral analysis (3A/3B/3C)
    spectralFlux = tl.flux ? tl.flux[f] : 0;
    spectralFlatness = tl.flatness ? tl.flatness[f] : 0;
    transientScore = tl.transient ? tl.transient[f] : 0;

    // Spectral centroid approximation from band ratios
    spectralCentroid = 200 + bands.low * 800 + bands.mid * 3000 + bands.high * 8000;
    cumulativeHue += totalEnergy() * 0.5;

    const now = performance.now();
    while (onsetTimes.length && onsetTimes[0] < now - 1000) onsetTimes.shift();
    chaosMetric = Math.min(1, onsetTimes.length / 15);

    // Synthetic smoothBars from band data for spectrum ring
    for (let i = 0; i < CFG.numBars; i++) {
      const t = i / CFG.numBars;
      let val;
      if (t < 0.15) val = bands.sub * (1 - t / 0.15) + bands.low * (t / 0.15);
      else if (t < 0.4) val = bands.low * (1 - (t - 0.15) / 0.25) + bands.mid * ((t - 0.15) / 0.25);
      else val = bands.mid * (1 - (t - 0.4) / 0.6) + bands.high * ((t - 0.4) / 0.6);
      val *= 0.8 + 0.2 * Math.sin(f * 0.1 + i * 0.5); // add variation
      smoothBars[i] += (val - smoothBars[i]) * 0.3;
    }

    // Also feed real-time analyser if available (for freqData used by overlay)
    if (analyser) {
      analyser.getByteFrequencyData(freqData);
      analyser.getByteTimeDomainData(timeData);
    }
    return;
  }

  // Real-time mode: original behavior
  if (!analyser) return;
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);

  // 3A: Spectral flux — full-spectrum frame-to-frame positive difference
  if (!prevSpectrumRT) prevSpectrumRT = new Float32Array(freqData.length);
  let flux = 0;
  for (let i = 0; i < freqData.length; i++) {
    const cur = freqData[i] / 255;
    const diff = cur - prevSpectrumRT[i];
    if (diff > 0) flux += diff;
    prevSpectrumRT[i] = cur;
  }
  // Normalize and smooth — sharp spikes = percussive onset
  spectralFlux += (flux / freqData.length * 10 - spectralFlux) * 0.4;

  // 3B: Sub-band spectral flatness over kick range (20-500Hz)
  // Full-spectrum flatness is always ~0 (most bins empty). Sub-band gives meaningful
  // drum vs melodic distinction: kick spreads energy across sub bins, bass synth peaks narrowly.
  const eps = 1e-10;
  const flatLo = Math.max(1, Math.round(20 / (audioCtx.sampleRate / CFG.fftSize)));
  const flatHi = Math.min(freqData.length - 1, Math.round(500 / (audioCtx.sampleRate / CFG.fftSize)));
  let logSum = 0, arithSum = 0;
  for (let i = flatLo; i <= flatHi; i++) {
    const val = Math.max(freqData[i] / 255, eps);
    logSum += Math.log(val);
    arithSum += val;
  }
  const nBins = flatHi - flatLo + 1;
  const geoMean = Math.exp(logSum / nBins);
  const arithMean = arithSum / nBins;
  const rawFlatness = arithMean > eps ? geoMean / arithMean : 0;
  spectralFlatness += (rawFlatness - spectralFlatness) * 0.3;

  const br = CFG.bandRanges;
  const raw = {
    sub: bandEnergy(...br.sub), low: bandEnergy(...br.low),
    mid: bandEnergy(...br.mid), high: bandEnergy(...br.high),
  };

  // 3C: Transient detection — fast energy rise = percussive attack
  const rawE = raw.sub + raw.low * 0.5 + raw.mid * 0.3 + raw.high * 0.2;
  transientBuf[transientBufIdx % 10] = rawE;
  transientBufIdx++;
  const ti = transientBufIdx;
  const recent = Math.max(
    transientBuf[(ti - 1 + 10) % 10],
    transientBuf[(ti - 2 + 10) % 10],
    transientBuf[(ti - 3 + 10) % 10]
  );
  const older = transientBuf[(ti - 6 + 10) % 10];
  if (recent > older * 1.5 + 0.02 && recent > 0.05) {
    transientScore = Math.min(1, (recent - older) * 4);
  } else {
    transientScore *= 0.85;
  }

  for (const k of ['sub', 'low', 'mid', 'high']) {
    prevBands[k] = bands[k];
    bands[k] += (raw[k] - bands[k]) * CFG.smoothAlpha;
    const delta = bands[k] - prevBands[k];
    if (delta > bandPeaks[k] * 0.15 + 0.003) {
      bandPeaks[k] = Math.max(bandPeaks[k], bands[k]);
      onsetTimes.push(performance.now());
    }
    bandPeaks[k] *= 0.98;
  }

  let num = 0, den = 0;
  for (let i = 0; i < freqData.length; i++) {
    const m = freqData[i] / 255;
    num += i * audioCtx.sampleRate / CFG.fftSize * m;
    den += m;
  }
  spectralCentroid = den > 0.01 ? num / den : 1000;
  cumulativeHue += totalEnergy() * 0.5;

  const now = performance.now();
  while (onsetTimes.length && onsetTimes[0] < now - 1000) onsetTimes.shift();
  chaosMetric = Math.min(1, onsetTimes.length / 15);

  for (let i = 0; i < CFG.numBars; i++) {
    const f0 = Math.floor(Math.pow(i / CFG.numBars, 2) * freqData.length);
    const f1 = Math.floor(Math.pow((i + 1) / CFG.numBars, 2) * freqData.length);
    let sum = 0, count = 0;
    for (let j = f0; j < f1 && j < freqData.length; j++) { sum += freqData[j]; count++; }
    const val = count > 0 ? sum / count / 255 : 0;
    smoothBars[i] += (val - smoothBars[i]) * 0.3;
  }
}

// ─── Song Section Detection ─────────────────────────────────────────
const energyHistory = {
  buffer: new Float32Array(300), // ~5 seconds at 60fps
  idx: 0,
  filled: 0,
  avg: 0,
  trend: 0, // positive = rising, negative = falling
  trendDuration: 0, // seconds the trend has been sustained
  ratio: 1.0, // current / avg
  section: 'sustain', // 'breakdown', 'buildup', 'drop', 'sustain'
  dropCooldown: 0, // prevent rapid re-triggering
  prevSection: 'sustain',
};

function updateSongSection(dt) {
  // Offline mode: read pre-computed section data with look-ahead
  if (offlineMode && offlineSections) {
    const f = getOfflineFrame();
    if (f >= 0) {
      energyHistory.prevSection = energyHistory.section;
      energyHistory.section = SECTION_NAMES[offlineSections.section[f]];
      energyHistory.avg = offlineTimeline ? offlineTimeline.energy[f] : 0;
      energyHistory.ratio = energyHistory.avg > 0.01 ? totalEnergy() / energyHistory.avg : 1.0;
      // Compute trend from offline data
      const fps = offlineTimeline ? offlineTimeline.fps : 60;
      if (f > 60 && offlineTimeline) {
        const recent30 = f, older30 = Math.max(0, f - 30);
        let rSum = 0, oSum = 0;
        for (let i = Math.max(0, f - 30); i < f; i++) rSum += offlineTimeline.energy[i];
        for (let i = Math.max(0, f - 60); i < Math.max(0, f - 30); i++) oSum += offlineTimeline.energy[i];
        energyHistory.trend = (rSum - oSum) / 30;
      }
      // Use look-ahead timing for trendDuration approximation
      const ttd = offlineSections.timeToNextDrop[f];
      energyHistory.trendDuration = energyHistory.section === 'buildup' ?
        (offlineSections.sectionProgress[f] * 4) : 0; // approximate buildup duration
    }
    return;
  }

  // Real-time mode: original behavior
  const e = totalEnergy();
  const buf = energyHistory.buffer;
  buf[energyHistory.idx] = e;
  energyHistory.idx = (energyHistory.idx + 1) % buf.length;
  if (energyHistory.filled < buf.length) energyHistory.filled++;

  // Rolling average
  let sum = 0;
  for (let i = 0; i < energyHistory.filled; i++) sum += buf[i];
  energyHistory.avg = energyHistory.filled > 0 ? sum / energyHistory.filled : e;

  // Ratio: current vs recent average
  energyHistory.ratio = energyHistory.avg > 0.01 ? e / energyHistory.avg : 1.0;

  // Trend: compare recent 30 frames to older 30 frames
  const recent = 30, older = 30;
  if (energyHistory.filled > recent + older) {
    let recentSum = 0, olderSum = 0;
    for (let i = 0; i < recent; i++) {
      const ri = (energyHistory.idx - 1 - i + buf.length) % buf.length;
      recentSum += buf[ri];
    }
    for (let i = recent; i < recent + older; i++) {
      const ri = (energyHistory.idx - 1 - i + buf.length) % buf.length;
      olderSum += buf[ri];
    }
    const newTrend = (recentSum / recent) - (olderSum / older);
    if (Math.sign(newTrend) === Math.sign(energyHistory.trend)) {
      energyHistory.trendDuration += dt;
    } else {
      energyHistory.trendDuration = 0;
    }
    energyHistory.trend = newTrend;
  }

  energyHistory.dropCooldown = Math.max(0, energyHistory.dropCooldown - dt);

  // Section classification
  energyHistory.prevSection = energyHistory.section;
  if (energyHistory.ratio > 1.6 && energyHistory.dropCooldown <= 0 && energyHistory.trend > 0.02) {
    energyHistory.section = 'drop';
    energyHistory.dropCooldown = 3.0; // don't re-trigger for 3 seconds
  } else if (energyHistory.ratio < 0.45 && e < 0.25) {
    energyHistory.section = 'breakdown';
  } else if (energyHistory.trend > 0.01 && energyHistory.trendDuration > 1.5) {
    energyHistory.section = 'buildup';
  } else {
    energyHistory.section = 'sustain';
  }
}

// ─── Offline Analysis Pipeline (Phase 2A+2B) ────────────────────────
const analyzeOverlay = document.getElementById('analyze-overlay');
const analyzeBar = document.getElementById('analyze-bar');
const analyzeStatus = document.getElementById('analyze-status');
const analyzeLabel = document.getElementById('analyze-label');

// Timeline: pre-computed per-frame audio data (null = real-time mode)
let offlineTimeline = null;  // { sub, low, mid, high, energy, frameCount, fps, duration, sampleRate }
let offlineSections = null;  // { section, timeToNextDrop, timeSinceLastDrop, timeToNextBreakdown, bpm }
let offlineMode = false;     // true when playing with pre-analyzed data
let offlineFile = null;      // stash the File for replay

function showAnalyzeProgress(pct, status) {
  analyzeOverlay.classList.remove('hidden');
  analyzeBar.style.width = pct + '%';
  analyzeStatus.textContent = status;
}
function hideAnalyzeProgress() {
  analyzeOverlay.classList.add('hidden');
}

// 2A: Decode full audio and compute per-frame band energies
async function analyzeAudioOffline(file) {
  offlineFile = file;
  showAnalyzeProgress(0, 'Decoding audio...');

  const arrayBuf = await file.arrayBuffer();
  const tempCtx = new (window.AudioContext || window.webkitAudioContext)();
  let decoded;
  try {
    decoded = await tempCtx.decodeAudioData(arrayBuf.slice(0)); // slice to avoid detached buffer
  } catch (e) {
    showError('Decode failed: ' + e.message);
    hideAnalyzeProgress();
    return null;
  }
  tempCtx.close();

  const sampleRate = decoded.sampleRate;
  const duration = decoded.duration;
  const fps = 60;
  const samplesPerFrame = Math.round(sampleRate / fps);
  const frameCount = Math.ceil(decoded.length / samplesPerFrame);
  const fftSize = CFG.fftSize;
  const halfFFT = fftSize / 2;

  showAnalyzeProgress(5, `Analyzing ${frameCount} frames (${duration.toFixed(1)}s)...`);

  // Mix down to mono
  const mono = new Float32Array(decoded.length);
  const numCh = decoded.numberOfChannels;
  for (let ch = 0; ch < numCh; ch++) {
    const chData = decoded.getChannelData(ch);
    for (let i = 0; i < chData.length; i++) mono[i] += chData[i] / numCh;
  }

  // Pre-allocate timeline arrays
  const tl = {
    sub: new Float32Array(frameCount),
    low: new Float32Array(frameCount),
    mid: new Float32Array(frameCount),
    high: new Float32Array(frameCount),
    energy: new Float32Array(frameCount),
    flux: new Float32Array(frameCount),       // 3A: spectral flux per frame
    flatness: new Float32Array(frameCount),   // 3B: spectral flatness per frame
    transient: new Float32Array(frameCount),  // 3C: transient score per frame
    novelty: new Float32Array(frameCount),    // Anti-stale: 0=identical to recent, 1=novel
    repetition: new Float32Array(frameCount), // Anti-stale: 0=no pattern repeat, 1=exact loop
    frameCount, fps, duration, sampleRate,
  };

  // Frequency bin helpers
  const binFor = hz => Math.round(hz / (sampleRate / fftSize));
  const br = CFG.bandRanges;
  const subBins = [Math.max(0, binFor(br.sub[0])), Math.min(binFor(br.sub[1]), halfFFT - 1)];
  const lowBins = [Math.max(0, binFor(br.low[0])), Math.min(binFor(br.low[1]), halfFFT - 1)];
  const midBins = [Math.max(0, binFor(br.mid[0])), Math.min(binFor(br.mid[1]), halfFFT - 1)];
  const highBins = [Math.max(0, binFor(br.high[0])), Math.min(binFor(br.high[1]), halfFFT - 1)];

  // Hann window
  const hann = new Float32Array(fftSize);
  for (let i = 0; i < fftSize; i++) hann[i] = 0.5 * (1 - Math.cos(2 * Math.PI * i / (fftSize - 1)));

  // Cooley-Tukey radix-2 FFT (in-place, iterative)
  const fftRe = new Float32Array(fftSize);
  const fftIm = new Float32Array(fftSize);
  const log2N = Math.log2(fftSize) | 0;

  function fftInPlace() {
    // Bit-reversal permutation
    for (let i = 0; i < fftSize; i++) {
      let j = 0;
      for (let b = 0; b < log2N; b++) j |= ((i >> b) & 1) << (log2N - 1 - b);
      if (j > i) {
        let tmp = fftRe[i]; fftRe[i] = fftRe[j]; fftRe[j] = tmp;
        tmp = fftIm[i]; fftIm[i] = fftIm[j]; fftIm[j] = tmp;
      }
    }
    // Butterfly stages
    for (let s = 1; s <= log2N; s++) {
      const m = 1 << s;
      const mh = m >> 1;
      const wRe = Math.cos(-2 * Math.PI / m);
      const wIm = Math.sin(-2 * Math.PI / m);
      for (let k = 0; k < fftSize; k += m) {
        let tRe = 1, tIm = 0;
        for (let j = 0; j < mh; j++) {
          const uRe = fftRe[k + j], uIm = fftIm[k + j];
          const vRe = tRe * fftRe[k + j + mh] - tIm * fftIm[k + j + mh];
          const vIm = tRe * fftIm[k + j + mh] + tIm * fftRe[k + j + mh];
          fftRe[k + j] = uRe + vRe; fftIm[k + j] = uIm + vIm;
          fftRe[k + j + mh] = uRe - vRe; fftIm[k + j + mh] = uIm - vIm;
          const nextRe = tRe * wRe - tIm * wIm;
          tIm = tRe * wIm + tIm * wRe;
          tRe = nextRe;
        }
      }
    }
  }

  const mag = new Float32Array(halfFFT);
  const prevMag = new Float32Array(halfFFT); // for spectral flux
  const chunkSize = 1024; // frames per chunk before yielding to UI
  const totalChunks = Math.ceil(frameCount / chunkSize);

  // 16-bin coarse spectral fingerprints for novelty/repetition detection
  const FP_BINS = 16; // 4 sub + 4 low + 4 mid + 4 high
  const fingerprints = new Float32Array(frameCount * FP_BINS);
  const fpBands = [subBins, lowBins, midBins, highBins]; // 4 bands, 4 sub-bins each

  for (let chunk = 0; chunk < totalChunks; chunk++) {
    const startFrame = chunk * chunkSize;
    const endFrame = Math.min(startFrame + chunkSize, frameCount);

    for (let f = startFrame; f < endFrame; f++) {
      const sampleStart = f * samplesPerFrame;
      // Fill FFT buffer with windowed samples
      for (let i = 0; i < fftSize; i++) {
        const idx = sampleStart + i - (fftSize >> 1);
        fftRe[i] = (idx >= 0 && idx < mono.length ? mono[idx] : 0) * hann[i];
        fftIm[i] = 0;
      }

      fftInPlace();

      // Magnitude spectrum
      for (let k = 0; k < halfFFT; k++) {
        mag[k] = Math.sqrt(fftRe[k] * fftRe[k] + fftIm[k] * fftIm[k]) / fftSize;
      }

      // Band energies (normalized 0-1 range, matching real-time behavior)
      const bandE = (lo, hi) => {
        if (hi < lo) return 0;
        let s = 0;
        for (let i = lo; i <= hi; i++) s += Math.min(1, mag[i] * 4);
        return s / (hi - lo + 1);
      };

      tl.sub[f] = bandE(subBins[0], subBins[1]);
      tl.low[f] = bandE(lowBins[0], lowBins[1]);
      tl.mid[f] = bandE(midBins[0], midBins[1]);
      tl.high[f] = bandE(highBins[0], highBins[1]);
      tl.energy[f] = Math.min(1, (tl.sub[f] * 2.0 + tl.low[f] * 1.2 + tl.mid[f] * 0.5 + tl.high[f] * 0.3) / 2);

      // 3A: Spectral flux — positive difference from previous frame
      let fluxSum = 0;
      for (let k = 0; k < halfFFT; k++) {
        const diff = mag[k] - prevMag[k];
        if (diff > 0) fluxSum += diff;
        prevMag[k] = mag[k];
      }
      tl.flux[f] = fluxSum / halfFFT * 10; // normalized, scaled

      // 3B: Sub-band spectral flatness over kick range (20-500Hz)
      const flatLoB = Math.max(1, Math.round(20 / (sampleRate / fftSize)));
      const flatHiB = Math.min(halfFFT - 1, Math.round(500 / (sampleRate / fftSize)));
      let lSum = 0, aSum = 0;
      const epsOff = 1e-10;
      for (let k = flatLoB; k <= flatHiB; k++) {
        const v = Math.max(mag[k], epsOff);
        lSum += Math.log(v);
        aSum += v;
      }
      const nB = flatHiB - flatLoB + 1;
      const gm = Math.exp(lSum / nB);
      const am = aSum / nB;
      tl.flatness[f] = am > epsOff ? gm / am : 0;

      // 16-bin coarse spectral fingerprint (4 sub-bins per band)
      const fpOff = f * FP_BINS;
      for (let b = 0; b < 4; b++) {
        const [bLo, bHi] = fpBands[b];
        const bRange = bHi - bLo + 1;
        const subW = Math.max(1, Math.floor(bRange / 4));
        for (let sb = 0; sb < 4; sb++) {
          const sLo = bLo + sb * subW;
          const sHi = sb < 3 ? sLo + subW - 1 : bHi;
          let sum = 0;
          for (let k = sLo; k <= sHi; k++) sum += mag[k];
          fingerprints[fpOff + b * 4 + sb] = sum / (sHi - sLo + 1);
        }
      }
    }

    // Yield to UI for progress updates
    const pct = 5 + Math.round((chunk + 1) / totalChunks * 70);
    showAnalyzeProgress(pct, `Analyzing... ${Math.round((chunk + 1) / totalChunks * 100)}% (frame ${endFrame}/${frameCount})`);
    await new Promise(r => setTimeout(r, 0));
  }

  // Smooth the bands to match real-time smoothing behavior
  const alpha = CFG.smoothAlpha;
  for (const key of ['sub', 'low', 'mid', 'high']) {
    let prev = 0;
    for (let f = 0; f < frameCount; f++) {
      prev += (tl[key][f] - prev) * alpha;
      tl[key][f] = prev;
    }
  }
  // Recompute energy after smoothing
  for (let f = 0; f < frameCount; f++) {
    tl.energy[f] = Math.min(1, (tl.sub[f] * 2.0 + tl.low[f] * 1.2 + tl.mid[f] * 0.5 + tl.high[f] * 0.3) / 2);
  }

  // Smooth spectral flux and flatness
  {
    let pf = 0, pfl = 0;
    for (let f = 0; f < frameCount; f++) {
      pf += (tl.flux[f] - pf) * 0.4;
      tl.flux[f] = pf;
      pfl += (tl.flatness[f] - pfl) * 0.3;
      tl.flatness[f] = pfl;
    }
  }

  // 3C: Transient detection — fast energy rise within ~3 frames
  for (let f = 0; f < frameCount; f++) {
    if (f < 6) { tl.transient[f] = 0; continue; }
    const recent = Math.max(tl.energy[f], tl.energy[f - 1], tl.energy[f - 2]);
    const older = tl.energy[f - 5];
    if (recent > older * 1.5 + 0.02 && recent > 0.05) {
      tl.transient[f] = Math.min(1, (recent - older) * 4);
    } else {
      tl.transient[f] = (f > 0 ? tl.transient[f - 1] : 0) * 0.85;
    }
  }

  // Novelty score: cosine similarity against 4-second sliding window
  showAnalyzeProgress(78, 'Computing novelty curve...');
  await new Promise(r => setTimeout(r, 0));
  {
    const windowFrames = Math.round(4 * fps); // 4-second window
    for (let f = 0; f < frameCount; f++) {
      const fpA = fpOff => {
        let norm = 0;
        for (let i = 0; i < FP_BINS; i++) norm += fingerprints[fpOff + i] * fingerprints[fpOff + i];
        return Math.sqrt(norm) || 1e-10;
      };
      const offA = f * FP_BINS;
      const normA = fpA(offA);
      let maxSim = 0;
      const wStart = Math.max(0, f - windowFrames);
      // Sample every 3rd frame for speed (still ~80 comparisons per frame)
      for (let p = wStart; p < f; p += 3) {
        const offP = p * FP_BINS;
        let dot = 0, normP = 0;
        for (let i = 0; i < FP_BINS; i++) {
          dot += fingerprints[offA + i] * fingerprints[offP + i];
          normP += fingerprints[offP + i] * fingerprints[offP + i];
        }
        normP = Math.sqrt(normP) || 1e-10;
        const sim = dot / (normA * normP);
        if (sim > maxSim) maxSim = sim;
      }
      tl.novelty[f] = 1.0 - maxSim;
    }
    // EMA smooth (alpha 0.15)
    let prev = 0;
    for (let f = 0; f < frameCount; f++) {
      prev += (tl.novelty[f] - prev) * 0.15;
      tl.novelty[f] = prev;
    }
  }

  // Repetition score: compare fingerprint at beat-period intervals
  {
    const detectedBPM = detectBPM(tl);
    const beatFrames = detectedBPM > 0 ? Math.round(fps * 60 / detectedBPM) : 0;
    if (beatFrames > 0) {
      for (let f = 0; f < frameCount; f++) {
        const offA = f * FP_BINS;
        let normA = 0;
        for (let i = 0; i < FP_BINS; i++) normA += fingerprints[offA + i] * fingerprints[offA + i];
        normA = Math.sqrt(normA) || 1e-10;
        let simSum = 0, simCount = 0;
        // Compare against last 4 beats
        for (let b = 1; b <= 4; b++) {
          const pf = f - b * beatFrames;
          if (pf < 0) continue;
          const offP = pf * FP_BINS;
          let dot = 0, normP = 0;
          for (let i = 0; i < FP_BINS; i++) {
            dot += fingerprints[offA + i] * fingerprints[offP + i];
            normP += fingerprints[offP + i] * fingerprints[offP + i];
          }
          normP = Math.sqrt(normP) || 1e-10;
          simSum += dot / (normA * normP);
          simCount++;
        }
        tl.repetition[f] = simCount > 0 ? simSum / simCount : 0;
      }
      // EMA smooth (alpha 0.1)
      let prev = 0;
      for (let f = 0; f < frameCount; f++) {
        prev += (tl.repetition[f] - prev) * 0.1;
        tl.repetition[f] = prev;
      }
    }
  }

  showAnalyzeProgress(80, 'Detecting sections...');
  await new Promise(r => setTimeout(r, 0));

  // 2B: Section detection with full look-ahead
  const sections = detectSections(tl);

  showAnalyzeProgress(95, 'Detecting beat grid...');
  await new Promise(r => setTimeout(r, 0));

  // Beat grid via autocorrelation
  sections.bpm = detectBPM(tl);

  showAnalyzeProgress(100, 'Done!');
  await new Promise(r => setTimeout(r, 300));
  hideAnalyzeProgress();

  return { timeline: tl, sections };
}

// 2B: Section detection — knows the future
function detectSections(tl) {
  const { energy, frameCount, fps } = tl;
  const frameDur = 1 / fps;

  // Per-frame section annotation
  const section = new Uint8Array(frameCount);     // 0=sustain, 1=breakdown, 2=buildup, 3=drop
  const timeToNextDrop = new Float32Array(frameCount);
  const timeSinceLastDrop = new Float32Array(frameCount);
  const timeToNextBreakdown = new Float32Array(frameCount);
  const sectionProgress = new Float32Array(frameCount); // 0-1 progress through current section

  // Pass 1: Find drops — energy jumps from <0.3 to >0.7 within 0.5s (30 frames)
  const dropWindow = Math.round(0.5 * fps);
  const dropFrames = [];
  for (let f = dropWindow; f < frameCount; f++) {
    // Look back: was energy low recently?
    let minBefore = 1;
    for (let b = 1; b <= dropWindow; b++) {
      if (energy[f - b] < minBefore) minBefore = energy[f - b];
    }
    // Current energy is high, recent past was low
    if (minBefore < 0.3 && energy[f] > 0.55) {
      // Check it's not too close to a previous drop
      if (dropFrames.length === 0 || f - dropFrames[dropFrames.length - 1] > fps * 2) {
        dropFrames.push(f);
      }
    }
  }

  // Pass 2: Find breakdowns — sustained energy <0.25 for >2s
  const breakdownMinFrames = Math.round(2 * fps);
  const breakdownRanges = []; // [{start, end}]
  let bdStart = -1;
  for (let f = 0; f < frameCount; f++) {
    if (energy[f] < 0.25) {
      if (bdStart < 0) bdStart = f;
    } else {
      if (bdStart >= 0 && f - bdStart >= breakdownMinFrames) {
        breakdownRanges.push({ start: bdStart, end: f - 1 });
      }
      bdStart = -1;
    }
  }
  if (bdStart >= 0 && frameCount - bdStart >= breakdownMinFrames) {
    breakdownRanges.push({ start: bdStart, end: frameCount - 1 });
  }

  // Pass 3: Find buildups — energy trend rising for >2s toward a detected drop
  const buildupMinFrames = Math.round(2 * fps);
  const buildupRanges = []; // [{start, end}]
  for (const dropF of dropFrames) {
    // Walk backwards from drop to find where the buildup started
    let buildStart = dropF;
    const trendWindow = Math.round(0.5 * fps);
    for (let f = dropF - 1; f >= Math.max(0, dropF - fps * 8); f--) {
      // Is energy generally rising from f toward dropF?
      const eHere = energy[f];
      const eFuture = energy[Math.min(f + trendWindow, dropF)];
      if (eFuture > eHere + 0.01) {
        buildStart = f;
      } else {
        break;
      }
    }
    if (dropF - buildStart >= buildupMinFrames) {
      buildupRanges.push({ start: buildStart, end: dropF - 1 });
    }
  }

  // Pass 4: Assign sections (priority: drop > buildup > breakdown > sustain)
  // Mark drops: the drop frame + 1.5s after
  const dropDuration = Math.round(1.5 * fps);
  for (const df of dropFrames) {
    for (let f = df; f < Math.min(df + dropDuration, frameCount); f++) {
      section[f] = 3; // drop
    }
  }
  // Mark buildups (don't overwrite drops)
  for (const r of buildupRanges) {
    for (let f = r.start; f <= r.end; f++) {
      if (section[f] === 0) section[f] = 2; // buildup
    }
  }
  // Mark breakdowns (don't overwrite drops or buildups)
  for (const r of breakdownRanges) {
    for (let f = r.start; f <= r.end; f++) {
      if (section[f] === 0) section[f] = 1; // breakdown
    }
  }

  // Pass 5: Compute timing fields
  // timeToNextDrop: scan forward from each frame
  let nextDrop = Infinity;
  for (let f = frameCount - 1; f >= 0; f--) {
    if (section[f] === 3 && (f === 0 || section[f - 1] !== 3)) nextDrop = f;
    timeToNextDrop[f] = nextDrop < Infinity ? (nextDrop - f) * frameDur : 999;
  }

  // timeSinceLastDrop: scan forward
  let lastDrop = -Infinity;
  for (let f = 0; f < frameCount; f++) {
    if (section[f] === 3 && (f === 0 || section[f - 1] !== 3)) lastDrop = f;
    timeSinceLastDrop[f] = lastDrop > -Infinity ? (f - lastDrop) * frameDur : 999;
  }

  // timeToNextBreakdown: scan backward
  let nextBd = Infinity;
  for (let f = frameCount - 1; f >= 0; f--) {
    if (section[f] === 1 && (f === 0 || section[f - 1] !== 1)) nextBd = f;
    timeToNextBreakdown[f] = nextBd < Infinity ? (nextBd - f) * frameDur : 999;
  }

  // sectionProgress: 0-1 through current contiguous section run
  let runStart = 0;
  let runSection = section[0];
  for (let f = 1; f <= frameCount; f++) {
    if (f === frameCount || section[f] !== runSection) {
      const runLen = f - runStart;
      for (let r = runStart; r < f; r++) {
        sectionProgress[r] = (r - runStart) / Math.max(1, runLen - 1);
      }
      if (f < frameCount) {
        runStart = f;
        runSection = section[f];
      }
    }
  }

  return { section, timeToNextDrop, timeSinceLastDrop, timeToNextBreakdown, sectionProgress, dropFrames, breakdownRanges, buildupRanges, bpm: 0 };
}

// Beat grid via autocorrelation of energy peaks
function detectBPM(tl) {
  const { energy, frameCount, fps } = tl;

  // Onset detection: find energy spikes
  const onsets = new Float32Array(frameCount);
  for (let f = 1; f < frameCount; f++) {
    const delta = energy[f] - energy[f - 1];
    onsets[f] = Math.max(0, delta);
  }

  // Autocorrelation over BPM range 80-200
  const minLag = Math.round(fps * 60 / 200); // 200 BPM
  const maxLag = Math.round(fps * 60 / 80);  // 80 BPM
  let bestLag = minLag, bestCorr = 0;

  // Use first 30s or full track, whichever is shorter
  const analyzeFrames = Math.min(frameCount, fps * 30);

  for (let lag = minLag; lag <= maxLag; lag++) {
    let corr = 0;
    let count = 0;
    for (let f = 0; f < analyzeFrames - lag; f++) {
      corr += onsets[f] * onsets[f + lag];
      count++;
    }
    corr /= Math.max(1, count);
    if (corr > bestCorr) {
      bestCorr = corr;
      bestLag = lag;
    }
  }

  return Math.round(fps * 60 / bestLag);
}

// Get offline frame index from current audio playback time
function getOfflineFrame() {
  if (!offlineTimeline || !audioEl) return -1;
  const time = audioEl.currentTime;
  return Math.min(Math.floor(time * offlineTimeline.fps), offlineTimeline.frameCount - 1);
}

// Section name lookup
const SECTION_NAMES = ['sustain', 'breakdown', 'buildup', 'drop'];

// ─── Particle Pool ──────────────────────────────────────────────────
const pool = new Array(CFG.maxParticles);
for (let i = 0; i < CFG.maxParticles; i++) {
  pool[i] = { alive: false, x: 0, y: 0, vx: 0, vy: 0, hue: 0, size: 0, life: 0, maxLife: 0, gravity: 0 };
}

function spawnOne(x, y, vx, vy, hue, size, life, grav) {
  for (let i = 0; i < CFG.maxParticles; i++) {
    const p = pool[i];
    if (!p.alive) {
      p.alive = true; p.x = x; p.y = y; p.vx = vx; p.vy = vy;
      p.hue = hue; p.size = size; p.life = life; p.maxLife = life; p.gravity = grav;
      return;
    }
  }
}

function rand(min, max) { return min + Math.random() * (max - min); }

function spawnBurst(type, hue) {
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  const cfg = CFG.spawn[type];
  const count = Math.floor(rand(...cfg.count));
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = rand(...cfg.speed);
    spawnOne(
      cx + Math.cos(a) * 10, cy + Math.sin(a) * 10,
      Math.cos(a) * spd, Math.sin(a) * spd,
      hue + rand(-20, 20), rand(...cfg.size), rand(...cfg.life), cfg.gravity
    );
  }
}

let prevKick = 0, prevSnare = 0, prevHat = 0;

function updateSpawns() {
  if (!isPlaying) return;
  const kd = bands.sub - prevKick;
  const sd = bands.low - prevSnare;
  const hd = bands.high - prevHat;
  const e = totalEnergy();
  const th = CFG.onsetThresholds;
  const hueVal = (spectralCentroid - 200) / 3800 * 360 + 180;

  // 3A/3B/3C: Gate spawn thresholds by persistent percussion confidence
  const pg = percGateState;
  const kickGated = kd * (0.55 + pg * 0.45);
  const snareGated = sd * (0.55 + pg * 0.45);

  if (kickGated > th.kick) {
    spawnBurst('kick', 310);
    spawnRing(310);
    spawnTear();
    if (Math.random() < 0.5) spawnTear();
    if (Math.random() < 0.3) spawnTear(true); // center tear
  }
  if (snareGated > th.snare) {
    spawnBurst('snare', 0);
    spawnRing(0);
    if (Math.random() < 0.4) spawnTear();
  }
  if (hd > th.hat) { spawnBurst('hat', hueVal); if (Math.random() < 0.3) spawnTear(); }
  if (e > CFG.peakEnergyMin && kickGated > th.peak) {
    spawnBurst('peak', Math.random() * 360);
    spawnRing(Math.random() * 360);
    spawnTear(); spawnTear(true);
    if (Math.random() < 0.5) spawnTear();
    // Trigger mandala on sustained peaks
    mandalaAlpha = 0.6;
    mandalaHue = hueVal;
  }

  prevKick = bands.sub; prevSnare = bands.low; prevHat = bands.high;
}

// ─── Reality Tears ──────────────────────────────────────────────────

function spawnTear(center) {

  if (center) {

    x = W * (0.3 + Math.random() * 0.4);

    hue: Math.random() * 360,
    drift: (Math.random() - 0.5) * 60,
    jagged: Math.random() < 0.5,

// Mandala state
let mandalaAlpha = 0;

// ─── 3D Spawn Pool ──────────────────────────────────────────────────
const POOL3D_SIZE = 8;
const spawnPool = [];
for (let i = 0; i < POOL3D_SIZE; i++) {
  spawnPool.push({ active: false, type: 0, x: 0, y: 0, z: 0, scale: 1, life: 0, maxLife: 5, age: 0, rotSeed: 0 });
}

// Rate limiters for spawn triggers
const spawnCooldowns = { kick: 0, snare: 0, hat: 0, drop: 0, breakdown: 0, peak: 0 };

function allocSpawnSlot() {
  // Find first inactive slot
  for (let i = 0; i < POOL3D_SIZE; i++) {
    if (!spawnPool[i].active) return i;
  }
  // Evict oldest
  let oldestIdx = 0, oldestAge = 0;
  for (let i = 0; i < POOL3D_SIZE; i++) {
    if (spawnPool[i].age > oldestAge) { oldestAge = spawnPool[i].age; oldestIdx = i; }
  }
  return oldestIdx;
}

function spawn3D(type, relZ, xyOffset, scale, maxLife) {
  const idx = allocSpawnSlot();
  const s = spawnPool[idx];
  s.active = true;
  s.type = type;
  s.x = camDriftXGlobal + (xyOffset ? xyOffset[0] : (Math.random() - 0.5) * 4);
  s.y = camDriftYGlobal + (xyOffset ? xyOffset[1] : (Math.random() - 0.5) * 4);
  s.z = cameraZ + relZ;
  s.scale = scale;
  s.life = 0;
  s.maxLife = maxLife;
  s.age = 0;
  s.rotSeed = Math.random() * 6.283;
}

function weightedPick(candidates) {
  // candidates: [[type, weight], ...]
  let total = 0;
  for (const [, w] of candidates) total += w;
  let r = Math.random() * total;
  for (const [t, w] of candidates) {
    r -= w;
    if (r <= 0) return t;
  }
  return candidates[0][0];
}

// Post-BH rebuild sequence
let bhRebuildQueue = [];
let bhRebuildTimer = 0;

function queueBHRebuild() {
  bhRebuildQueue = [
    { t: 0.0, type: 4, count: 2, relZ: [5, 8], scale: [1.5, 2.0], life: 4 },
    { t: 0.3, type: 6, count: 3, relZ: [6, 12], scale: [0.3, 0.5], life: 2 },
    { t: 0.6, type: 7, count: 1, relZ: [15, 20], scale: [1.0, 1.5], life: 5 },
    { t: 1.0, type: 1, count: 1, relZ: [20, 30], scale: [0.8, 1.2], life: 6 },
    { t: 1.5, type: 5, count: 1, relZ: [30, 40], scale: [1.5, 2.5], life: 8 },
    { t: 2.0, type: 3, count: 1, relZ: [35, 45], scale: [2.0, 3.0], life: 10 },
    { t: 2.5, type: 1, count: 1, relZ: [25, 35], scale: [0.8, 1.2], life: 6 },
  ];
  bhRebuildTimer = 0;
}

function updateSpawnPool(dt) {
  // Update lifecycle
  for (let i = 0; i < POOL3D_SIZE; i++) {
    const s = spawnPool[i];
    if (!s.active) continue;
    s.age += dt;
    s.life = s.age / s.maxLife;
    // Kill when expired or camera passed by >10 units
    if (s.life >= 1.0 || cameraZ - s.z > 10) {
      s.active = false;
      s.type = 0;
    }
  }

  // Process BH rebuild queue
  if (bhRebuildQueue.length > 0) {
    bhRebuildTimer += dt;
    while (bhRebuildQueue.length > 0 && bhRebuildTimer >= bhRebuildQueue[0].t) {
      const entry = bhRebuildQueue.shift();
      for (let c = 0; c < entry.count; c++) {
        const relZ = entry.relZ[0] + Math.random() * (entry.relZ[1] - entry.relZ[0]);
        const scale = entry.scale[0] + Math.random() * (entry.scale[1] - entry.scale[0]);
        const xyOff = entry.type === 4 ? [0, 0] : null; // void spheres centered
        spawn3D(entry.type, relZ, xyOff, scale, entry.life);
      }
    }
  }

  // Update cooldowns
  for (const k in spawnCooldowns) spawnCooldowns[k] = Math.max(0, spawnCooldowns[k] - dt);
}

// Global camera drift for spawn placement (set in frame())
let camDriftXGlobal = 0, camDriftYGlobal = 0;

function updateSpawn3DTriggers(kick, snare, hat, energy, chaos, section) {
  // Hard kick
  if (kick > 0.6 && spawnCooldowns.kick <= 0) {
    spawnCooldowns.kick = 0.5;
    const type = weightedPick([[1, 60], [2, 30], [6, 10]]);
    spawn3D(type, 10 + Math.random() * 20, null, 0.6 + Math.random() * 0.8, 4 + Math.random() * 3);
  }

  // Snare onset
  if (snare > 0.5 && spawnCooldowns.snare <= 0) {
    spawnCooldowns.snare = 0.3;
    const type = weightedPick([[6, 70], [7, 20], [2, 10]]);
    const count = type === 6 ? 2 + Math.floor(Math.random() * 2) : 1;
    for (let i = 0; i < count; i++) {
      spawn3D(type, 5 + Math.random() * 15, null, type === 6 ? 0.2 + Math.random() * 0.3 : 0.8 + Math.random() * 0.5, type === 6 ? 1.5 + Math.random() * 1 : 4);
    }
  }

  // Hat cluster
  if (chaos > 0.5 && spawnCooldowns.hat <= 0) {
    spawnCooldowns.hat = 1.0;
    const type = weightedPick([[7, 50], [6, 30], [1, 20]]);
    spawn3D(type, 8 + Math.random() * 15, null, 0.5 + Math.random() * 0.8, 3 + Math.random() * 3);
  }

  // Drop transition
  if (section === 'drop' && energyHistory.prevSection !== 'drop' && spawnCooldowns.drop <= 0) {
    spawnCooldowns.drop = 8.0;
    const type = weightedPick([[3, 80], [5, 20]]);
    spawn3D(type, 25 + Math.random() * 20, null, type === 3 ? 2.0 + Math.random() * 1.5 : 1.5 + Math.random() * 1.5, 10 + Math.random() * 5);
  }

  // Breakdown start
  if (section === 'breakdown' && energyHistory.prevSection !== 'breakdown' && spawnCooldowns.breakdown <= 0) {
    spawnCooldowns.breakdown = 10.0;
    const type = weightedPick([[5, 70], [4, 30]]);
    spawn3D(type, 20 + Math.random() * 30, null, 1.5 + Math.random() * 2.0, 12 + Math.random() * 5);
  }

  // Sustained peak
  if (energy > 0.7 && kick > 0.5 && spawnCooldowns.peak <= 0) {
    spawnCooldowns.peak = 2.0;
    const type = weightedPick([[2, 50], [1, 30], [3, 20]]);
    const count = type === 2 ? 2 : 1;
    for (let i = 0; i < count; i++) {
      spawn3D(type, 10 + Math.random() * 25, null, 0.7 + Math.random() * 0.8, 4 + Math.random() * 4);
    }
  }
}
